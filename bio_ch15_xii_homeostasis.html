<style>
*{margin:0;padding:0;box-sizing:border-box}
.timer-box{
  position:sticky;
  top:0;
  z-index:9999;
  width:100%;

  border-bottom:2px solid #ff9800;

/* ── BASE ── */
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

/* ── WATERMARK ── */
.watermark-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;

}
.watermark-overlay span{
  position:absolute;font-size:14px;font-weight:700;
  color:rgba(46,125,50,0.065);white-space:nowrap;
  transform:rotate(-35deg);letter-spacing:1px;text-transform:uppercase;
}

/* ── CONTAINER ── */
.container{
  max-width:880px;margin:0 auto;background:#fff;
  border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:visible;position:relative;z-index:1;
}

/* ── CHAPTER HEADER ── */
.chapter-header{
  background:linear-gradient(135deg,#1b5e20,#2e7d32);
  color:#fff;padding:20px 24px;text-align:center;
}
.ch-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.chapter-header h1{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.ch-meta{font-size:12px;opacity:.75;font-weight:500}

/* ── STATS BAR ── */
.stats{
  display:flex;justify-content:space-around;padding:14px 20px;

}
.stat-item{text-align:center}
.stat-label{font-size:10px;color:#2e7d32;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;color:#1b5e20;margin-top:3px}

/* ── QUIZ AREA ── */
.quiz-area{padding:24px 22px}

/* ── QUESTION CARD ── */

  margin-bottom:16px;border-left:5px solid #2e7d32;
  transition:box-shadow .2s;
}
.question-card:hover{box-shadow:0 4px 16px rgba(46,125,50,.1)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;
}
.q-num{
  background:#2e7d32;color:#fff;padding:4px 14px;
  border-radius:20px;font-weight:700;font-size:12px;
}

  border-radius:14px;font-size:10.5px;font-weight:700;letter-spacing:.3px;
}
.q-text{
  font-size:15px;color:#1a1a1a;margin-bottom:14px;line-height:1.65;font-weight:500;
}

/* ── OPTIONS ── */
.options{display:grid;gap:9px}
.option{
  padding:11px 16px;background:#fff;border:2px solid #dee2e6;
  border-radius:9px;cursor:pointer;transition:all .25s;
  font-size:14px;color:#333;line-height:1.4;
}
.option:hover:not(.disabled){border-color:#2e7d32;background:#e8f5e9;color:#1b5e20}
.option.selected{border-color:#2e7d32;background:#c8e6c9;color:#1b5e20}
.option.correct{border-color:#2e7d32!important;background:#e8f5e9!important;color:#1b5e20!important;font-weight:700}
.option.wrong{border-color:#c62828!important;background:#ffebee!important;color:#b71c1c!important}
.option.disabled{cursor:not-allowed}

/* ── CHECK BUTTON ── */
.check-btn{
  margin-top:13px;background:#2e7d32;color:#fff;border:none;
  padding:9px 26px;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
.check-btn:hover:not(:disabled){background:#388e3c;transform:translateY(-1px);box-shadow:0 4px 14px rgba(46,125,50,.35)}
.check-btn:disabled{background:#bdbdbd;cursor:not-allowed;transform:none;box-shadow:none}

/* ── FEEDBACK / EXPLANATION ── */
.feedback{
  display:none;margin-top:11px;padding:10px 14px;
  border-radius:8px;font-size:13px;line-height:1.5;
}
.feedback.show{display:block}
.feedback.correct{background:#e8f5e9;color:#1b5e20;border:2px solid #66bb6a;font-weight:600}
.feedback.wrong{background:#ffebee;color:#b71c1c;border:2px solid #ef9a9a;font-weight:600}
.explanation-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#fffde7;border:2px solid #f9a825;
  border-radius:8px;font-size:13px;color:#5d4037;line-height:1.5;
}
.explanation-box.show{display:block}
.exp-label{font-weight:700;color:#f57f17;margin-right:4px}

/* ── RESULT CARD ── */
.result-card{
  background:linear-gradient(135deg,#1b5e20,#2e7d32);
  color:#fff;border-radius:14px;padding:30px 24px;text-align:center;
  margin:8px 0 4px;
}
.result-card h2{font-size:23px;margin-bottom:18px;font-weight:800}
.result-grid{
  display:flex;justify-content:space-around;gap:16px;flex-wrap:wrap;margin-bottom:22px;
}
.result-stat{text-align:center;background:rgba(255,255,255,.14);border-radius:12px;padding:14px 22px}
.result-stat-value{font-size:32px;font-weight:800}
.result-stat-label{font-size:12px;opacity:.85;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.grade-badge{
  display:inline-block;font-size:42px;font-weight:900;
  background:rgba(255,255,255,.2);border-radius:50%;
  width:80px;height:80px;line-height:80px;margin-bottom:16px;
}
.result-btn{
  background:rgba(255,255,255,.18);color:#fff;
  border:2px solid rgba(255,255,255,.7);padding:10px 24px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;margin:6px;transition:all .25s;
}
.result-btn:hover{background:#fff;color:#2e7d32}

/* ── FOOTER ── */
.brand-footer{
  background:#f5f5f5;border-top:1px solid #e0e0e0;
  color:#9e9e9e;text-align:center;padding:12px;font-size:11px;letter-spacing:.3px;
}

<script>
/* ═══════════════════════════════════════════════
   MCQ DATA — Chapter 15: Homeostasis
═══════════════════════════════════════════════ */
const questions = [
  {q:"Who introduced the term \"homeostasis\" and described it as a self-regulating process?", o:["Walter B. Cannon","Charles Darwin","Claude Bernard","Louis Pasteur"], c:0, exp:"Walter B. Cannon (1871–1945) introduced the term homeostasis, describing it as a self-regulating process by which biological systems maintain stability while adjusting to changing conditions."},
  {q:"Which feedback mechanism intensifies the change happening to the body rather than maintaining stability?", o:["Negative feedback","Neutral feedback","Positive feedback","Counter feedback"], c:2, exp:"Positive feedback increases or initiates the change of output (e.g., blood clotting via platelets) and does not maintain a stable homeostatic condition."},
  {q:"The three integrated components through which the feedback mechanism operates are:", o:["Hormones, nerves, and organs","Receptors, control center, and effectors","Brain, spinal cord, and muscles","Kidney, liver, and lungs"], c:1, exp:"Receptors detect environmental changes, the CNS acts as the control center, and effectors respond to bring the body back to its normal state."},
  {q:"The physiological value around which the normal range fluctuates is called the:", o:["Normal range","Feedback threshold","Regulatory limit","Set point"], c:3, exp:"A set point is the physiological value around which the normal range fluctuates, such as 98.6°F for human body temperature."},
  {q:"Blood clotting via platelet aggregation at a wound site is a classic example of:", o:["Positive feedback","Negative feedback","Osmoregulation","Thermoregulation"], c:0, exp:"Platelets attract more platelets (amplifying the response) until a clot forms, then the cycle ends — a hallmark of positive feedback."},
  {q:"Organisms that maintain a constant internal osmotic environment despite changes in their external environment are called:", o:["Osmoconformers","Poikilotherms","Osmoregulators","Heterotherms"], c:2, exp:"Osmoregulators maintain a constant internal osmotic environment and can live in marine, freshwater, and terrestrial habitats but tolerate only a narrow range of salinities."},
  {q:"Specialized cells in gills and skin of freshwater organisms that actively extract Na⁺, Cl⁻, and Ca²⁺ from the external medium are called:", o:["Podocytes","Ionocytes","Granulocytes","Juxtaglomerular cells"], c:1, exp:"Ionocytes actively extract Na⁺, Cl⁻, and Ca²⁺ from the external medium and excrete H⁺ or HCO₃⁻ to maintain acid-base balance in body fluids."},
  {q:"Ammonia is chemically described as being how many times more toxic than urea?", o:["1,000","10,000","50,000","100,000"], c:3, exp:"Ammonia is alkaline, corrosive, and 100,000 times more toxic than urea; it must be present in very low concentrations in the body."},
  {q:"Animals that excrete urea as their primary nitrogenous waste product are classified as:", o:["Ammonotelic","Uricotelic","Ureotelic","Osmoconformers"], c:2, exp:"Ureotelic animals (mammals, amphibians, some fishes) produce urea through the ornithine/urea cycle in the liver from ammonia and CO₂."},
  {q:"Which animals are classified as uricotelic?", o:["Reptiles, birds, and insects","Most aquatic bony fishes","Mammals and most amphibians","Freshwater fishes only"], c:0, exp:"Uricotelic animals — reptiles, birds, and numerous arthropods like insects — excrete uric acid, which can be stored in tissues without toxic effect."},
  {q:"Which organ of the urinary system is capable of temporarily storing up to half a liter of urine in adults?", o:["Ureter","Renal pelvis","Urethra","Urinary bladder"], c:3, exp:"The urinary bladder has thick muscular walls strong enough to temporarily store urine until it is excreted through the urethra."},
  {q:"The internal urethral sphincter is responsible for:", o:["Voluntary control of urine flow","Involuntary control of urine flow from bladder to urethra","Blood filtration in glomerulus","Counter current exchange"], c:1, exp:"The internal urethral sphincter regulates involuntary control of urine flow, while the external urethral sphincter provides voluntary control."},
  {q:"The kidneys are positioned retroperitoneally between which vertebrae?", o:["12th thoracic and 3rd lumbar","10th thoracic and 5th lumbar","1st and 5th lumbar","8th and 12th thoracic"], c:0, exp:"Kidneys are located just below the rib cage between the 12th thoracic and 3rd lumbar vertebrae; the right kidney is slightly lower than the left to accommodate the liver."},
  {q:"Which important hormone produced by the renal cortex is necessary for RBC synthesis?", o:["Renin","ADH","Erythropoietin","Aldosterone"], c:2, exp:"Erythropoietin is produced by the renal cortex and is essential for the synthesis of red blood cells in the bone marrow."},
  {q:"The small convex region on the medial side of the kidney that serves as the entry point for blood vessels, nerves, and ureter is called the:", o:["Renal sinus","Renal capsule","Renal pelvis","Hilum"], c:3, exp:"The hilum is present in the medial depression of the kidney and serves as the important location for entrance of blood vessels, nerves, lymphatic vessels, and the ureter."},
  {q:"Approximately how many nephrons are present in each human kidney?", o:["100,000","One million","500,000","Two million"], c:1, exp:"Each kidney contains approximately one million nephrons — the functional units that mainly perform blood filtration."},
  {q:"The dense network of blood capillaries within the renal corpuscle is called the:", o:["Bowman's capsule","Malpighian body","Glomerulus","Vasa recta"], c:2, exp:"The glomerulus is a ball-like dense cluster of blood capillaries arising from afferent arterioles; high blood pressure here facilitates ultrafiltration."},
  {q:"Specialized cells of the glomerulus with slit-like openings that prevent plasma proteins from entering the ultrafiltrate are:", o:["Podocytes","Ionocytes","Macula densa cells","Juxtaglomerular cells"], c:0, exp:"Podocyte cells are wrapped around glomerular capillaries and their small slit-like openings actively prevent plasma proteins from entering the urinary ultrafiltrate."},
  {q:"The majority of selective reabsorption of glucose, amino acids, and water occurs in which part of the nephron?", o:["Loop of Henle","Proximal convoluted tubule","Distal convoluted tubule","Collecting duct"], c:1, exp:"The PCT reabsorbs water (67%), Na⁺, K⁺, Cl⁻, 100% of glucose, amino acids, vitamins, and organic substances back into the blood circulation."},
  {q:"The Glomerular Filtration Rate (GFR) is directly proportional to:", o:["Tubular secretion rate","Aldosterone concentration","ADH levels","Hydrostatic pressure in the glomerulus wall"], c:3, exp:"GFR is directly proportional to hydrostatic pressure in the glomerulus wall, which is increased by the diameter difference between afferent and efferent arterioles."},
  {q:"How many liters of blood does the kidney receive by circulation in 24 hours?", o:["180 liters","120 liters","200 liters","90 liters"], c:0, exp:"The kidney receives 180 liters of blood in 24 hours and under normal climatic conditions produces approximately 2.5 liters of urine."},
  {q:"Which hormone facilitates sodium reabsorption by acting on the ascending limb of the Loop of Henle?", o:["ADH","Erythropoietin","Renin","Aldosterone"], c:3, exp:"Aldosterone, a steroid-based hormone from the adrenal cortex, facilitates ionic movement and sodium reabsorption from the ascending limb, making the medulla hypertonic."},
  {q:"Anti-diuretic hormone (ADH) that facilitates water reabsorption is secreted from:", o:["Adrenal cortex","Posterior lobe of pituitary gland","Anterior lobe of pituitary gland","Hypothalamus directly"], c:1, exp:"ADH is secreted from the posterior lobe of the pituitary gland and facilitates movement of water molecules in nephron tubules."},
  {q:"The complex network of capillaries over the Loop of Henle involved in the counter current exchange mechanism is called:", o:["Peritubular capillaries","Afferent arteriole network","Vasa recta","Glomerular capillaries"], c:2, exp:"Vasa recta is the complex capillary network over the Loop of Henle; its slower blood flow allows time for passive diffusion during counter current exchange."},
  {q:"The process by which the ascending limb actively pumps ions into the medulla to create a hypertonic environment is called:", o:["Counter current multiplier","Counter current exchange","Tubular secretion","Osmotic diuresis"], c:0, exp:"Counter current multiplier involves active reabsorption of ions from the ascending limb accumulating in the medulla to create a hypertonic environment enabling water reabsorption."},
  {q:"Calcium oxalate constitutes what percentage of kidney stones?", o:["50%","80%","10%","25%"], c:1, exp:"Calcium oxalate is the most common type of crystal, forming 80% of all kidney stones; uric acid and calcium phosphate account for only 5–10%."},
  {q:"Percutaneous nephrolithotomy (PCNL) is used when:", o:["Kidney stones are very small","Kidney failure has occurred","Dialysis is contraindicated","Kidney stones cannot pass on their own"], c:3, exp:"PCNL is used to remove kidney stones when they cannot pass on their own; it is performed under general anesthesia using a nephroscope to crush and extract stones."},
  {q:"Which type of dialysis uses the peritoneum as the natural filtering membrane inside the abdominal cavity?", o:["Hemodialysis","Counter current dialysis","Peritoneal dialysis","CRRT"], c:2, exp:"In peritoneal dialysis, dialysate is poured into the abdominal cavity where the peritoneum serves as a natural filtering membrane, drawing toxins from the blood."},
  {q:"Hemodialysis is typically performed as:", o:["6-hour treatment, 2 times a week","4-hour treatment, 3 times a week","2-hour treatment, 5 times a week","8-hour treatment, once a week"], c:1, exp:"Hemodialysis is normally performed as a 4-hour treatment, 3 times a week; complications may include blood infection, thrombosis, and internal bleeding due to anticoagulants."},
  {q:"Which immune system component's resistance must be minimized to ensure successful kidney transplantation?", o:["Human Leucocyte Antigen (HLA) system","Complement system","Lymphatic system","Renin-angiotensin system"], c:0, exp:"Resistance from the Human Leucocyte Antigen (HLA) system must be minimized to ensure the recipient's immune system accepts the transplanted kidney."},
  {q:"Animals that maintain constant body temperature through internal metabolic processes are called:", o:["Ectotherms","Heterotherms","Poikilotherms","Endotherms (homeotherms)"], c:3, exp:"Endotherms (homeotherms) — birds and mammals — regulate their own body temperature through internal metabolic processes and behavioral/physiological strategies."},
  {q:"Thermoregulation in humans is controlled by which brain structure acting as the body's thermostat?", o:["Cerebellum","Hippocampus","Hypothalamus","Medulla oblongata"], c:2, exp:"The hypothalamus acts as the thermostat or set point for temperature (37°C), detecting changes via receptors distributed throughout the body."},
  {q:"The dilation of blood vessels near the skin to facilitate maximum heat loss in hot conditions is called:", o:["Vasodilation","Vasoconstriction","Cold diuresis","Hyperthermia"], c:0, exp:"Vasodilation allows blood vessels near the skin to dilate, facilitating maximum transfer of heat away from inside the body in hot conditions."},
  {q:"When body temperature rises above the suitable limit due to strenuous physical activity, this condition is called:", o:["Hypothermia","Hyperthermia","Poikilothermy","Heterothermy"], c:1, exp:"Hyperthermia activates sweat glands via the hypothalamus; evaporating sweat removes heat, and vasodilation enhances heat dissipation."},
  {q:"Vasoconstriction caused by hypothermia induces cold diuresis due to:", o:["Increased aldosterone levels","Increased ADH secretion","Decreased ADH levels","Increased erythropoietin secretion"], c:2, exp:"Hypothermia-induced vasoconstriction decreases ADH levels, resulting in dilute urine (cold diuresis) and renal dysfunction."},
  {q:"Bears hibernating and hummingbirds entering torpor are examples of which type of thermoregulation?", o:["Endothermy","Ectothermy","Homeothermy","Heterothermy"], c:3, exp:"Heterothermic animals switch between homeothermy and endothermy; their internal temperature drops during specific periods (usually when food is scarce)."},
  {q:"Inflammation of kidneys due to irritation from kidney stones is specifically called:", o:["Lithonephritis","Pyelonephritis","Cystitis","Urethritis"], c:0, exp:"Lithonephritis is the inflammation in kidneys due to irritation from kidney stones, which also hinder urine flow and cause severe back pain."},
  {q:"Pyelonephritis caused by E. coli reaching the kidneys presents with:", o:["Burning urination and pelvic pain only","Nausea, vomiting, back pain, and high fever with cold","Frequent urination and blood in urine","Discharge from urethral opening"], c:1, exp:"Pyelonephritis is a kidney infection by E. coli presenting with nausea, vomiting, back pain, and high fever with cold — distinguishing it from lower UTIs."},
  {q:"In humans, what percentage of uric acid is excreted by the intestine?", o:["50%","10%","75%","25%"], c:3, exp:"In humans, 75% of uric acid is excreted by the kidneys while the remaining 25% is excreted by the intestine."},
  {q:"Which compound entering the medulla from the collecting duct increases the osmotic gradient and assists water reabsorption in the counter current multiplier?", o:["Creatinine","Sodium chloride","Urea","Glucose"], c:2, exp:"Urea enters the medulla from the collecting duct and, along with other ions, helps maintain the osmotic gradient for water reabsorption — this is part of the counter current multiplier process."},
  {q:"Which of the following correctly describes the composition of glomerular filtrate?", o:["Water, electrolytes, amino acids, bicarbonates, urea, uric acid, creatinine","RBCs, WBCs, plasma proteins, and glucose","Only nitrogenous wastes and salts","Blood cells, platelets, and large proteins"], c:0, exp:"Glomerular filtrate primarily includes water, electrolytes, some amino acids, bicarbonates, and nitrogenous wastes; large molecules like proteins and blood cells are retained."},
  {q:"What percentage of glucose filtered in the glomerulus is reabsorbed in the PCT of a healthy person?", o:["50%","80%","100%","67%"], c:2, exp:"100% of glucose is reabsorbed in the PCT via active transport; its presence in urine (glucosuria) indicates pathological conditions like diabetes mellitus."},
  {q:"In the Loop of Henle, the ascending limb is permeable to Na⁺, K⁺, and Cl⁻ but impermeable to water, while the descending limb is:", o:["Permeable to ions only","Impermeable to both water and ions","Permeable to both water and ions","Permeable to water only"], c:3, exp:"The descending limb of the Loop of Henle is permeable to water (not ions), allowing water to leave by osmosis into the hypertonic medullary interstitium."},
  {q:"The kidney functions as an endocrine organ by secreting which hormone that maintains blood pressure?", o:["Erythropoietin","Renin","ADH","Aldosterone"], c:1, exp:"Renin is secreted by the kidney as an endocrine hormone that maintains blood pressure, while erythropoietin is involved in red blood cell production."},
  {q:"The condition of increased oxalate levels in urine that predisposes to kidney stone formation is called:", o:["Hyperoxaluria","Hypercalciuria","Urolithiasis","Nephrolithiasis"], c:0, exp:"Hyperoxaluria refers to high oxalate levels in urine, while hypercalciuria refers to increased calcium; both increase the risk of calcium oxalate stone formation."},
  {q:"The normal human body temperature maintained by endothermic mechanisms is:", o:["36°C","37°C","38°C","39°C"], c:1, exp:"Humans maintain body temperature at 37°C (98.6°F); if it rises to 42°C (hyperthermia), serious complications including fever, stroke, or death can occur."},
  {q:"Struvite (infectious) kidney stones are formed by:", o:["Calcium phosphate in acidic urine","Excess uric acid crystallization","Magnesium ammonium phosphate in alkaline urine due to bacterial activity","Amino acid cystine in childhood"], c:2, exp:"Struvite stones constitute about 10% of kidney stones and are formed by magnesium ammonium phosphate in alkaline urine due to bacterial activity."},
  {q:"Continuous Renal Replacement Therapy (CRRT) is specifically designed for:", o:["Patients with mild chronic kidney disease","Routine outpatient kidney management","Patients preferring home-based treatment","Critically ill patients unable to tolerate repeated hemodialysis or peritoneal dialysis"], c:3, exp:"CRRT runs continuously 24 hours a day for critically ill patients who cannot tolerate the repeated procedures of hemodialysis or peritoneal dialysis."},
  {q:"Which region of the nephron runs down toward the renal pyramids to become the descending limb of the Loop of Henle?", o:["Proximal convoluted tubule","Distal convoluted tubule","Collecting duct","Bowman's capsule"], c:0, exp:"The PCT runs down toward the renal pyramids of the medulla to become the descending limb of the Loop of Henle, then turns back as the ascending limb and finally forms the DCT."},
  {q:"The network of capillaries that surrounds both PCT and DCT, providing nutrients and oxygen to the renal cortex, is called:", o:["Vasa recta","Efferent arterioles","Peritubular capillaries","Glomerular capillaries"], c:2, exp:"Peritubular capillaries extend from efferent arterioles to surround both PCT and DCT, providing nutrients/oxygen to the cortex and aiding reabsorption."},
  {q:"Heat transfer through physical contact, such as applying an ice pack to the skin, is referred to as:", o:["Convection","Conduction","Radiation","Evaporation"], c:1, exp:"Conduction means heat transfer through direct physical interaction; convection involves heat transfer through movement of air or water molecules across the skin."},
  {q:"Which immunosuppressant drug is administered after kidney transplantation to prevent organ rejection?", o:["Aspirin","Heparin","Erythropoietin","Cyclosporine"], c:3, exp:"Cyclosporine is given post-transplant to suppress immune rejection of the new kidney, though it simultaneously increases susceptibility to opportunistic infections."},
  {q:"When the body is exposed to cold and temperature drops below the set point, the negative feedback loop causes the body to:", o:["Activate sweat glands","Induce vasodilation","Shiver, producing heat to return temperature to the set point","Increase urine production"], c:0, exp:"Negative feedback suppresses the deviation from normal; in cold conditions, shivering generates heat and vasoconstriction conserves it, returning body temperature to the set point."},
  {q:"Osmoconformers are organisms whose internal body solute composition is:", o:["Always hypertonic to the external environment","Always hypotonic to the external environment","Equal to or isotonic to the external environment","Regulated independently of external environment"], c:2, exp:"Osmoconformers have internal body solute composition equal or isotonic to the external environment; they are marine organisms that can survive in a wide range of salinities."},
  {q:"Which compound do osmoconformers like sharks contain that accumulates in tissue and protects against protein-destabilizing effects of urea?", o:["Ammonia","Creatinine","Trimethylamine oxide (TMAO)","Uric acid"], c:1, exp:"Osmoconformers like sharks contain TMAO (trimethylamine oxide) in their blood which accumulates in tissues and counteracts the protein-destabilizing effects of urea for osmotic balance."},

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">📖 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.15 Homeostasis &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
// ── STICKY TIMER ──
let timeLeft = 80 * 60;
const timerDisplay = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');

const timerInterval = setInterval(() => {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerDisplay.textContent =
    String(mins).padStart(2,'0') + ':' +
    String(secs).padStart(2,'0');
  if(timeLeft <= 300){
    timerBox.classList.add('danger');
  }
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    timerDisplay.textContent = '⏰ TIME UP';
    showResult();
  }
  timeLeft--;
}, 1000);
</script>
