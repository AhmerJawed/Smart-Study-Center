<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Spotting &amp; Rectification — Smart Study Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── BASE ── */
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#0d2137 0%,#1565c0 50%,#1976d2 100%);
  min-height:100vh;
  padding:20px 16px;
}

/* ── WATERMARK ── */
.watermark-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.watermark-overlay span{
  position:absolute;font-size:14px;font-weight:700;
  color:rgba(21,101,192,0.065);white-space:nowrap;
  transform:rotate(-35deg);letter-spacing:1px;text-transform:uppercase;
}

/* ── CONTAINER ── */
.container{
  max-width:880px;margin:0 auto;background:#fff;
  border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:hidden;position:relative;z-index:1;
}

/* ── CHAPTER HEADER ── */
.chapter-header{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;padding:20px 24px;text-align:center;
}
.ch-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.chapter-header h1{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.ch-meta{font-size:12px;opacity:.75;font-weight:500}

/* ── STATS BAR ── */
.stats{
  display:flex;justify-content:space-around;padding:14px 20px;
  background:#e3f2fd;border-bottom:2px solid #bbdefb;flex-wrap:wrap;gap:8px;
}
.stat-item{text-align:center}
.stat-label{font-size:10px;color:#1565c0;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;color:#0d2137;margin-top:3px}

/* ── QUIZ AREA ── */
.quiz-area{padding:24px 22px}

/* ── QUESTION CARD ── */
.question-card{
  background:#f8f9fa;border-radius:12px;padding:20px;
  margin-bottom:16px;border-left:5px solid #1565c0;
  transition:box-shadow .2s;
}
.question-card:hover{box-shadow:0 4px 16px rgba(21,101,192,.1)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;
}
.q-num{
  background:#1565c0;color:#fff;padding:4px 14px;
  border-radius:20px;font-weight:700;font-size:12px;
}
.q-text{
  font-size:15px;color:#1a1a1a;margin-bottom:14px;line-height:1.65;font-weight:500;
}

/* ── FAULTY SENTENCE HIGHLIGHT ── */
.faulty-sentence{
  display:block;margin-top:9px;padding:9px 14px;
  background:#fff3e0;border-left:4px solid #f57c00;
  border-radius:7px;font-style:italic;color:#bf360c;
  font-size:14.5px;font-weight:700;letter-spacing:.1px;
  line-height:1.5;
}

/* ── OPTIONS ── */
.options{display:grid;gap:9px}
.option{
  padding:11px 16px;background:#fff;border:2px solid #dee2e6;
  border-radius:9px;cursor:pointer;transition:all .25s;
  font-size:14px;color:#333;line-height:1.4;
}
.option:hover:not(.disabled){border-color:#1565c0;background:#e3f2fd;color:#0d2137}
.option.selected{border-color:#1565c0;background:#bbdefb;color:#0d2137}
.option.correct{border-color:#1565c0!important;background:#e3f2fd!important;color:#0d2137!important;font-weight:700}
.option.wrong{border-color:#c62828!important;background:#ffebee!important;color:#b71c1c!important}
.option.disabled{cursor:not-allowed}

/* ── CHECK BUTTON ── */
.check-btn{
  margin-top:13px;background:#1565c0;color:#fff;border:none;
  padding:9px 26px;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
.check-btn:hover:not(:disabled){background:#1976d2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(21,101,192,.35)}
.check-btn:disabled{background:#bdbdbd;cursor:not-allowed;transform:none;box-shadow:none}

/* ── FEEDBACK / EXPLANATION ── */
.feedback{
  display:none;margin-top:11px;padding:10px 14px;
  border-radius:8px;font-size:13px;line-height:1.5;
}
.feedback.show{display:block}
.feedback.correct{background:#e3f2fd;color:#0d2137;border:2px solid #64b5f6;font-weight:600}
.feedback.wrong{background:#ffebee;color:#b71c1c;border:2px solid #ef9a9a;font-weight:600}
.explanation-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#fffde7;border:2px solid #f9a825;
  border-radius:8px;font-size:13px;color:#5d4037;line-height:1.55;
}
.explanation-box.show{display:block}
.exp-label{font-weight:700;color:#f57f17;margin-right:4px}

/* ── RESULT CARD ── */
.result-card{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;border-radius:14px;padding:30px 24px;text-align:center;
  margin:8px 0 4px;
}
.result-card h2{font-size:23px;margin-bottom:18px;font-weight:800}
.result-grid{
  display:flex;justify-content:space-around;gap:16px;flex-wrap:wrap;margin-bottom:22px;
}
.result-stat{text-align:center;background:rgba(255,255,255,.14);border-radius:12px;padding:14px 22px}
.result-stat-value{font-size:32px;font-weight:800}
.result-stat-label{font-size:12px;opacity:.85;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.grade-badge{
  display:inline-block;font-size:42px;font-weight:900;
  background:rgba(255,255,255,.2);border-radius:50%;
  width:80px;height:80px;line-height:80px;margin-bottom:16px;
}
.result-btn{
  background:rgba(255,255,255,.18);color:#fff;
  border:2px solid rgba(255,255,255,.7);padding:10px 24px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;margin:6px;transition:all .25s;
}
.result-btn:hover{background:#fff;color:#1565c0}

/* ── FOOTER ── */
.brand-footer{
  background:#f5f5f5;border-top:1px solid #e0e0e0;
  color:#9e9e9e;text-align:center;padding:12px;font-size:11px;letter-spacing:.3px;
}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .chapter-header h1{font-size:17px}
  .stat-value{font-size:20px}
  .result-stat-value{font-size:26px}
  .quiz-area{padding:16px 14px}
  .faulty-sentence{font-size:13.5px}
}
</style>

      <div class="stat-label">Correct</div>

      <div class="stat-label">Score</div>
      <div class="stat-value" id="statScore">0%</div>

  <div class="quiz-area" id="quizArea"></div>

<script>
/* ═══════════════════════════════════════════════
   MCQ DATA — Error Spotting & Rectification
═══════════════════════════════════════════════ */
const questions = [

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She is more smarter than her sister.</span>",
   o:["She is more smart than her sister.",
      "She is smarter than her sister.",
      "She is the most smartest than her sister.",
      "She was more smarter than her sister."],
   c:1,
   exp:"📌 Rule — Double Comparative: Never combine 'more' with an adjective that already has the comparative suffix '-er.' The word 'smarter' is already the comparative form of 'smart,' so adding 'more' creates an illegal double comparative. Simply drop 'more.' Correct: She is smarter than her sister."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Each boy must submit their homework.</span>",
   o:["Each boys must submit their homework.",
      "Each boy must submit its homework.",
      "Each boy must submit his homework.",
      "Each boy must submits their homework."],
   c:2,
   exp:"📌 Rule — Pronoun-Antecedent Agreement: 'Each,' 'every,' 'either,' and 'neither' are singular indefinite pronouns. They require singular verbs and singular pronouns. Since the antecedent is 'each boy' (masculine singular), the pronoun must be 'his,' not 'their.' Correct: Each boy must submit his homework."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He prefers coffee than tea.</span>",
   o:["He prefers coffee more than tea.",
      "He preferred coffee than tea.",
      "He is preferring coffee than tea.",
      "He prefers coffee to tea."],
   c:3,
   exp:"📌 Rule — Prefer + 'to': The verb 'prefer' is always followed by 'to,' never 'than.' The fixed structure is: prefer + object + to + object. This is a compulsory collocation. Examples: 'I prefer reading to watching TV.' 'She prefers silence to noise.' Correct: He prefers coffee to tea."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He is known to me for ten years.</span>",
   o:["He was known to me for ten years.",
      "He has been known to me for ten years.",
      "He will be known to me for ten years.",
      "He is being known to me for ten years."],
   c:1,
   exp:"📌 Rule — Present Perfect for Continuing States: When a state or action began in the past and still continues at the time of speaking, use the present perfect (has/have + V3) or present perfect continuous. The simple present 'is known' wrongly suggests no connection to the past duration. Correct: He has been known to me for ten years."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He is more taller than his friend.</span>",
   o:["He is more tall than his friend.",
      "He is much more taller than his friend.",
      "He is taller than his friend.",
      "He is the most tallest of his friends."],
   c:2,
   exp:"📌 Rule — Double Comparative: 'Taller' is already the comparative form of 'tall' (adjective + -er). Placing 'more' before it produces a double comparative, which is a serious grammatical error. The corrected sentence uses only 'taller than.' Correct: He is taller than his friend."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She prefers novels than poetry.</span>",
   o:["She preferred novels than poetry.",
      "She prefers novels to poetry.",
      "She is preferring novels over poetry.",
      "She prefers novels more than poetry."],
   c:1,
   exp:"📌 Rule — Prefer + 'to': This is one of the most frequently tested preposition errors. 'Prefer' is always followed by 'to,' not 'than.' There are no exceptions to this rule. Correct: She prefers novels to poetry. (Compare: 'I would rather read novels than poetry' — 'rather...than' is a different structure.)"},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>All the teacher's must grade her students.</span>",
   o:["All the teacher's must grade their students.",
      "All the teachers must grade her students.",
      "All the teachers must grade their students.",
      "All the teacher must grade their students."],
   c:2,
   exp:"📌 Rule — Two Errors: (1) Apostrophe Misuse: An apostrophe is used for possession ('the teacher's book') or contractions ('it's = it is'), never to form a simple plural. The plural of 'teacher' is 'teachers' — no apostrophe. (2) Pronoun Agreement: 'All the teachers' is plural, so the pronoun must be 'their,' not 'her.' Correct: All the teachers must grade their students."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>I have been living here from 2010.</span>",
   o:["I have been living here since 2010.",
      "I am living here from 2010.",
      "I was living here from 2010.",
      "I have been living here before 2010."],
   c:0,
   exp:"📌 Rule — 'Since' vs. 'From': 'Since' is used with a specific point in time when the action started in the past and continues to the present, especially with perfect tenses. 'From' indicates a starting point only when a clear ending point is also stated ('from 2010 to 2020'). Since no end point is mentioned here, 'since' is required. Correct: I have been living here since 2010."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Neither his friends nor he are able to solve this issue.</span>",
   o:["Neither his friends nor he were able to solve this issue.",
      "Neither his friends nor he is able to solve this issue.",
      "Neither his friends nor he are going to solve this issue.",
      "Neither his friend nor he are able to solve this issue."],
   c:1,
   exp:"📌 Rule — Neither...Nor (Proximity Rule): When 'neither...nor' connects subjects of different number or person, the verb agrees with the subject closest to it. Here 'he' (singular, 3rd person) is the nearer subject, so the verb must be singular: 'is,' not 'are.' Correct: Neither his friends nor he is able to solve this issue."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>The committee consist with four members.</span>",
   o:["The committee consist of four members.",
      "The committee consists with four members.",
      "The committee are consisting of four members.",
      "The committee consists of four members."],
   c:3,
   exp:"📌 Rule — Two Errors: (1) Wrong Preposition: 'Consist' is always followed by 'of,' never 'with.' This is a fixed collocation. (2) Subject-Verb Agreement: 'Committee' is a singular collective noun in formal English and takes a singular verb 'consists,' not 'consist.' Correct: The committee consists of four members."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She is married with an engineer.</span>",
   o:["She is married with an engineer.",
      "She is married by an engineer.",
      "She is married to an engineer.",
      "She married with an engineer."],
   c:2,
   exp:"📌 Rule — Fixed Preposition after 'Married': The correct preposition after 'married' is always 'to,' never 'with.' 'Married to' is a fixed collocation in English. The preposition 'with' appears in other expressions ('angry with,' 'busy with') but is never used with 'married.' Correct: She is married to an engineer."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She sings more better than her sister.</span>",
   o:["She sings more well than her sister.",
      "She sings better than her sister.",
      "She sings best than her sister.",
      "She is singing more better than her sister."],
   c:1,
   exp:"📌 Rule — Double Comparative (Irregular Form): 'Better' is already the irregular comparative form of 'good/well.' It inherently means 'more good/well.' Adding 'more' before 'better' creates a double comparative. The same principle applies to other irregular comparatives: worse, further, older, etc. Correct: She sings better than her sister."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>The teacher distributed the books between the whole class.</span>",
   o:["The teacher distributed the books among the whole class.",
      "The teacher distributes the books between both classes.",
      "The teacher distributed the books in between the class.",
      "The teacher distributed the books between whole class."],
   c:0,
   exp:"📌 Rule — Between vs. Among: 'Between' is used when referring to exactly two people or things. 'Among' is used for three or more. Since 'the whole class' refers to many students (more than two), 'among' is the correct word. Correct: The teacher distributed the books among the whole class."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She did the work very good.</span>",
   o:["She did the work very goodly.",
      "She does the work very better.",
      "She did the work very well.",
      "She done the work very good."],
   c:2,
   exp:"📌 Rule — Adjective vs. Adverb: Adjectives modify nouns; adverbs modify verbs. The word 'did' is a verb and must be modified by an adverb. 'Good' is an adjective; its adverb form is 'well.' This is one of the most common errors in spoken and written English. Correct: She did the work very well."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He has went to London last year.</span>",
   o:["He has gone to London last year.",
      "He had went to London last year.",
      "He goes to London last year.",
      "He went to London last year."],
   c:3,
   exp:"📌 Rule — Simple Past vs. Present Perfect: The present perfect (has/have + V3) is used for actions without a specific past time. When a definite past time marker is present ('last year,' 'yesterday,' 'in 2020'), the simple past must be used. Also note: 'went' is the simple past of 'go'; 'gone' is the past participle — 'has went' is wrong on both counts. Correct: He went to London last year."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>The news are very disturbing.</span>",
   o:["The news were very disturbing.",
      "The news is very disturbing.",
      "The news have been very disturbing.",
      "These news are very disturbing."],
   c:1,
   exp:"📌 Rule — Uncountable Noun (News): Despite ending in '-s,' 'news' is an uncountable noun and is always singular — it never takes a plural verb. Similar words that look plural but are singular: mathematics, physics, economics, politics, athletics, gymnastics, means. Correct: The news is very disturbing."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She has lived in Karachi from 2015.</span>",
   o:["She has lived in Karachi since 2015.",
      "She lived in Karachi from 2015.",
      "She is living in Karachi from 2015.",
      "She has been living in Karachi before 2015."],
   c:0,
   exp:"📌 Rule — 'Since' with Perfect Tenses: When a perfect tense (has/have + V3) is used and only a starting point in time is given, 'since' — not 'from' — must be used. 'From' is used in pair: 'from...to.' Since there is no mentioned ending point here, 'since' is required. Correct: She has lived in Karachi since 2015."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Less students attended the lecture today.</span>",
   o:["Little students attended the lecture today.",
      "Less of the students attended the lecture today.",
      "Fewer students attended the lecture today.",
      "A few less students attended the lecture today."],
   c:2,
   exp:"📌 Rule — Fewer vs. Less: 'Fewer' is used with countable nouns (items you can count individually: students, books, cars, people). 'Less' is used with uncountable nouns (water, time, money, information). Since 'students' is countable, 'fewer' is required. Correct: Fewer students attended the lecture today."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He is one of the best student in the class.</span>",
   o:["He is one of the best student in the class.",
      "He is one of the better students in the class.",
      "He is one of the best students in the class.",
      "He is one of best students in the class."],
   c:2,
   exp:"📌 Rule — 'One of the' + Plural Noun: The expression 'one of the' must always be followed by a plural noun. 'One of the best student' is incorrect; the noun must be 'students' (plural). Think of it as: he is one person among a group of the best students. Correct: He is one of the best students in the class."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>The police has arrested two suspects.</span>",
   o:["The police was arresting two suspects.",
      "The police is arresting two suspects.",
      "The police have arrested two suspects.",
      "The police has been arresting two suspects."],
   c:2,
   exp:"📌 Rule — 'Police' is Always Plural: Unlike most collective nouns, 'police' is always treated as a plural noun and requires a plural verb. You cannot say 'a police' — you must say 'a police officer.' Other always-plural nouns: people, cattle, clergy, gentry. Correct: The police have arrested two suspects."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He is suffering from fever since Monday.</span>",
   o:["He was suffering from fever since Monday.",
      "He suffered from fever since Monday.",
      "He has been suffering from fever since Monday.",
      "He is suffering from fever for Monday."],
   c:2,
   exp:"📌 Rule — Present Perfect Continuous with 'Since': The word 'since' (with a point in time) requires a perfect tense — either present perfect (has/have + V3) or present perfect continuous (has/have been + V-ing). The simple present 'is suffering' cannot be used with 'since' to express ongoing duration from a past point. Correct: He has been suffering from fever since Monday."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Ahmad and his brother is coming to the party.</span>",
   o:["Ahmad and his brother is coming to the party.",
      "Ahmad and his brother are coming to the party.",
      "Ahmad with his brother is coming to the party.",
      "Ahmad and his brother was coming to the party."],
   c:1,
   exp:"📌 Rule — Compound Subject with 'And': When two subjects are joined by 'and,' they form a compound (plural) subject requiring a plural verb. 'Ahmad and his brother' = two people = plural subject → 'are,' not 'is.' Exception: 'Bread and butter is my favourite breakfast' — when two nouns joined by 'and' form one unified concept, a singular verb is used. Correct: Ahmad and his brother are coming to the party."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She is superior than her colleagues.</span>",
   o:["She is more superior than her colleagues.",
      "She is superior over her colleagues.",
      "She is superior to her colleagues.",
      "She is superior from her colleagues."],
   c:2,
   exp:"📌 Rule — Latin Comparatives + 'To': Adjectives of Latin origin that already carry a comparative meaning — superior, inferior, senior, junior, prior, exterior, interior — must be followed by 'to,' never 'than.' These words already mean 'more than,' so adding 'than' is redundant and wrong. Correct: She is superior to her colleagues."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Neither of them have finished the task.</span>",
   o:["Neither of them have been finishing the task.",
      "Neither of them has finished the task.",
      "Neither of them were finishing the task.",
      "Neither of them are going to finish the task."],
   c:1,
   exp:"📌 Rule — 'Neither' is Singular: When 'neither' is used alone (without 'nor'), it is a singular indefinite pronoun and takes a singular verb. The phrase 'of them' is a prepositional phrase; it does not change the number of the subject. The subject is still singular 'neither.' Correct: Neither of them has finished the task."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She entered into the room quietly.</span>",
   o:["She entered in the room quietly.",
      "She entered inside the room quietly.",
      "She entered the room quietly.",
      "She entered at the room quietly."],
   c:2,
   exp:"📌 Rule — Redundant Preposition with 'Enter': 'Enter' is a transitive verb that already carries the meaning of movement into a place. Adding 'into' or 'in' after it is therefore redundant and incorrect. No preposition is needed. Compare: 'arrive at the room' (arrive requires 'at') vs. 'enter the room' (enter needs no preposition). Correct: She entered the room quietly."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Everyone in the hall were standing.</span>",
   o:["Everyone in the hall are standing.",
      "Everyone in the hall is standing.",
      "Everyone in the hall was standing.",
      "Everyone in the hall have been standing."],
   c:2,
   exp:"📌 Rule — Indefinite Pronouns are Singular: The indefinite pronouns everyone, everybody, someone, somebody, no one, nobody, anyone, and anybody are grammatically singular and take singular verbs. The phrase 'in the hall' is a prepositional modifier, not the subject. Since the context is past, the correct verb is 'was.' Correct: Everyone in the hall was standing."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He is too tired to can walk.</span>",
   o:["He is too tired for walking.",
      "He is much tired to walk.",
      "He is too tired enough to walk.",
      "He is too tired to walk."],
   c:3,
   exp:"📌 Rule — Too...To Structure: 'Too...to' is a fixed structure meaning the degree is so great that the action is impossible. The word 'to' here introduces a bare infinitive (base form of verb). A modal verb (can, could, will, must) must never be inserted after 'to' in this structure. Formula: Subject + be + too + adjective + to + base verb. Correct: He is too tired to walk."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He insisted to go to the party.</span>",
   o:["He insisted for going to the party.",
      "He insisted to going to the party.",
      "He insisted on going to the party.",
      "He insisted going to the party."],
   c:2,
   exp:"📌 Rule — Insist + 'On' + Gerund: The verb 'insist' cannot be followed by an infinitive ('to + verb'). It must be followed by 'on + gerund' or by a 'that' clause. This is a fixed verb-preposition collocation. Correct patterns: (1) He insisted on going. (2) He insisted that they should leave. Correct: He insisted on going to the party."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She is more intelligent than any student in the class.</span>",
   o:["She is much more intelligent than every student in the class.",
      "She is more intelligent than any student of the class.",
      "She is the most intelligent than any student in the class.",
      "She is more intelligent than any other student in the class."],
   c:3,
   exp:"📌 Rule — Illogical Comparison / 'Any Other': When comparing a person or thing with other members of the same group using 'more...than any,' you must add 'other' to avoid a logical contradiction. Without 'other,' the sentence implies she is more intelligent than herself (since she is also a student in the class). Correct: She is more intelligent than any other student in the class."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He reached to the station on time.</span>",
   o:["He reached at the station on time.",
      "He reached the station on time.",
      "He reached in the station on time.",
      "He reached up to the station on time."],
   c:1,
   exp:"📌 Rule — Redundant Preposition with 'Reach': Like 'enter,' the verb 'reach' is transitive and already implies arriving at a destination — no preposition is needed after it. Compare: 'arrive at the station' (arrive requires 'at') vs. 'reach the station' (reach requires no preposition). Correct: He reached the station on time."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>Both boys failed to complete his assignment.</span>",
   o:["Both boys failed to complete its assignment.",
      "Both boys failed to complete his assignment.",
      "Both of boys failed to complete their assignment.",
      "Both boys failed to complete their assignment."],
   c:3,
   exp:"📌 Rule — Pronoun-Antecedent Agreement: 'Both' refers to two people and is plural. The pronoun referring back to a plural antecedent must also be plural. 'His' is singular — it creates a mismatch with the plural subject 'both boys.' The correct plural pronoun is 'their.' Also, 'both of boys' is ungrammatical; say 'both boys' or 'both of the boys.' Correct: Both boys failed to complete their assignment."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He denied to commit the crime.</span>",
   o:["He denied committing the crime.",
      "He denied to have committed the crime.",
      "He denied having to commit the crime.",
      "He was denying to commit the crime."],
   c:0,
   exp:"📌 Rule — Deny + Gerund: 'Deny' must be followed by a gerund (verb + -ing), never by an infinitive ('to + verb'). This is a fixed verb pattern. Other verbs that require a gerund (not infinitive): admit, avoid, enjoy, finish, mind, miss, suggest, postpone, consider, practise. Correct: He denied committing the crime."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>My father suggested me to study harder.</span>",
   o:["My father suggested me to study harder.",
      "My father suggested to me to study harder.",
      "My father suggested that I should study harder.",
      "My father suggested me studying harder."],
   c:2,
   exp:"📌 Rule — Suggest + That Clause / Gerund: Unlike 'tell,' 'ask,' or 'advise,' the verb 'suggest' does not take the pattern: suggest + person + to-infinitive. You cannot say 'suggest me to do.' Correct patterns are: (1) suggest + that + subject + (should) + verb: 'He suggested that I should study.' (2) suggest + gerund: 'He suggested studying harder.' Correct: My father suggested that I should study harder."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>She is very unique in her approach.</span>",
   o:["She is more unique in her approach.",
      "She is quite very unique in her approach.",
      "She is unique in her approach.",
      "She is the most unique in her approach."],
   c:2,
   exp:"📌 Rule — Absolute Adjectives Cannot Be Graded: 'Unique' means 'one of a kind — existing only once.' Since it expresses an absolute, all-or-nothing quality, it cannot be made more or less. Therefore 'very unique,' 'more unique,' 'most unique,' and 'quite unique' are all grammatically incorrect. Other absolute adjectives: perfect, complete, infinite, dead, impossible, empty, eternal. Correct: She is unique in her approach."},

  {q:"Choose the correctly rectified form of:<span class='faulty-sentence'>He spoke to his friend very frank.</span>",
   o:["He spoke to his friend very frankest.",
      "He spoke to his friend very frankly.",
      "He spoke to his friend very more frankly.",
      "He spoke to his friend frankest."],
   c:1,
   exp:"📌 Rule — Adjective vs. Adverb: Adverbs (not adjectives) modify verbs, other adverbs, or adjectives. The verb 'spoke' must be modified by an adverb. 'Frank' is an adjective; its adverb form is 'frankly.' The same error pattern appears in expressions like 'drive safe' (should be 'drive safely'), 'talk slow' (should be 'talk slowly'). Correct: He spoke to his friend very frankly."}

];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practising!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise and Try Again!';     emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Error Spotting &amp; Rectification &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
</script>
