/* ═══════════════════════════════════════════════
   SHUFFLE
   Randomises option order; tracks which option
   is now correct after the shuffle.
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));

  /* Fisher-Yates shuffle */
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }

  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">📐 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.2 Kinematics &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
</script>
</body>
</html>
