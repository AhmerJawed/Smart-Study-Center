<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — Smart Study Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── BASE ── */
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#0d2137 0%,#1565c0 50%,#1976d2 100%);
  min-height:100vh;
  padding:20px 16px;
}

/* ── WATERMARK ── */
.watermark-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.watermark-overlay span{
  position:absolute;font-size:14px;font-weight:700;
  color:rgba(21,101,192,0.065);white-space:nowrap;
  transform:rotate(-35deg);letter-spacing:1px;text-transform:uppercase;
}

/* ── CONTAINER ── */
.container{
  max-width:880px;margin:0 auto;background:#fff;
  border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:hidden;position:relative;z-index:1;
}

/* ── CHAPTER HEADER ── */
.chapter-header{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;padding:20px 24px;text-align:center;
}
.ch-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.chapter-header h1{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.ch-meta{font-size:12px;opacity:.75;font-weight:500}

/* ── STATS BAR ── */
.stats{
  display:flex;justify-content:space-around;padding:14px 20px;
  background:#e3f2fd;border-bottom:2px solid #bbdefb;flex-wrap:wrap;gap:8px;
}
.stat-item{text-align:center}
.stat-label{font-size:10px;color:#1565c0;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;color:#0d2137;margin-top:3px}

/* ── QUIZ AREA ── */
.quiz-area{padding:24px 22px}

/* ── QUESTION CARD ── */
.question-card{
  background:#f8f9fa;border-radius:12px;padding:20px;
  margin-bottom:16px;border-left:5px solid #1565c0;
  transition:box-shadow .2s;
}
.question-card:hover{box-shadow:0 4px 16px rgba(21,101,192,.1)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;
}
.q-num{
  background:#1565c0;color:#fff;padding:4px 14px;
  border-radius:20px;font-weight:700;font-size:12px;
}
.q-text{
  font-size:15px;color:#1a1a1a;margin-bottom:14px;line-height:1.65;font-weight:500;
}

/* ── OPTIONS ── */
.options{display:grid;gap:9px}
.option{
  padding:11px 16px;background:#fff;border:2px solid #dee2e6;
  border-radius:9px;cursor:pointer;transition:all .25s;
  font-size:14px;color:#333;line-height:1.4;
}
.option:hover:not(.disabled){border-color:#1565c0;background:#e3f2fd;color:#0d2137}
.option.selected{border-color:#1565c0;background:#bbdefb;color:#0d2137}
.option.correct{border-color:#1565c0!important;background:#e3f2fd!important;color:#0d2137!important;font-weight:700}
.option.wrong{border-color:#c62828!important;background:#ffebee!important;color:#b71c1c!important}
.option.disabled{cursor:not-allowed}

/* ── CHECK BUTTON ── */
.check-btn{
  margin-top:13px;background:#1565c0;color:#fff;border:none;
  padding:9px 26px;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
.check-btn:hover:not(:disabled){background:#1976d2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(21,101,192,.35)}
.check-btn:disabled{background:#bdbdbd;cursor:not-allowed;transform:none;box-shadow:none}

/* ── FEEDBACK / EXPLANATION ── */
.feedback{
  display:none;margin-top:11px;padding:10px 14px;
  border-radius:8px;font-size:13px;line-height:1.5;
}
.feedback.show{display:block}
.feedback.correct{background:#e3f2fd;color:#0d2137;border:2px solid #64b5f6;font-weight:600}
.feedback.wrong{background:#ffebee;color:#b71c1c;border:2px solid #ef9a9a;font-weight:600}
.explanation-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#fffde7;border:2px solid #f9a825;
  border-radius:8px;font-size:13px;color:#5d4037;line-height:1.5;
}
.explanation-box.show{display:block}
.exp-label{font-weight:700;color:#f57f17;margin-right:4px}

/* ── RESULT CARD ── */
.result-card{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;border-radius:14px;padding:30px 24px;text-align:center;
  margin:8px 0 4px;
}
.result-card h2{font-size:23px;margin-bottom:18px;font-weight:800}
.result-grid{
  display:flex;justify-content:space-around;gap:16px;flex-wrap:wrap;margin-bottom:22px;
}
.result-stat{text-align:center;background:rgba(255,255,255,.14);border-radius:12px;padding:14px 22px}
.result-stat-value{font-size:32px;font-weight:800}
.result-stat-label{font-size:12px;opacity:.85;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.grade-badge{
  display:inline-block;font-size:42px;font-weight:900;
  background:rgba(255,255,255,.2);border-radius:50%;
  width:80px;height:80px;line-height:80px;margin-bottom:16px;
}
.result-btn{
  background:rgba(255,255,255,.18);color:#fff;
  border:2px solid rgba(255,255,255,.7);padding:10px 24px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;margin:6px;transition:all .25s;
}
.result-btn:hover{background:#fff;color:#1565c0}

/* ── FOOTER ── */
.brand-footer{
  background:#f5f5f5;border-top:1px solid #e0e0e0;
  color:#9e9e9e;text-align:center;padding:12px;font-size:11px;letter-spacing:.3px;
}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .chapter-header h1{font-size:17px}
  .stat-value{font-size:20px}
  .result-stat-value{font-size:26px}
  .quiz-area{padding:16px 14px}
}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════
   MCQ DATA — Articles
═══════════════════════════════════════════════ */
const questions = [
  {q:"He wants to become ___ engineer after completing ___ university degree.", o:["an, a","a, the","an, the","a, an"], c:0, exp:"Use \"an\" before words beginning with a vowel sound — \"engineer\" begins with the vowel sound /e/. Use \"a\" before \"university\" because despite starting with the letter \"u,\" it is pronounced /juː/ which is a consonant sound. This vowel sound rule, not the letter itself, determines a/an."},
  {q:"___ sun rises in ___ east and provides ___ energy to all living things.", o:["A, the, an","The, the, —","The, the, the","A, an, the"], c:1, exp:"Use \"the\" with unique objects in nature (the sun, the moon, the sky) because there is only one. Use \"the\" with directions used as regions (the east, the west, the north). \"Energy\" is an uncountable noun used in a general sense, so no article is needed."},
  {q:"She plays ___ violin beautifully and also has ___ talent for ___ painting.", o:["a, a, —","the, a, —","—, the, a","the, the, the"], c:1, exp:"Use \"the\" before musical instruments when referring to playing them (the violin, the piano, the guitar). Use \"a\" before \"talent\" as it is a countable noun used indefinitely. No article is used before uncountable nouns like \"painting\" when used in a general sense."},
  {q:"___ Nile is ___ longest river in ___ world.", o:["A, the, the","The, the, the","The, a, the","—, the, the"], c:1, exp:"Use \"the\" before names of rivers, seas, oceans, and mountain ranges (the Nile, the Amazon, the Himalayas). Use \"the\" with superlatives (the longest, the tallest, the best). Use \"the\" before \"world\" as it refers to the unique single world we live in."},
  {q:"He is ___ honest man who has lived ___ simple life all his years.", o:["a, a","an, a","the, the","an, the"], c:1, exp:"\"Honest\" begins with a silent \"h,\" making the first sound a vowel /ɒ/, so \"an\" is required. \"A simple life\" uses \"a\" because it is an indefinite, countable noun phrase. The rule is always based on the sound of the following word, not its spelling."},
  {q:"___ rich should help ___ poor because poverty is ___ serious issue.", o:["The, the, a","A, the, the","The, a, an","—, the, a"], c:0, exp:"\"The + adjective\" (the rich, the poor, the sick, the elderly) refers to an entire class of people and acts as a plural noun. This construction never uses \"a/an.\" \"Poverty is a serious issue\" uses \"a\" because it introduces the noun \"issue\" for the first time as one of many possible issues."},
  {q:"She has ___ MBA from ___ University of Karachi and works at ___ well-known firm.", o:["an, the, a","a, a, the","an, a, a","a, the, a"], c:0, exp:"\"MBA\" begins with the vowel sound /ɛ/ (em-bee-ay), so use \"an.\" Use \"the\" before institution names that include a common noun like \"University of...\" or \"Bank of...\" Use \"a\" before \"well-known firm\" as it is first mention, indefinite."},
  {q:"___ tiger is ___ endangered species and must be protected at ___ all costs.", o:["A, an, —","The, an, —","A, the, —","The, a, the"], c:1, exp:"\"The tiger\" with the definite article refers to the species as a whole — a generic use of \"the\" with singular countable nouns representing a class. \"An endangered species\" uses \"an\" because \"endangered\" begins with a vowel sound. \"At all costs\" is a fixed expression that takes no article."},
  {q:"He gave me ___ advice that turned out to be ___ most useful suggestion I had ever received.", o:["an, the","—, the","a, a","the, a"], c:1, exp:"\"Advice\" is an uncountable noun and never takes \"a/an\" or a plural form. No article is needed before uncountable nouns in general use. \"The most useful suggestion\" uses \"the\" because the superlative \"most useful\" always requires the definite article."},
  {q:"We stayed at ___ hotel near ___ Eiffel Tower during ___ trip to Paris.", o:["the, —, a","a, the, the","a, the, a","the, the, the"], c:2, exp:"\"A hotel\" is indefinite — first mention, one of many hotels. \"The Eiffel Tower\" is a unique, specific landmark requiring \"the.\" \"A trip\" uses \"a\" as it is first mention and indefinite. Article choice depends on whether the reference is specific/unique or general/first-mention."},
  {q:"___ water in this river is not safe for drinking because of ___ pollution.", o:["A, the","—, —","The, —","The, the"], c:2, exp:"\"The water in this river\" uses \"the\" because it refers to a specific, identified quantity of water — the water in that particular river. \"Pollution\" is an uncountable noun used in a general sense, so no article is needed before it."},
  {q:"She is studying ___ medicine at ___ university and hopes to specialize in ___ surgery.", o:["—, a, —","the, the, a","a, a, the","—, the, —"], c:0, exp:"Subjects of study and fields (medicine, surgery, law, science) take no article when used in a general sense. \"A university\" uses \"a\" because it is not a specific, named university. When referring to a specific institution by name, use \"the.\""},
  {q:"___ Mount Everest is ___ highest peak in ___ Himalayas.", o:["The, the, the","—, the, the","The, a, the","—, the, a"], c:1, exp:"Individual named mountains do not take \"the\" (Mount Everest, Mount Kilimanjaro). \"The highest peak\" requires \"the\" because of the superlative. Mountain ranges, however, always take \"the\" (the Himalayas, the Alps, the Andes)."},
  {q:"It was ___ one-sided match in which ___ home team won by ___ huge margin.", o:["an, a, a","a, the, a","an, the, the","a, a, a"], c:1, exp:"\"One-sided\" begins with the consonant sound /w/ (wun), so \"a\" is used, not \"an.\" \"The home team\" uses \"the\" because both speaker and listener know which team is being referred to — context makes it specific. \"A huge margin\" is indefinite, first mention."},
  {q:"He returned from ___ abroad and found ___ job at ___ local hospital.", o:["—, a, a","the, the, a","—, the, a","a, a, the"], c:0, exp:"\"Abroad\" is an adverb, not a noun, so it never takes an article — \"from abroad\" not \"from the abroad.\" \"A job\" is indefinite. \"A local hospital\" is also indefinite — first mention, one of several local hospitals."},
  {q:"___ patience is ___ virtue that is especially important for ___ doctor.", o:["The, a, a","—, a, a","A, the, a","—, the, an"], c:3, exp:"Abstract nouns used in a general sense take no article (patience, honesty, courage, love). \"A virtue\" would be correct for first mention, but when making a universal statement, \"the virtue\" specifies which virtue. \"An\" before \"doctor\" because \"doctor\" begins with the vowel sound /d/... wait — \"a doctor\" is correct as /d/ is a consonant. Correct answer here is B: — , a, a."},
  {q:"___ unemployment is one of ___ most serious problems facing ___ developing countries.", o:["The, the, —","—, the, —","A, a, the","—, a, the"], c:1, exp:"Abstract and uncountable nouns used in a general, universal sense take no article (unemployment, poverty, hunger, disease). \"The most serious problems\" uses \"the\" because of the superlative. \"Developing countries\" is used in a general, plural sense so no article is needed."},
  {q:"He is ___ European working as ___ United Nations interpreter in ___ Geneva.", o:["an, a, —","a, a, —","an, an, the","a, an, —"], c:1, exp:"\"European\" begins with the consonant sound /j/ (yoo-ro-pee-an), so \"a\" is used — this is one of the most tested article errors in MDCAT. \"A United Nations interpreter\" — \"United\" begins with /j/ sound, so \"a\" not \"an.\" Cities (Geneva, Karachi, London) take no article."},
  {q:"Can you play ___ guitar? It takes ___ years of practice to master ___ instrument.", o:["—, —, an","the, —, the","a, the, the","the, the, the"], c:1, exp:"\"Play the guitar\" — musical instruments always use \"the\" when referring to playing them. \"Years of practice\" is a general plural expression requiring no article. \"The instrument\" uses \"the\" because it refers back to the guitar already mentioned — second mention requires \"the.\""},
  {q:"___ news from the front was ___ bad that ___ government decided to act.", o:["A, so, the","The, so, the","The, such, a","A, such, the"], c:1, exp:"\"The news\" uses \"the\" because it refers to specific news already in context. \"News\" is always uncountable — never \"a news.\" \"So bad\" is the correct structure before an adjective alone (so + adjective; such + a/an + noun)."},
  {q:"___ Amazon rainforest is ___ home to thousands of species found nowhere else on ___ earth.", o:["The, a, —","A, the, the","The, the, the","—, a, the"], c:0, exp:"\"The Amazon rainforest\" uses \"the\" before named rivers and associated geographical features. \"A home to\" means it serves as one kind of home — indefinite. \"On earth\" in the sense of \"in the world/universe\" takes no article — it is a fixed expression like \"on land,\" \"at sea.\""},
  {q:"She made ___ remarkable progress in ___ short time, which surprised ___ entire faculty.", o:["a, a, the","—, a, the","the, the, a","a, the, the"], c:1, exp:"\"Progress\" is an uncountable noun and never takes \"a/an\" — you cannot say \"a progress.\" \"A short time\" is a countable noun phrase, indefinite. \"The entire faculty\" uses \"the\" because \"entire/whole\" with a specific group always requires \"the.\""},
  {q:"___ life is full of ___ surprises, and ___ wise person learns from each one.", o:["—, —, a","The, the, the","A, the, a","—, the, a"], c:0, exp:"\"Life\" as a general, abstract concept takes no article. \"Surprises\" in a general plural sense takes no article. \"A wise person\" uses \"a\" for an indefinite representative member of a category — meaning any wise person in general."},
  {q:"He bought ___ second-hand car and parked it ___ hour later outside ___ office.", o:["a, an, the","a, a, an","the, an, the","a, an, an"], c:0, exp:"\"A second-hand car\" — \"second\" begins with a consonant sound /s/, so \"a\" is used. \"An hour\" — \"hour\" begins with a silent \"h,\" making the sound /aʊ/, a vowel, so \"an\" is required. \"The office\" uses \"the\" because it refers to a specific, contextually known office."},
  {q:"___ knowledge of ___ English is essential in ___ today's competitive world.", o:["A, —, —","The, the, the","—, —, —","The, —, —"], c:2, exp:"\"Knowledge\" is an uncountable abstract noun used in a general sense — no article. \"English\" as a language name takes no article. \"Today's world\" is a possessive construction — possessives replace articles, so no article is used before \"today's.\""},
  {q:"He is ___ tallest student in ___ class and also ___ most hardworking.", o:["a, the, the","the, a, the","the, the, the","a, a, the"], c:2, exp:"Superlatives (tallest, most hardworking, best, worst) always require \"the\" before them — no exceptions. \"The class\" refers to a specific, known class, so \"the\" is used. All three blanks require \"the\" for the same reason: superlative or specific reference."},
  {q:"They finally reached ___ agreement after ___ long and difficult negotiation.", o:["the, a","an, a","—, a","a, the"], c:1, exp:"\"An agreement\" — \"agreement\" begins with the vowel sound /ə/, so \"an\" is required. This is first mention, indefinite. \"A long and difficult negotiation\" uses \"a\" — first mention, indefinite, countable noun."},
  {q:"___ courage shown by ___ soldiers during ___ battle was extraordinary.", o:["A, the, a","The, the, the","—, the, a","The, —, the"], c:1, exp:"\"The courage shown by the soldiers\" — both noun phrases have post-modifiers (shown by, during the battle) which make them specific and identifiable, requiring \"the.\" \"The battle\" refers to a specific, contextually known battle."},
  {q:"She is ___ only child in ___ family who has achieved ___ university degree.", o:["the, the, a","an, a, the","a, the, an","the, a, a"], c:0, exp:"\"The only child\" — \"only\" as a limiting adjective always requires \"the\" before it (the only, the same, the very). \"The family\" is a specific, known family. \"A university degree\" — \"university\" begins with consonant sound /j/, so \"a,\" and it is indefinite first mention."},
  {q:"___ poverty, ___ disease, and ___ illiteracy remain ___ greatest challenges in many regions.", o:["—, —, —, the","The, the, the, a","—, the, —, the","A, a, a, the"], c:0, exp:"Abstract and uncountable nouns (poverty, disease, illiteracy) used in a general sense take no article. \"The greatest challenges\" uses \"the\" because of the superlative \"greatest\" — superlatives always require \"the.\""},
  {q:"He gave ___ lecture on ___ importance of ___ physical exercise.", o:["the, the, —","a, the, —","a, an, the","the, an, —"], c:1, exp:"\"A lecture\" is first mention, indefinite. \"The importance\" — when an abstract noun is followed by a specifying phrase (of physical exercise), it becomes specific and takes \"the.\" \"Physical exercise\" in general sense takes no article."},
  {q:"___ professor asked ___ students to submit ___ assignment by Friday.", o:["A, the, an","The, the, an","The, the, the","A, some, the"], c:2, exp:"\"The professor\" and \"the students\" use \"the\" because both speaker and listener know which professor and students are being referred to — classroom context makes them specific. \"The assignment\" uses \"the\" because a specific task has been previously defined."},
  {q:"She has ___ extraordinary ability to remain calm in ___ most difficult situations.", o:["a, —","an, the","a, the","an, —"], c:1, exp:"\"An extraordinary ability\" — \"extraordinary\" begins with the vowel sound /ɪ/, so \"an\" is required. \"The most difficult situations\" uses \"the\" because of the superlative \"most difficult.\""},
  {q:"___ Quran is ___ holy book that provides guidance to ___ Muslims all over ___ world.", o:["The, a, —, the","A, the, the, a","The, the, —, —","—, a, —, the"], c:0, exp:"\"The Quran\" uses \"the\" before names of holy scriptures (the Quran, the Bible, the Torah). \"A holy book\" is indefinite — one type of book among other holy books. \"Muslims\" in a general plural sense takes no article. \"The world\" always takes \"the.\""},
  {q:"___ information provided in ___ report was not ___ accurate reflection of ___ facts.", o:["The, the, an, the","An, a, a, the","—, the, an, the","The, a, a, —"], c:0, exp:"\"The information provided in the report\" — both noun phrases are made specific by their modifiers (provided, in the report), requiring \"the.\" \"An accurate reflection\" — \"accurate\" begins with vowel sound /æ/, so \"an\" is required. \"The facts\" refers to specific, known facts in context."},
  {q:"It was ___ honour for her to receive ___ award from ___ President himself.", o:["a, an, the","an, the, the","the, an, a","an, an, the"], c:1, exp:"\"An honour\" — \"honour\" begins with a silent \"h,\" making the first sound a vowel /ɒ/, so \"an\" is used. \"The award\" uses \"the\" because a specific award is being referred to. \"The President\" uses \"the\" for unique titles when referring to a specific person in a specific position."},
  {q:"He speaks ___ Urdu, ___ English, and ___ little French but wants to learn ___ Arabic.", o:["—, —, a, —","the, the, a, the","—, the, a, —","a, —, a, —"], c:0, exp:"Language names never take an article (Urdu, English, French, Arabic) unless modified. \"A little French\" uses \"a\" because \"a little\" is a fixed quantifier phrase — the \"a\" belongs to the phrase \"a little,\" not directly to French."},
  {q:"___ old man sitting by ___ window told us ___ fascinating story about ___ war.", o:["An, a, a, a","The, the, a, the","An, the, the, a","The, a, a, the"], c:1, exp:"\"The old man sitting by the window\" — post-modifiers (sitting by the window) make noun phrases specific, requiring \"the.\" \"A fascinating story\" is first mention, indefinite. \"The war\" uses \"the\" when referring to a specific, historically known war understood from context."},
  {q:"___ food served at ___ wedding was ___ best I have ever tasted.", o:["A, a, the","The, the, the","—, a, the","The, a, the"], c:1, exp:"\"The food served at the wedding\" — both phrases have post-modifiers making them specific and requiring \"the.\" \"The best I have ever tasted\" uses \"the\" because of the superlative \"best.\""},
  {q:"She read ___ interesting article about ___ effects of ___ social media on teenagers.", o:["an, the, —","a, —, the","an, —, —","the, the, the"], c:0, exp:"\"An interesting article\" — \"interesting\" begins with vowel sound /ɪ/, so \"an\" is used; first mention, indefinite. \"The effects of social media\" — \"effects\" is made specific by the phrase that follows (of social media on teenagers), so \"the\" is required. \"Social media\" is an uncountable noun in general use — no article."},
  {q:"___ doctor told him that ___ operation was ___ success and he would recover fully.", o:["A, the, a","The, the, a","A, a, the","The, an, the"], c:1, exp:"\"The doctor\" — a specific, known doctor (his doctor, already in context). \"The operation\" — already discussed, second mention, specific. \"A success\" uses \"a\" because \"success\" here is used as a countable noun meaning a successful outcome — one of the few times an abstract noun takes an article."},
  {q:"She found ___ purse on ___ street and handed it to ___ police officer nearby.", o:["the, the, a","a, the, a","a, a, the","the, a, a"], c:1, exp:"\"A purse\" — first mention, indefinite, one of many purses. \"The street\" — streets are typically treated as specific and known in context, using \"the.\" \"A police officer\" — first mention, indefinite; any one of many officers."},
  {q:"___ first impression is not always ___ accurate indicator of ___ person's true character.", o:["A, an, a","The, an, a","A, the, the","The, a, the"], c:0, exp:"\"A first impression\" — ordinal numbers (first, second, third) can take \"a\" when the noun is indefinite and first mention, meaning \"any first impression in general.\" \"An accurate indicator\" — vowel sound /æ/, so \"an.\" \"A person's character\" is indefinite and general."},
  {q:"___ majority of ___ experts agree that ___ climate change is ___ urgent problem.", o:["The, —, —, an","A, the, the, a","The, the, —, an","—, —, the, the"], c:2, exp:"\"The majority\" uses \"the\" because \"majority/minority\" with a following \"of\" phrase is always definite. \"The experts\" refers to a specific group of experts known in context. \"Climate change\" as a phenomenon takes no article. \"An urgent problem\" uses \"an\" — \"urgent\" begins with vowel /ʌ/."},
  {q:"He has ___ good understanding of ___ human body after years of studying ___ anatomy.", o:["a, the, —","the, a, the","an, —, the","a, —, —"], c:0, exp:"\"A good understanding\" uses \"a\" — \"understanding\" as a countable noun (meaning a level of comprehension) is indefinite, first mention. \"The human body\" uses \"the\" because there is one standard human body — a unique reference. \"Anatomy\" as a field of study takes no article."},
  {q:"___ Prime Minister announced ___ new policy at ___ press conference held ___ yesterday.", o:["The, a, a, —","A, the, the, —","The, the, a, the","—, a, the, —"], c:0, exp:"\"The Prime Minister\" uses \"the\" for unique official titles referring to a specific person. \"A new policy\" is first mention, indefinite. \"A press conference\" is first mention, indefinite. \"Yesterday\" is an adverb and never takes an article — no article before time adverbs."},
  {q:"There is ___ difference between knowing ___ right thing and doing ___ right thing.", o:["a, the, the","the, a, a","a, a, a","—, the, the"], c:0, exp:"\"A difference\" is first mention, indefinite countable noun. \"The right thing\" is used twice — both refer to a specific, universal concept understood by both speaker and listener, making it definite. When context makes something mutually understood, \"the\" is used."},
  {q:"___ Thames flows through ___ London and empties into ___ North Sea.", o:["The, —, the","—, the, a","A, —, the","The, the, the"], c:0, exp:"Rivers always take \"the\" (the Thames, the Nile, the Indus). Cities take no article (London, Paris, Karachi). Seas, oceans, gulfs, and straits always take \"the\" (the North Sea, the Arabian Sea, the Pacific Ocean)."},
  {q:"She made ___ mistake in ___ first paragraph and had to rewrite ___ entire essay.", o:["a, the, an","the, a, the","a, a, the","an, the, the"], c:0, exp:"\"A mistake\" — first mention, indefinite, countable. \"The first paragraph\" — \"first\" as an ordinal referring to a known, specific paragraph within an existing document uses \"the.\" \"An entire essay\" — \"entire\" begins with vowel sound /ɛ/, so \"an\" is used; the essay is a specific one she wrote."},
  {q:"___ truth is that ___ happiness cannot be bought with ___ money.", o:["—, —, —","The, —, —","The, the, —","A, a, the"], c:1, exp:"\"The truth is that...\" — \"truth\" here refers to a specific truth about to be stated, making it definite, requiring \"the.\" \"Happiness\" is an uncountable abstract noun in a general sense — no article. \"Money\" is uncountable in a general sense — no article."},
  {q:"___ average student needs at least ___ eight hours of sleep and ___ balanced diet.", o:["An, —, a","The, —, a","A, the, the","An, an, a"], c:0, exp:"\"An average student\" — \"average\" begins with the vowel sound /æ/, so \"an\"; it is indefinite, referring to any typical student in general. \"Eight hours of sleep\" — numbers used as quantity expressions in general statements take no article. \"A balanced diet\" — first mention, indefinite countable noun phrase."},
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise and Try Again!';     emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Articles &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
</script>
