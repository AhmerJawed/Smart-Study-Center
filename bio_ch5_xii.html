<script>
/* ═══════════════════════════════════════════════
   MCQ DATA — chAPTER 05 : ACELLULAR LIFE

const questions = [
  {q:"The word \"virus\" is derived from a Latin word meaning:", o:["Slimy liquid or poison","Tiny filterable agent","Disease-causing non-living particle","Obligate cellular parasite"], c:0, exp:"The name \"virus\" comes from the Latin word meaning \"slimy liquid or poison,\" reflecting its pathogenic and toxic nature in early descriptions."},
{q:"charles chamberland invented the chamberland-Pasteur porcelain water filter in which year?", o:["1872","1884","1892","1899"], c:1, exp:"chamberland, an assistant of Louis Pasteur, invented this filter in 1884 to isolate microorganisms from infectious samples by removing bacteria."},
{q:"The chamberland-Pasteur filter has a pore size of:", o:["0.01 μm","0.5 μm","0.1 μm","1.0 μm"], c:2, exp:"The 0.1 μm pore size is small enough to remove all bacteria ≥ 0.2 μm from any liquid passed through it, while allowing viruses to pass."},
{q:"Who first used the chamberland filter in 1892 to study infectious tobacco plant extract?", o:["Martinus Beijerinck","charles chamberland","W.M. Stanley","Dmitri Ivanovsky"], c:3, exp:"Ivanovsky found that the filtrate of infected tobacco leaf — after bacterial removal — still caused disease, suggesting a smaller infectious agent existed."},
{q:"Martinus Beijerinck in 1899 described the infectious agent in tobacco mosaic disease as:", o:["A contagious living fluid","A filterable bacterium-like particle","A crystallizable disease-causing agent","An obligate intracellular nuclear parasite"], c:0, exp:"Beijerinck termed it a \"contagious living fluid\" because the agent was smaller than any known bacterium yet retained full infectivity after filtration."},
{q:"W.M. Stanley first crystallized the Tobacco Mosaic Virus (TMV) in:", o:["1899","1935","1920","1950"], c:1, exp:"W.M. Stanley crystallized TMV in 1935, proving its non-cellular nature and enabling the modern field of virology to develop."},
{q:"Viruses are termed intracellular obligate parasites because:", o:["They replicate freely in soil or water outside a host","They generate ATP using their own mitochondria","They must rely entirely on a living host cell's machinery for replication","They have nucleic acid that replicates without host enzymes"], c:2, exp:"Viruses lack all organelles and metabolic machinery, making them completely dependent on host cells for energy production and replication."},
{q:"Which of the following is a NON-LIVING characteristic of viruses?", o:["They possess nucleic acid as genome","They can undergo mutation","They interact genetically with host organisms","They can crystallize and be stored indefinitely outside a host"], c:3, exp:"Crystallization and indefinite storage without metabolic activity are non-living properties; no true living organism can be crystallized and revived."},
{q:"The outer protein coat of a virus is termed:", o:["Capsid","Envelope","Matrix","Nucleoprotein"], c:0, exp:"The capsid is the outer protein shell of the virus made of identical units called capsomeres, providing structural protection to the viral genome."},
{q:"The identical protein subunits that constitute the viral capsid are called:", o:["Glycoproteins","Capsomeres","Lipoproteins","Histones"], c:1, exp:"Capsomeres are identical protein units whose arrangement and number are specific to each virus type, forming either icosahedral or helical structures."},
{q:"In helical capsids, capsomeres arranged in a hollow coil give the virus:", o:["A polyhedral shape","A spherical shape","A rod shape","A tadpole shape"], c:2, exp:"In helical structure, capsomeres form a hollow coil resulting in a rod shape; the classic example is Tobacco Mosaic Virus (TMV)."},
{q:"The viral lipoprotein envelope is derived from:", o:["Newly synthesized viral lipoproteins during replication","Capsid proteins rearranging at the cell surface","Viral-encoded membrane structures independent of the host","The host cell's surface membrane"], c:3, exp:"The lipoprotein layer (envelope) covering the capsid is acquired from the host cell's surface membrane during viral budding, with glycoprotein spikes added."},
{q:"The glycoprotein spikes on the viral envelope primarily function to:", o:["Recognize and attach to specific host cell receptors","Degrade host cell DNA during infection","Synthesize new viral capsomeres inside the host","Form the inner core of the viral genome"], c:0, exp:"Glycoprotein spikes act as \"keys\" that recognize complementary receptor \"locks\" on host cell surfaces, enabling specific viral entry."},
{q:"Viruses that infect plants are classified as:", o:["Bacteriophages","Phytophages","Zoophages","Retroviruses"], c:1, exp:"Plant viruses are called phytophages; they commonly have RNA genomes and rod-shaped capsids, such as TMV and CaMV."},
{q:"TMV (Tobacco Mosaic Virus) is formed by approximately how many protein coat subunits?", o:["1,300","1,580","2,130","3,000"], c:2, exp:"TMV is formed by 2,130 protein coat subunits (capsomeres) arranged helically; each capsomere contains approximately 158 amino acids."},
{q:"In the Baltimore classification system (1971), viruses were divided into how many groups?", o:["4","5","6","7"], c:3, exp:"David Baltimore classified viruses into 7 groups based on genomic structure and replication strategy; this classification was modified in 2018-2019 due to evolutionary insights."},
{q:"Positive sense single-stranded RNA viruses can:", o:["Be directly translated by host ribosomes without prior transcription","Only replicate after reverse transcription into DNA","Synthesize double-stranded RNA intermediates first","Only use host RNA-dependent RNA polymerase for replication"], c:0, exp:"Positive sense RNA acts directly as mRNA and is immediately translated by host ribosomes, as seen with Coronavirus, Dengue, and Hepatitis C virus."},
{q:"HIV is classified as a retrovirus, which belongs to which group in the Baltimore classification?", o:["Double-stranded RNA viruses","Single-stranded RNA viruses with DNA intermediate","Negative sense single-stranded RNA viruses","Double-stranded DNA viruses with RNA intermediate"], c:1, exp:"HIV uses reverse transcriptase to convert its RNA genome into DNA; this reverse flow of genetic information defines retroviruses."},
{q:"Which enzyme does HIV use to convert its RNA genome into DNA inside the host cell?", o:["Integrase","RNA polymerase","Reverse transcriptase","DNA ligase"], c:2, exp:"HIV's reverse transcriptase performs reverse transcription, converting the single-stranded RNA genome into complementary DNA inside the host cell."},
{q:"After HIV DNA is formed, which enzyme helps incorporate it into the host cell's nucleus?", o:["Reverse transcriptase","RNA polymerase","Protease","Integrase"], c:3, exp:"Integrase allows the viral DNA (provirus) to become permanently integrated into the host cell's chromosomal DNA, where it may remain dormant for years."},
{q:"Parvoviruses are examples of:", o:["Single-stranded DNA viruses","Double-stranded DNA viruses","Double-stranded RNA viruses","Positive sense single-stranded RNA viruses"], c:0, exp:"Parvoviruses contain single-stranded DNA; they become double-stranded in the host cell before transcription and mRNA synthesis can occur."},
{q:"Reoviruses are examples of which group in the Baltimore classification?", o:["Single-stranded RNA with DNA intermediate","Double-stranded RNA viruses","Negative sense single-stranded RNA viruses","Double-stranded DNA viruses with RNA intermediate"], c:1, exp:"Reoviruses have double-stranded RNA as their genome and use cell enzymes to produce single-stranded mRNA for translation and replication."},
{q:"Hepatitis B virus belongs to which category in the Baltimore classification?", o:["Positive sense single-stranded RNA","Negative sense single-stranded RNA","Double-stranded DNA with RNA intermediate","Double-stranded RNA viruses"], c:2, exp:"Hepatitis B has dsDNA that forms RNA during replication; that RNA is then reverse transcribed back to replicate the genome — placing it in Group VII."},
{q:"The term \"bacteriophage\" literally translates to:", o:["Bacteria producer","Bacteria infector","Bacteria protector","Bacteria eater"], c:3, exp:"\"Bacteriophage\" is derived from Greek/Latin meaning \"bacteria eater,\" referring to viruses that infect and kill bacteria."},
{q:"The three major structures of tailed bacteriophage T4 are:", o:["Head, tail, and base plate","Head, collar, and tail pins","Capsid, genome, and envelope","Collar, sheath, and whiskers"], c:0, exp:"T4 bacteriophage has three major structures: head (DNA inside), tail (acts as DNA delivery channel), and base plate (for host cell identification and attachment)."},
{q:"The base plate of bacteriophage T4 usually has how many tail fibers?", o:["3","6","8","12"], c:1, exp:"The discoidal base plate contains 6 tail fibers that provide strong attachment to host cell receptors on the distal end, enabling viral recognition."},
{q:"Which enzyme is present at the bacteriophage base plate and helps penetrate the bacterial cell covering?", o:["DNA polymerase","Endonuclease","Lysozyme","Protease"], c:2, exp:"Lysozyme at the base plate surrounds and penetrates the proteinaceous bacterial coverings, allowing phage genome to be injected into the host bacterium."},
{q:"In the lytic cycle, after DNA injection, the remaining phage protein components outside the bacterium are called:", o:["Prophage","Provirus","Empty capsomere","Ghost"], c:3, exp:"After viral DNA is injected through the hollow tail tube into the bacterium, the remaining protein shell left outside is called the \"ghost.\""},
{q:"What is the correct sequence of steps in the lytic cycle of bacteriophage?", o:["Attachment → Penetration → Biosynthesis → Maturation → Lysis","Attachment → Biosynthesis → Penetration → Maturation → Lysis","Penetration → Attachment → Maturation → Biosynthesis → Lysis","Attachment → Penetration → Maturation → Biosynthesis → Lysis"], c:0, exp:"The five sequential steps of the lytic cycle are: Attachment, Genome Penetration, Biosynthesis, Maturation, and finally Lysis and Release."},
{q:"During the lytic cycle, approximately how many phage progeny are released upon bacterial lysis?", o:["10-50","100-200","200-500","500-1000"], c:1, exp:"Newly formed bacteriophages release lysozyme to break the bacterial wall, releasing approximately 100-200 phage progeny into the surrounding environment."},
{q:"In the lysogenic cycle, when phage DNA integrates into the bacterial chromosome, the integrated viral DNA is called:", o:["Provirus","Ghost","Prophage","Retrophage"], c:2, exp:"The integrated bacteriophage genome within the bacterial chromosome is called prophage; it replicates passively along with the bacterium's own chromosome."},
{q:"In the lysogenic cycle, prophage genes can be triggered to re-enter the lytic cycle by:", o:["Temperature drop below 10°C","Increased glucose availability in host","Rapid host cell division rate","Environmental triggers like radiations and chemicals"], c:3, exp:"Radiations and chemical stimulants trigger specific enzymes to cut out the integrated viral DNA from bacterial genome, switching it to the active lytic cycle."},
{q:"AIDS caused by HIV was first reported in:", o:["1981 in California","1975 in New York","1979 in San Francisco","1986 in Los Angeles"], c:0, exp:"AIDS was first reported in 1981 in California; it subsequently spread more broadly, particularly affecting developing countries worldwide."},
{q:"HIV is classified as a retrovirus primarily because it:", o:["Infects specifically Helper T lymphocytes","Uses reverse transcription (RNA → DNA)","Has a lipid envelope with glycoprotein spikes","Can remain dormant as provirus for years"], c:1, exp:"Retroviruses are defined by their unique replication strategy of reverse transcription — converting RNA to DNA — the reverse of the normal cellular information flow."},
{q:"HIV contains:", o:["One RNA molecule and 6 genes","Three RNA molecules and 7 genes","Two RNA molecules and 9 genes","Two RNA molecules and 12 genes"], c:2, exp:"HIV contains two somewhat coiled and folded RNA molecules with 9 genes enclosed in a protein capsid; these genes code for viral structural proteins."},
{q:"In the HIV life cycle, in which step does the viral RNA get converted into DNA?", o:["Binding (Step 1)","Fusion (Step 2)","Integration (Step 4)","Reverse Transcription (Step 3)"], c:3, exp:"During Step 3 (Reverse Transcription), viral RNA makes new DNA using HIV's own reverse transcriptase enzyme — a defining feature of retroviruses."},
{q:"The integrated HIV DNA (provirus) in the host cell nucleus may remain inactive for:", o:["Several years","A few weeks","Several months","Only days before activation"], c:0, exp:"After integration, the provirus may remain inactive in the host cell nucleus for several years, producing few or no new copies of HIV during this latent phase."},
{q:"HIV specifically targets Helper T lymphocytes because:", o:["These cells lack MHC class I molecules entirely","Their surface has specific protein receptors recognized by HIV glycoprotein surface spikes","They are the most abundant among all immune cells","They cannot produce any antiviral cytokines"], c:1, exp:"T cells have specific protein receptors (CD4) that HIV glycoprotein surface spikes recognize and bind to, enabling cell entry via receptor-mediated endocytosis."},
{q:"The combination drug therapy used to treat HIV infection is known as:", o:["Antifungal therapy","Immunosuppressive therapy","Antiretroviral therapy (ART)","Antitoxin therapy"], c:2, exp:"ART (Antiretroviral Therapy) uses combinations of different medicines classified as enzyme inhibitors that inhibit viral enzyme activity to control HIV."},
{q:"Viroids were discovered by which scientist?", o:["Stanley Prusiner","David Baltimore","W.M. Stanley","Theodor O. Diener"], c:3, exp:"Theodor O. Diener, an American plant pathologist, discovered viroids in 1971 as the smallest known infectious agents — simple naked RNA molecules."},
{q:"Viroids differ from viruses primarily in that viroids:", o:["Completely lack any protein coat (are naked RNA)","Contain double-stranded DNA instead of RNA","Can replicate independently without a host","Infect animals and humans unlike plant viruses"], c:0, exp:"Viroids are simple nonenveloped single-stranded RNA molecules with some double-stranded regions but absolutely no protein coat, unlike all known viruses."},
{q:"The first viroid ever identified was:", o:["Eggplant latent viroid","Potato spindle tuber viroid","Avocado sunblotch viroid","Peach latent mosaic viroid"], c:1, exp:"Potato spindle tuber viroid was the first identified viroid; approximately 33 known viroid species currently exist, all causing plant diseases."},
{q:"Stanley B. Prusiner received the Nobel Prize for discovering prions in which year?", o:["1989","1993","1997","2001"], c:2, exp:"American biologist Stanley B. Prusiner discovered prions — infectious protein particles — and was awarded the Nobel Prize in 1997 for this discovery."},
{q:"Prions are structurally composed of:", o:["RNA without any protein coat","DNA without any protein coat","Lipids and RNA complex","Protein without any nucleic acid"], c:3, exp:"Prions are infectious protein molecules comprising 29 amino acids with a single disulfide bond; they contain absolutely no nucleic acid whatsoever."},
{q:"Which diseases are caused by prions?", o:["Trisomy 21, Alzheimer's disease, and mad cow disease","Hepatitis, dengue, and influenza","Cotton leaf curl, polio, and measles","AIDS, herpes, and rabies"], c:0, exp:"Prions found in body tissues and brain cause neurological diseases including Trisomy 21, Alzheimer's, insomnia (sleeplessness), and mad cow disease in cattle."},
{q:"Viroids mainly cause diseases in:", o:["Humans and primates","Plants","Bacteria","Both humans and animals equally"], c:1, exp:"Viroids mainly cause plant diseases; infected plants show distorted growth, and there is currently no evidence of viroids causing human disease."},
{q:"The smallest viroid discovered so far is how many nucleotides long?", o:["120","180","220","330"], c:2, exp:"The smallest viroid discovered is 220 nucleotides long; for comparison, the smallest known virus causing infection is around 2000 bases in size."},
{q:"Enveloped viruses like influenza and coronaviruses tend to survive best at which relative humidity range?", o:["70-90%","50-60%","30-50%","20-30%"], c:3, exp:"Enveloped viruses including influenza and coronaviruses have better survival rates at the lower humidity range of 20-30%, while non-enveloped viruses prefer higher humidity."},
{q:"Non-enveloped viruses like adenoviruses and rhinoviruses survive longer at which humidity level?", o:["70-90%","20-30%","40-50%","Below 10%"], c:0, exp:"Unlike enveloped viruses, non-enveloped viruses such as adenoviruses and rhinoviruses can tolerate and survive longer at higher humidity levels of 70-90%."},
{q:"Generally, a temperature of approximately how many degrees Celsius is enough to inactivate most viruses?", o:["45°C","60°C","75°C","90°C"], c:1, exp:"Temperature of 60°C and above is generally enough to inactivate most viruses; however, some can shelter in organic materials like blood, feces, and saliva."},
{q:"Which environmental factor is described as the major cause of viral decay in light-exposed environments?", o:["Temperature fluctuations","Relative humidity changes","UV radiation (light)","pH alterations"], c:2, exp:"UV radiation is the major cause of viral decay; it damages viral components, limits energy for viral attachment to host cells, and disrupts the viral replication cycle."},
{q:"Cotton Leaf Curl Disease, an economically significant disease in Pakistan, is caused by:", o:["Tobacco Mosaic Virus","Poliovirus","Hepatitis virus","Begomovirus"], c:3, exp:"Cotton Leaf Curl Disease is caused by Begomovirus and transmitted through white fly pest, causing leaf curling and significant reduction in cotton fiber quality."},
{q:"Viroids replicate by synthesizing new RNA using which enzyme?", o:["Host cell RNA polymerase","Viral reverse transcriptase","Host cell DNA polymerase","Viral RNA replicase"], c:0, exp:"Viroids synthesize new RNA from their genome as template by using the host cell enzyme RNA polymerase; they possess no enzymes of their own."},
{q:"The key difference between lytic and lysogenic cycles is that in the lysogenic cycle:", o:["The bacterium is immediately killed upon phage entry","Phage DNA integrates into host genome and replicates with it without immediate cell death","100-200 new phage particles are immediately released","The phage only injects RNA rather than DNA"], c:1, exp:"In the lysogenic cycle, phage viral genome joins with the host bacterial nucleic acid (prophage) and multiplies normally with the bacterium for generations without killing it."},
{q:"Bacteriophages (bacterial viruses) typically possess which type of genome?", o:["Single-stranded RNA","Double-stranded RNA","Double-stranded DNA","Positive sense single-stranded RNA"], c:2, exp:"Bacteriophages typically possess double-stranded DNA as their genome, located inside their polyhedral (icosahedral) head structure."},
{q:"Which of the following are examples of zoophages (animal viruses)?", o:["TMV, CaMV, and tobacco ringspot virus","T phages and X phages","Eggplant latent viroid and potato spindle tuber viroid","Rhinoviruses and Covid-19"], c:3, exp:"Zoophages (animal viruses) include Rhinoviruses and Covid-19; they are usually spherical in shape and can have either DNA or RNA as their genome."},
{q:"DNA viruses generally show more endurance than RNA viruses under extreme temperatures because:", o:["DNA is chemically more stable than RNA and less prone to temperature-induced denaturation","DNA viruses are always enveloped, providing extra thermal insulation","RNA viruses lack capsids and are directly exposed to the environment","DNA viruses are always double-stranded while RNA viruses are always single-stranded"], c:0, exp:"The superior chemical stability of DNA makes DNA viruses generally more resistant to extreme temperatures compared to RNA viruses, though extreme heat eventually damages both."},

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
   Randomises option order; tracks which option
   is now correct after the shuffle.
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));

  /* Fisher-Yates shuffle */
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }

  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">📖 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.2 Enzymes &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
// ── STICKY TIMER ──
let timeLeft = 68 * 60;
const timerDisplay = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');

const timerInterval = setInterval(() => {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerDisplay.textContent =
    String(mins).padStart(2,'0') + ':' +
    String(secs).padStart(2,'0');
  if(timeLeft <= 300){
    timerBox.classList.add('danger');
  }
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    timerDisplay.textContent = '⏰ TIME UP';
    showResult();
  }
  timeLeft--;
}, 1000);
</script>
