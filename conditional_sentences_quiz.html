<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conditional Sentences — Smart Study Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── BASE ── */
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#0d2137 0%,#1565c0 50%,#1976d2 100%);
  min-height:100vh;
  padding:20px 16px;
}

/* ── WATERMARK ── */
.watermark-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.watermark-overlay span{
  position:absolute;font-size:14px;font-weight:700;
  color:rgba(21,101,192,0.065);white-space:nowrap;
  transform:rotate(-35deg);letter-spacing:1px;text-transform:uppercase;
}

/* ── CONTAINER ── */
.container{
  max-width:880px;margin:0 auto;background:#fff;
  border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:visible;position:relative;z-index:1;
}

/* ── CHAPTER HEADER ── */
.chapter-header{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;padding:20px 24px;text-align:center;
  border-radius:18px 18px 0 0;
}
.ch-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.chapter-header h1{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.ch-meta{font-size:12px;opacity:.75;font-weight:500}

/* ── STATS BAR ── */
.stats{
  display:flex;justify-content:space-around;padding:14px 20px;
  background:#e3f2fd;border-bottom:2px solid #bbdefb;flex-wrap:wrap;gap:8px;
}
.stat-item{text-align:center}
.stat-label{font-size:10px;color:#1565c0;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;color:#0d2137;margin-top:3px}

/* ── QUIZ AREA ── */
.quiz-area{padding:24px 22px}

/* ── QUESTION CARD ── */
.question-card{
  background:#f8f9fa;border-radius:12px;padding:20px;
  margin-bottom:16px;border-left:5px solid #1565c0;
  transition:box-shadow .2s;
}
.question-card:hover{box-shadow:0 4px 16px rgba(21,101,192,.1)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:13px;flex-wrap:wrap;gap:8px;
}
.q-num{
  background:#1565c0;color:#fff;padding:4px 14px;
  border-radius:20px;font-weight:700;font-size:12px;flex-shrink:0;
}

/* ── TYPE BADGES ── */
.type-badge{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;
}
.type-zero   { background:#e8f5e9;color:#1b5e20;border:1.5px solid #a5d6a7 }
.type-first  { background:#e3f2fd;color:#0d47a1;border:1.5px solid #90caf9 }
.type-second { background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80 }
.type-third  { background:#f3e5f5;color:#4a148c;border:1.5px solid #ce93d8 }

/* ── QUESTION TEXT ── */
.q-text{
  font-size:15px;color:#1a1a1a;margin-bottom:14px;line-height:1.7;font-weight:500;
}

/* ── INPUT ROW ── */
.answer-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.answer-input{
  flex:1;min-width:160px;
  padding:10px 14px;
  border:2px solid #dee2e6;
  border-radius:9px;
  font-size:14px;
  font-family:'Segoe UI',sans-serif;
  color:#1a1a1a;
  transition:border-color .25s,box-shadow .25s;
  outline:none;
}
.answer-input:focus{
  border-color:#1565c0;
  box-shadow:0 0 0 3px rgba(21,101,192,.1);
}
.answer-input.input-correct{
  border-color:#2e7d32!important;
  background:#f1f8e9!important;
  color:#1b5e20!important;
}
.answer-input.input-wrong{
  border-color:#c62828!important;
  background:#ffebee!important;
  color:#b71c1c!important;
}
.answer-input:disabled{cursor:not-allowed}

/* ── CHECK BUTTON ── */
.check-btn{
  background:#1565c0;color:#fff;border:none;
  padding:10px 22px;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;white-space:nowrap;flex-shrink:0;
}
.check-btn:hover:not(:disabled){background:#1976d2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(21,101,192,.35)}
.check-btn:disabled{background:#bdbdbd;cursor:not-allowed;transform:none;box-shadow:none}

/* ── EMPTY WARNING ── */
.empty-warning{
  font-size:12px;color:#e65100;margin-top:5px;
  display:none;font-weight:600;
}
.empty-warning.show{display:block}

/* ── FEEDBACK ── */
.feedback{
  display:none;margin-top:11px;padding:10px 14px;
  border-radius:8px;font-size:13px;line-height:1.5;
}
.feedback.show{display:block}
.feedback.correct{background:#e3f2fd;color:#0d2137;border:2px solid #64b5f6;font-weight:600}
.feedback.wrong  {background:#ffebee;color:#b71c1c;border:2px solid #ef9a9a;font-weight:600}

/* ── CORRECT ANSWER BOX ── */
.correct-answer-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#f1f8e9;border:2px solid #81c784;
  border-radius:8px;font-size:13px;color:#1b5e20;line-height:1.5;
}
.correct-answer-box.show{display:block}
.ca-label{font-weight:700;margin-right:4px}

/* ── EXPLANATION BOX ── */
.explanation-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#fffde7;border:2px solid #f9a825;
  border-radius:8px;font-size:13px;color:#5d4037;line-height:1.6;
}
.explanation-box.show{display:block}
.rule-tag{
  display:inline-block;margin-bottom:7px;
  padding:3px 10px;border-radius:12px;
  font-size:11.5px;font-weight:700;color:#fff;
  border:none;
}
.rule-zero   { background:#2e7d32 }
.rule-first  { background:#1565c0 }
.rule-second { background:#e65100 }
.rule-third  { background:#6a1b9a }
.exp-label{font-weight:700;color:#f57f17;margin-right:4px}

/* ── RESULT CARD ── */
.result-card{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;border-radius:14px;padding:30px 24px;text-align:center;
  margin:8px 0 4px;
}
.result-card h2{font-size:23px;margin-bottom:18px;font-weight:800}
.result-grid{
  display:flex;justify-content:space-around;gap:16px;flex-wrap:wrap;margin-bottom:22px;
}
.result-stat{
  text-align:center;background:rgba(255,255,255,.14);
  border-radius:12px;padding:14px 22px;
}
.result-stat-value{font-size:32px;font-weight:800}
.result-stat-label{font-size:12px;opacity:.85;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.grade-badge{
  display:inline-block;font-size:42px;font-weight:900;
  background:rgba(255,255,255,.2);border-radius:50%;
  width:80px;height:80px;line-height:80px;margin-bottom:16px;
}
.result-btn{
  background:rgba(255,255,255,.18);color:#fff;
  border:2px solid rgba(255,255,255,.7);padding:10px 24px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;margin:6px;transition:all .25s;
}
.result-btn:hover{background:#fff;color:#1565c0}

/* ── FOOTER ── */
.brand-footer{
  background:#f5f5f5;border-top:1px solid #e0e0e0;
  color:#9e9e9e;text-align:center;padding:12px;font-size:11px;letter-spacing:.3px;
  border-radius:0 0 18px 18px;
}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .chapter-header h1{font-size:17px}
  .stat-value{font-size:20px}
  .result-stat-value{font-size:26px}
  .quiz-area{padding:16px 14px}
  .answer-wrap{flex-direction:column}
  .answer-input,.check-btn{width:100%}
}
</style>
</head>
<body>

<!-- WATERMARK -->
<div class="watermark-overlay" id="wmOverlay"></div>

<div class="container">

  <!-- HEADER -->
  <div class="chapter-header">
    <div class="ch-label">English Grammar</div>
    <h1>Conditional Sentences — 24 Questions</h1>
    <div class="ch-meta">Smart Study Center &nbsp;·&nbsp; Sir Ahmer Javed</div>
  </div>

  <!-- STATS BAR -->
  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Total Qs</div>
      <div class="stat-value" id="statTotal">24</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Answered</div>
      <div class="stat-value" id="statAnswered">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Correct</div>
      <div class="stat-value" id="statCorrect">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="statScore">0%</div>
    </div>
  </div>

  <!-- QUIZ AREA -->
  <div class="quiz-area" id="quizArea"></div>

  <!-- FOOTER -->
  <div class="brand-footer">
    Smart Study Center &nbsp;·&nbsp; Sir Ahmer Javed &nbsp;·&nbsp; 0345-3090057
  </div>

</div><!-- /container -->

<script>
/* ═══════════════════════════════════════════════
   QUESTION DATA
   keys   → substrings that MUST appear (any one)
   exclude→ substrings that MUST NOT appear
═══════════════════════════════════════════════ */
const questions = [

  /* ─── FROM PDF — PAGE 1 ─── */
  {
    q: "If I were a butterfly, I _______________.",
    type: "Second",
    keys: ["would","could"],
    exclude: ["would have"],
    answer: "would fly / could fly / would soar freely",
    rule: "If + Past Simple (were) → would / could + Base Verb",
    exp: "This is purely imaginary. In Second Conditional, <strong>'were'</strong> is used for all persons in formal English — never 'was'. 'Would' or 'could' introduces the hypothetical result of an impossible situation."
  },
  {
    q: "She will pass the exam if she _______________.",
    type: "First",
    keys: ["studi","work","prepar","revise","pract","learn","read","focus","trai"],
    exclude: [],
    answer: "studies hard / works hard / prepares well",
    rule: "If + Present Simple → will + Base Verb",
    exp: "Note the reversed word order — the main clause <em>(will pass)</em> comes first here. The if-clause still uses <strong>present simple</strong> (studies/works), not 'will'. This is a real, achievable possibility."
  },
  {
    q: "If I had applied for the scholarship, _______________.",
    type: "Third",
    keys: ["would have"],
    exclude: [],
    answer: "I would have received it / I would have gotten it",
    rule: "If + Past Perfect → would have + Past Participle",
    exp: "The speaker did <strong>not</strong> apply — this is an unreal past situation. Third Conditional uses <strong>'had + past participle'</strong> in the if-clause and <strong>'would have + past participle'</strong> in the result. It expresses regret about a missed opportunity."
  },
  {
    q: "If you heat water at 100°C, it _______________.",
    type: "Zero",
    keys: ["boil"],
    exclude: ["will","'ll"],
    answer: "boils",
    rule: "If + Present Simple → Present Simple",
    exp: "A scientific law — water <strong>always</strong> boils at 100°C. Zero Conditional uses <strong>present simple in both clauses</strong> because the result is a guaranteed universal truth, not a prediction."
  },

  /* ─── FROM PDF — PAGE 2 ─── */
  {
    q: "If you heat ice, _______________.",
    type: "Zero",
    keys: ["melt"],
    exclude: ["will","'ll"],
    answer: "it melts",
    rule: "If + Present Simple → Present Simple",
    exp: "Zero Conditional is used for <strong>universal truths and scientific facts</strong>. When ice is heated it always melts — the result is guaranteed every single time, regardless of who or when."
  },
  {
    q: "If you work hard, _______________.",
    type: "First",
    keys: ["will","'ll"],
    exclude: [],
    answer: "you will succeed / you will get the opportunity",
    rule: "If + Present Simple → will + Base Verb",
    exp: "This expresses a <strong>real future possibility</strong>. If you work hard (a real action you can take), success will follow. The result clause always uses <strong>'will + base verb'</strong>."
  },
  {
    q: "If I won the lottery, _______________.",
    type: "Second",
    keys: ["would","could"],
    exclude: ["would have"],
    answer: "I would buy a new car / I would travel the world",
    rule: "If + Past Simple → would + Base Verb",
    exp: "Winning the lottery is highly unlikely — it is <strong>imaginary</strong>. Past tense 'won' signals the hypothetical condition. <strong>'Would'</strong> in the result clause shows what the speaker imagines happening."
  },
  {
    q: "I would have helped you if _______________.",
    type: "Third",
    keys: ["had"],
    exclude: [],
    answer: "you had come to me",
    rule: "If + Past Perfect → would have + Past Participle",
    exp: "You did <strong>not</strong> come, so the speaker could not help. The if-clause is placed at the end here — word order can be reversed without changing the meaning. <strong>'Had come'</strong> is past perfect."
  },

  /* ─── NEW — ZERO CONDITIONAL ─── */
  {
    q: "If you don't water plants, they _______________.",
    type: "Zero",
    keys: ["die","wilt","dry","wither"],
    exclude: ["will","'ll"],
    answer: "die / wilt / dry up",
    rule: "If + Present Simple → Present Simple",
    exp: "A general truth about nature. Plants <strong>always</strong> die or wilt without water — it is an absolute biological fact. Zero Conditional covers such habitual and natural outcomes."
  },
  {
    q: "If you mix red and white, you get _______________.",
    type: "Zero",
    keys: ["pink"],
    exclude: ["will","'ll"],
    answer: "pink",
    rule: "If + Present Simple → Present Simple",
    exp: "Mixing red and white <strong>always</strong> produces pink — a universal fact of colour theory. This never changes, regardless of time or person, so Zero Conditional is the right choice."
  },
  {
    q: "Water freezes if the temperature _______________ below 0°C.",
    type: "Zero",
    keys: ["drop","fall","go","sink","get","dip","reach"],
    exclude: ["will","'ll"],
    answer: "drops / falls",
    rule: "If + Present Simple → Present Simple",
    exp: "A scientific law — water always freezes below 0°C. Notice the if-clause comes <strong>after</strong> the result here. The order of clauses can be reversed in conditionals without changing meaning."
  },
  {
    q: "If babies are hungry, they _______________.",
    type: "Zero",
    keys: ["cry","cri","weep","wail"],
    exclude: ["will","'ll"],
    answer: "cry",
    rule: "If + Present Simple → Present Simple",
    exp: "A <strong>general truth about behaviour</strong>. Babies always cry when hungry — it is a universal biological response. Zero Conditional covers habitual and instinctive facts like this."
  },

  /* ─── NEW — FIRST CONDITIONAL ─── */
  {
    q: "If it rains tomorrow, we _______________ the picnic.",
    type: "First",
    keys: ["will","'ll"],
    exclude: [],
    answer: "will cancel / will postpone / won't have",
    rule: "If + Present Simple → will + Base Verb",
    exp: "Rain tomorrow is a <strong>real possibility</strong>. A key rule: the if-clause uses <strong>present simple</strong> (rains) even though we mean the future — never 'will rain'. The result clause gets 'will + base verb'."
  },
  {
    q: "If she doesn't hurry, she _______________ the bus.",
    type: "First",
    keys: ["will","'ll"],
    exclude: [],
    answer: "will miss",
    rule: "If + Present Simple → will + Base Verb",
    exp: "Not hurrying is a real and present danger. The consequence — missing the bus — is a <strong>likely future result</strong>. 'Will miss' follows the standard First Conditional result-clause structure."
  },
  {
    q: "If they pass the test, their parents _______________ proud.",
    type: "First",
    keys: ["will be","'ll be"],
    exclude: [],
    answer: "will be",
    rule: "If + Present Simple → will + Base Verb",
    exp: "Passing the test is a real future possibility. If they pass (present simple in if-clause), their parents <strong>will be</strong> proud (will + base verb in result clause). This is a likely real outcome."
  },
  {
    q: "If you eat too much sugar, you _______________ sick.",
    type: "First",
    keys: ["will","'ll"],
    exclude: [],
    answer: "will feel / will get / will become",
    rule: "If + Present Simple → will + Base Verb",
    exp: "Eating too much sugar is a real, possible action. Feeling sick is the <strong>likely future consequence</strong>. (If we said this always happens, it could also be Zero Conditional — context decides.)"
  },

  /* ─── NEW — SECOND CONDITIONAL ─── */
  {
    q: "If I had more time, I _______________ more books.",
    type: "Second",
    keys: ["would","could"],
    exclude: ["would have"],
    answer: "would read / could read",
    rule: "If + Past Simple → would / could + Base Verb",
    exp: "<strong>Important:</strong> 'had' here is past simple, not past perfect — the speaker means they don't have enough time <em>now</em>. This is an imaginary present situation. 'Would read' expresses the hypothetical result."
  },
  {
    q: "If he knew the answer, he _______________ you.",
    type: "Second",
    keys: ["would","could"],
    exclude: ["would have"],
    answer: "would tell / could tell",
    rule: "If + Past Simple → would + Base Verb",
    exp: "He <strong>doesn't</strong> know the answer — this is imaginary. 'Knew' (past simple) signals the hypothetical condition in the present. 'Would tell' expresses what the imaginary result would be."
  },
  {
    q: "If we lived near the beach, we _______________ every day.",
    type: "Second",
    keys: ["would","could"],
    exclude: ["would have"],
    answer: "would swim / could go swimming / would surf",
    rule: "If + Past Simple → would + Base Verb",
    exp: "We <strong>don't</strong> live near the beach — this is imaginary. 'Lived' is past simple to signal the hypothetical condition. 'Would swim' expresses an imaginary habitual action that would result."
  },
  {
    q: "If I were the president, I _______________ education.",
    type: "Second",
    keys: ["would","could"],
    exclude: ["would have"],
    answer: "would improve / would reform / would change",
    rule: "If + Past Simple (were) → would + Base Verb",
    exp: "Being president is <strong>imaginary</strong>. 'Were' is used instead of 'was' for all persons in formal Second Conditional. 'Would improve' expresses what the speaker imagines doing."
  },

  /* ─── NEW — THIRD CONDITIONAL ─── */
  {
    q: "If she had studied harder, she _______________ the exam.",
    type: "Third",
    keys: ["would have"],
    exclude: [],
    answer: "would have passed",
    rule: "If + Past Perfect → would have + Past Participle",
    exp: "She <strong>didn't</strong> study hard, so she didn't pass. Third Conditional describes the imaginary result of a past action that did not happen. 'Passed' is the past participle of 'pass'."
  },
  {
    q: "If they had left earlier, they _______________ the train.",
    type: "Third",
    keys: ["would have"],
    exclude: [],
    answer: "would have caught",
    rule: "If + Past Perfect → would have + Past Participle",
    exp: "They <strong>didn't</strong> leave early, so they missed the train. 'Had left' is past perfect; 'would have caught' uses the irregular past participle 'caught' (past participle of catch)."
  },
  {
    q: "If I had known about the party, I _______________.",
    type: "Third",
    keys: ["would have"],
    exclude: [],
    answer: "would have come / would have attended",
    rule: "If + Past Perfect → would have + Past Participle",
    exp: "The speaker <strong>didn't know</strong> about the party, so they didn't attend. 'Had known' (past perfect) shows the unreal past condition. 'Would have come' shows the imaginary past result."
  },
  {
    q: "If he had taken his medicine, he _______________ faster.",
    type: "Third",
    keys: ["would have"],
    exclude: [],
    answer: "would have recovered",
    rule: "If + Past Perfect → would have + Past Participle",
    exp: "He <strong>didn't</strong> take his medicine, so he didn't recover faster. Third Conditional always looks back at past events that didn't happen and imagines what would have been different."
  }

]; // end questions

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = { total: questions.length, answered: 0, correct: 0 };

/* ═══════════════════════════════════════════════
   TYPE CONFIG
═══════════════════════════════════════════════ */
const typeConfig = {
  Zero:   { label: "Zero Conditional",   badge: "type-zero",   card: "card-zero",   rule: "rule-zero"   },
  First:  { label: "First Conditional",  badge: "type-first",  card: "card-first",  rule: "rule-first"  },
  Second: { label: "Second Conditional", badge: "type-second", card: "card-second", rule: "rule-second" },
  Third:  { label: "Third Conditional",  badge: "type-third",  card: "card-third",  rule: "rule-third"  },
};

/* ═══════════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════════ */
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let displayOrder=[];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay=document.getElementById('wmOverlay');
  const text='Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r=0;r<7;r++){
    for(let c=0;c<3;c++){
      const span=document.createElement('span');
      span.textContent=text;
      span.style.left=(c*40-5)+'%';
      span.style.top=(r*16-4)+'%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   VALIDATE
═══════════════════════════════════════════════ */
function validate(userInput, q){
  const input=userInput.trim().toLowerCase();
  if(!input||input.length<2) return false;
  const hasExclusion=q.exclude.some(ex=>input.includes(ex.toLowerCase()));
  if(hasExclusion) return false;
  return q.keys.some(key=>input.includes(key.toLowerCase()));
}

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area=document.getElementById('quizArea');
  area.innerHTML='';
  displayOrder=shuffle(questions.map((_,i)=>i));

  displayOrder.forEach((qi,di)=>{
    const q=questions[qi];
    const tc=typeConfig[q.type];

    const card=document.createElement('div');
    card.className=`question-card`;
    card.id='card-'+di;

    card.innerHTML=`
      <div class="card-top">
        <span class="q-num">Q ${di+1}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="answer-wrap">
        <input
          class="answer-input"
          type="text"
          id="input-${di}"
          placeholder="Write your answer here…"
          autocomplete="off"
          spellcheck="false"
          onkeydown="handleKey(event,${di})"
        />
        <button class="check-btn" id="check-${di}" onclick="checkAnswer(${di})">✔ Check</button>
      </div>
      <div class="empty-warning" id="warn-${di}">⚠ Please write an answer first.</div>
      <div class="feedback" id="fb-${di}"></div>
      <div class="correct-answer-box" id="ca-${di}">
        <span class="ca-label">✅ Sample Answer:</span>
        <span id="ca-text-${di}"></span>
      </div>
      <div class="explanation-box" id="exp-${di}">
        <div><span class="rule-tag ${tc.rule}" id="rule-${di}"></span></div>
        <span class="exp-label">💡 Explanation:</span>
        <span id="exp-text-${di}"></span>
      </div>`;

    area.appendChild(card);
  });

  const res=document.createElement('div');
  res.id='resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers={};

function handleKey(e,di){
  if(e.key==='Enter') checkAnswer(di);
}

function checkAnswer(di){
  if(userAnswers[di]?.checked) return;

  const qi=displayOrder[di];
  const q=questions[qi];
  const inputEl=document.getElementById(`input-${di}`);
  const userVal=inputEl.value;

  // Guard: empty
  const warn=document.getElementById(`warn-${di}`);
  if(!userVal.trim()){
    warn.classList.add('show');
    setTimeout(()=>warn.classList.remove('show'),2000);
    return;
  }
  warn.classList.remove('show');

  userAnswers[di]={checked:true};

  const ok=validate(userVal,q);
  if(ok) state.correct++;
  state.answered++;

  // Style input
  inputEl.classList.add(ok?'input-correct':'input-wrong');
  inputEl.disabled=true;

  // Feedback
  const fb=document.getElementById(`fb-${di}`);
  if(ok){
    fb.className='feedback show correct';
    fb.textContent='✓ Correct! Well done!';
  } else {
    fb.className='feedback show wrong';
    fb.textContent='✗ Incorrect! See the sample answer and explanation below.';
  }

  // Sample answer
  document.getElementById(`ca-text-${di}`).textContent=' '+q.answer;
  document.getElementById(`ca-${di}`).classList.add('show');

  // Explanation
  document.getElementById(`rule-${di}`).textContent='📌 '+q.rule;
  document.getElementById(`exp-text-${di}`).innerHTML=q.exp;
  document.getElementById(`exp-${di}`).classList.add('show');

  // Disable button
  document.getElementById(`check-${di}`).disabled=true;

  updateStats();

  if(state.answered===state.total) setTimeout(showResult,500);
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct=state.total>0?Math.round(state.correct/state.total*100):0;
  document.getElementById('statScore').textContent    = pct+'%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct=Math.round(state.correct/state.total*100);
  let grade,msg,emoji;
  if     (pct>=90){grade='A+';msg='Outstanding Performance!'; emoji='🌟';}
  else if(pct>=80){grade='A'; msg='Excellent Work!';          emoji='🎉';}
  else if(pct>=70){grade='B'; msg='Good Job!';                emoji='👍';}
  else if(pct>=60){grade='C'; msg='Keep Practicing!';         emoji='📚';}
  else if(pct>=50){grade='D'; msg='More Effort Needed!';      emoji='💪';}
  else            {grade='F'; msg='Revise and Try Again!';    emoji='📖';}

  document.getElementById('resultCard').innerHTML=`
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Conditional Sentences &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered=0;
  state.correct=0;
  Object.keys(userAnswers).forEach(k=>delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── INIT ── */
buildQuiz();
</script>
</body>
</html>
