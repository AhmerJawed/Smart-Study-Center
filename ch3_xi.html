const questions = [
  {q:"Valence Bond Theory was introduced by:", o:["Kossel and Lewis","Sidgwick and Powell","Mullikan and Hund","London and Heitler"], c:3, exp:"VBT was introduced by London and Heitler in 1927 to explain covalent bonding through orbital overlap."},
  {q:"According to VBT, the strength of a covalent bond depends on:", o:["The size of the combining atoms","The electronegativity difference between atoms","The extent of overlap of atomic orbitals","The number of electrons in bonding atoms"], c:2, exp:"Greater overlap of atomic orbitals results in a stronger covalent bond."},
  {q:"A sigma bond is defined as the bond formed by:", o:["Head-to-head overlap of half-filled atomic orbitals","Lateral overlap of half-filled atomic orbitals","Overlap of completely filled atomic orbitals","Side-wise overlap of p orbitals only"], c:0, exp:"Sigma bond is formed by head-to-head (linear) overlap of half-filled atomic orbitals."},
  {q:"Which type of overlapping exists in H₂ molecule?", o:["p-p overlapping","s-s overlapping","s-p overlapping","Lateral p-p overlapping"], c:1, exp:"In H₂, two half-filled 1s orbitals of hydrogen atoms overlap head-to-head forming an s-s sigma bond."},
  {q:"The sigma bond in HF molecule is formed by:", o:["s-p overlapping","s-s overlapping","p-p overlapping","Lateral p-p overlapping"], c:0, exp:"HF is formed by overlap of half-filled 1s orbital of hydrogen with half-filled 2pz orbital of fluorine."},
  {q:"In a pi (π) bond, the electron cloud is concentrated:", o:["Along the internuclear axis","At the plane of sigma bond axis only","Equally around the bonded atoms","Above and below the plane of sigma bond"], c:3, exp:"Pi bond electron cloud is unsymmetrical and concentrated above and below the plane of the sigma bond."},
  {q:"Which of the following is TRUE about pi bonds compared to sigma bonds?", o:["Pi bonds are stronger due to maximum overlap","Pi bonds are weaker due to minimum lateral overlap","Pi bonds have higher electron density between nuclei","Pi bonds allow free rotation between bonded atoms"], c:1, exp:"The region of overlap in pi bonds is small (lateral/sideways), making pi bonds relatively weaker than sigma bonds."},
  {q:"The maximum number of pi bonds that can form between two atoms is:", o:["One","Four","Two","Three"], c:2, exp:"In a triple bond (e.g., N₂), one sigma and two pi bonds exist — confirming the maximum is two pi bonds between two atoms."},
  {q:"Free rotation between bonded atoms is possible when:", o:["Only sigma bond is present between atoms","Only pi bond is present between atoms","Both sigma and pi bonds are present","A double bond exists between atoms"], c:0, exp:"Orbital free rotation is possible only when a single sigma bond is present; pi bonds restrict rotation by fixing orbital orientation."},
  {q:"Which of the following is a limitation of Valence Bond Theory?", o:["It fails to explain the paramagnetic behavior of O₂","It cannot explain the formation of sigma bonds","It fails to explain the formation of ionic bonds","It cannot describe bond length"], c:0, exp:"VBT cannot explain the paramagnetic behavior of O₂ since it shows O₂ with all paired electrons, which MOT correctly refutes."},
  {q:"Molecular Orbital Theory was developed by:", o:["London and Heitler","Mullikan, Hund and Huckel","Sidgwick and Powell","Linus Pauling"], c:1, exp:"MOT was developed by Mullikan, Hund, and Huckel in 1927 to overcome the shortcomings of VBT."},
  {q:"In Molecular Orbital Theory, combination of two atomic orbitals produces:", o:["Two bonding molecular orbitals","One bonding and one non-bonding MO","Two anti-bonding molecular orbitals","One bonding and one anti-bonding MO"], c:3, exp:"Combination of two atomic orbitals gives two MOs — one bonding (lower energy) and one anti-bonding (higher energy)."},
  {q:"The formula for bond order in MOT is:", o:["N(b) − N(a) / 2","N(b) + N(a) / 2","N(a) − N(b) / 2","N(b) × N(a) / 2"], c:0, exp:"Bond order = [N(b) − N(a)] / 2, where N(b) = electrons in bonding MO and N(a) = electrons in anti-bonding MO."},
  {q:"The bond order of H₂ molecule is:", o:["0","2","1","3"], c:2, exp:"H₂ has 2 electrons in bonding MO (σ1s) and 0 in anti-bonding MO, so bond order = (2−0)/2 = 1."},
  {q:"The bond order of O₂ molecule is:", o:["1","2","0","3"], c:1, exp:"O₂ has 10 bonding and 6 anti-bonding electrons, so bond order = (10−6)/2 = 2, confirming a double bond."},
  {q:"O₂ molecule is paramagnetic because:", o:["It has two unpaired electrons in anti-bonding MOs","It has all paired electrons in molecular orbitals","Its bond order is zero","It has more electrons in anti-bonding MOs than bonding MOs"], c:0, exp:"O₂ has two unpaired electrons in π*2py and π*2pz anti-bonding MOs, making it paramagnetic."},
  {q:"The bond order of N₂ molecule is:", o:["0","1","2","3"], c:3, exp:"N₂ has 10 bonding and 4 anti-bonding electrons, giving bond order = (10−4)/2 = 3, representing a triple bond."},
  {q:"VSEPR Theory was proposed by:", o:["London and Heitler in 1927","Sidgwick and Powell in 1940","Mullikan and Hund in 1927","Linus Pauling in 1950"], c:1, exp:"VSEPR theory was proposed by Sidgwick and Powell in 1940 to predict shapes of molecules based on electron pair repulsion."},
  {q:"The correct order of repulsion according to VSEPR theory is:", o:["Bond pair–Bond pair > Lone pair–Bond pair > Lone pair–Lone pair","Lone pair–Bond pair > Lone pair–Lone pair > Bond pair–Bond pair","Lone pair–Lone pair > Lone pair–Bond pair > Bond pair–Bond pair","All repulsions are equal"], c:2, exp:"Lone pair–lone pair repulsion is strongest, followed by lone pair–bond pair, then bond pair–bond pair repulsion."},
  {q:"In VSEPR theory, double and triple bonds are treated as:", o:["Two separate active electron pairs","Three separate active electron pairs","A single active electron pair (π electrons are inactive)","They are excluded entirely from the electron count"], c:2, exp:"π electrons are not active in VSEPR, so multiple bonds are treated as a single bond when predicting molecular shape."},
  {q:"The molecular geometry of BeCl₂ according to VSEPR is:", o:["Bent","Tetrahedral","Trigonal planar","Linear"], c:3, exp:"BeCl₂ is AX₂ type with 2 bond pairs and 0 lone pairs, giving linear geometry with 180° bond angle."},
  {q:"BF₃ has which molecular geometry according to VSEPR?", o:["Trigonal planar","Trigonal pyramidal","Tetrahedral","Linear"], c:0, exp:"BF₃ is AX₃ type with 3 bond pairs and 0 lone pairs, giving trigonal planar geometry with 120° bond angles."},
  {q:"The bond angle in NH₃ is:", o:["120°","107°","109.5°","180°"], c:1, exp:"NH₃ has 3 bond pairs and 1 lone pair; the lone pair repulsion compresses the bond angle from 109.5° to 107°."},
  {q:"The bond angle in H₂O molecule is:", o:["104.5°","109.5°","120°","107°"], c:0, exp:"H₂O has 2 bond pairs and 2 lone pairs; stronger lone pair repulsion reduces the bond angle from 109.5° to 104.5°, giving angular shape."},
  {q:"Which molecule has tetrahedral geometry with bond angle 109.5°?", o:["NH₃","H₂O","CH₄","BF₃"], c:2, exp:"CH₄ is AX₄ type with 4 bond pairs and 0 lone pairs, giving regular tetrahedral geometry with 109.5° bond angle."},
  {q:"Hybridization is defined as:", o:["Breaking of atomic orbitals into smaller ones","Mixing of different atomic orbitals to produce equal number of equivalent orbitals of same shape and energy","Transfer of electrons between two atoms","The overlap of atomic orbitals to form molecular orbitals"], c:1, exp:"Hybridization is the mixing of atomic orbitals of nearly equal energies to produce equivalent hybrid orbitals of identical shape and energy."},
  {q:"In sp³ hybridization, the hybrid orbitals are directed at an angle of:", o:["120°","180°","90°","109.5°"], c:3, exp:"sp³ hybrid orbitals are directed towards the four corners of a regular tetrahedron at an angle of 109.5°."},
  {q:"The hybridization of carbon in methane (CH₄) is:", o:["sp","sp²","sp³","sp³d"], c:2, exp:"In CH₄, carbon mixes one s and three p orbitals to form four equivalent sp³ hybrid orbitals directed tetrahedrally."},
  {q:"In sp² hybridization, which orbital remains unhybridized?", o:["pz orbital (perpendicular to the plane of hybrid orbitals)","s orbital","px orbital","py orbital"], c:0, exp:"In sp² hybridization, s, px, and py mix to form three sp² orbitals; the pz orbital remains unhybridized at right angles to the plane."},
  {q:"The bond angle in sp² hybridized molecules is:", o:["109.5°","120°","180°","90°"], c:1, exp:"sp² hybrid orbitals are coplanar and directed towards corners of an equilateral triangle at 120° angles to each other."},
  {q:"The type of hybridization in BF₃ is:", o:["sp³","sp","sp³d","sp²"], c:3, exp:"Boron in BF₃ uses one s and two p orbitals to form three sp² hybrid orbitals, giving trigonal planar geometry at 120°."},
  {q:"In ethene (C₂H₄), the C-C sigma bond is formed by:", o:["Lateral overlap of sp² orbitals","Overlap of sp³ orbitals","Head-to-head overlap of sp² orbitals","Overlap of sp orbitals"], c:2, exp:"In ethene, the third sp² orbital of each carbon overlaps linearly (head-to-head) to form the C-C sigma bond."},
  {q:"The hybridization of carbon atoms in ethyne (C₂H₂) is:", o:["sp","sp³","sp²","sp³d"], c:0, exp:"Each carbon in ethyne uses one s and one px orbital to form two sp hybrid orbitals; py and pz remain unhybridized to form two pi bonds."},
  {q:"In sp hybridization, the two hybrid orbitals are oriented at:", o:["109.5°","180°","120°","90°"], c:1, exp:"sp hybrid orbitals are co-linear at 180°, providing maximum separation and giving linear molecular geometry."},
  {q:"The triple bond in ethyne (C₂H₂) consists of:", o:["Three sigma bonds","Two sigma and one pi bond","Three pi bonds","One sigma and two pi bonds"], c:3, exp:"The triple bond in C₂H₂ consists of one C-C sigma bond (sp-sp head-to-head overlap) and two pi bonds (py-py and pz-pz lateral overlap)."},
  {q:"The hybridization of beryllium in BeCl₂ is:", o:["sp³","sp²","sp","sp³d"], c:2, exp:"Beryllium in BeCl₂ uses its 2s and 2px orbitals to form two sp hybrid orbitals at 180°, giving linear geometry."},
  {q:"Bond energy is defined as the energy required to break:", o:["1 mole of a particular type of bond in the molecule","All bonds in one molecule","1 gram of bonds in a compound","Ionic bonds in one mole of compound"], c:0, exp:"Bond energy is the energy required in KJ to break 1 mole of a particular type of bond present in the gaseous molecule."},
  {q:"Which of the following has the highest bond energy among carbon-carbon bonds?", o:["C–C single bond","C≡C triple bond","C=C double bond","All have equal bond energies"], c:1, exp:"C≡C has bond energy 839 KJ/mol, which is highest compared to C=C (614 KJ/mol) and C–C (348 KJ/mol)."},
  {q:"The bond energy of HF (567 KJ/mol) is higher than HCl (431 KJ/mol) primarily because:", o:["Difference in bond order between HF and HCl","Larger size of fluorine compared to chlorine","Greater polarity of HF due to higher electronegativity difference","HF has a different type of bond than HCl"], c:2, exp:"HF has greater electronegativity difference (1.9) giving higher ionic character, which brings atoms closer and increases bond energy."},
  {q:"Bond length is defined as:", o:["The radius of a bonded atom in a molecule","The distance between the nucleus and the shared electron pair","Half the distance between two adjacent molecules","The distance between the nuclei of two bonded atoms in a molecule"], c:3, exp:"Bond length is the internuclear distance between two bonded atoms in a molecule, experimentally determined by X-ray diffraction."},
  {q:"As bond order increases between two atoms, the bond length:", o:["Decreases","Increases","Remains constant","First increases then decreases"], c:0, exp:"Greater bond order results in shorter bond length; C≡C (1.20 Å) < C=C (1.34 Å) < C–C (1.54 Å)."},
  {q:"The unit used to measure bond length is:", o:["Debye","Angstrom (Å)","KJ/mol","Newton"], c:1, exp:"Bond length is measured in Angstrom (Å), where 1 Å = 10⁻¹⁰ m."},
  {q:"Ionic character of a covalent bond arises due to:", o:["Transfer of electrons between atoms","Formation of coordinate covalent bonds","Equal sharing of electron pairs","Difference in electronegativity between bonded atoms creating partial charges"], c:3, exp:"When two atoms of different electronegativities bond covalently, the shared electrons shift toward the more electronegative atom, creating partial charges (+δ and −δ) and ionic character."},
  {q:"Dipole moment is defined as:", o:["The ratio of charge to bond length","The sum of all individual bond dipoles","The product of magnitude of charge and distance between positive and negative centers","The product of bond energy and bond length"], c:2, exp:"Dipole moment = q × d, where q is the magnitude of partial charge and d is the distance between the positive and negative centers."},
  {q:"The unit of dipole moment is:", o:["Debye (D)","Angstrom","KJ/mol","Coulomb"], c:0, exp:"Dipole moment is measured in Debye (D), where 1 D = 1 × 10⁻¹⁸ esu·cm; its SI unit is Coulomb-meter (C·m)."},

  {q:"A substance is diamagnetic when:", o:["It has unpaired electrons in its molecular orbitals","All electrons in its molecular orbitals are paired","It is attracted by an external magnetic field","It has a bond order of zero"], c:1, exp:"Substances with all paired electrons are repelled by an external magnetic field and are called diamagnetic (e.g., H₂, N₂, He)."},
  {q:"The bond length of N≡N (1.10 Å) is shorter than O=O (1.21 Å) because:", o:["Nitrogen atoms are smaller than oxygen atoms","Oxygen has more electrons causing repulsion","N₂ has triple bond (bond order 3) while O₂ has double bond (bond order 2)","Nitrogen has higher electronegativity than oxygen"], c:2, exp:"Higher bond order gives shorter bond length; N₂ with bond order 3 has a shorter bond than O₂ with bond order 2."},
  {q:"The correct bond energy order for hydrogen halide bonds is:", o:["H-F < H-Cl < H-Br < H-I","H-I > H-Br > H-Cl > H-F","H-Cl > H-F > H-Br > H-I","H-F > H-Cl > H-Br > H-I"], c:3, exp:"Bond energy decreases down the halogen group as atomic size and bond length increase; H-F (567) > H-Cl (431) > H-Br > H-I KJ/mol."},
  {q:"The number of sigma and pi bonds in ethene (C₂H₄) respectively are:", o:["5 sigma and 1 pi","4 sigma and 2 pi","3 sigma and 1 pi","4 sigma and 1 pi"], c:0, exp:"C₂H₄ has four C-H sigma bonds plus one C-C sigma bond = 5 sigma bonds total, and one C=C pi bond."},
  {q:"Which statement correctly describes ionic character of H-F vs H-Cl?", o:["H-Cl has greater ionic character due to larger size of Cl","H-F has greater ionic character (43%) due to larger electronegativity difference (1.9)","Both H-F and H-Cl have equal ionic character","H-I has greater ionic character than H-F"], c:1, exp:"H-F has EN difference of 1.9 giving 43% ionic character, while H-Cl has EN difference of only 0.9 giving 17% ionic character."},
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
   Randomises option order; tracks which option
   is now correct after the shuffle.
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));

  /* Fisher-Yates shuffle */
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }

  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">📖 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                      el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.3 Covalent Bonding &amp; Shapes of Molecules &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
// ── STICKY TIMER ──
let timeLeft = 58 * 60;
const timerDisplay = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');

const timerInterval = setInterval(() => {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerDisplay.textContent =
    String(mins).padStart(2,'0') + ':' +
    String(secs).padStart(2,'0');
  if(timeLeft <= 300){
    timerBox.classList.add('danger');
  }
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    timerDisplay.textContent = '⏰ TIME UP';
    showResult();
  }
  timeLeft--;
}, 1000);
</script>
