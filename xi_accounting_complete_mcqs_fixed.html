<style>
:root{

  --ink:#1c2233;--mt:#7a7562;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:14px;line-height:1.55;

}

/* ---------- header ---------- */
header{
  position:relative;
  background:linear-gradient(120deg,var(--navy) 0%,var(--navy2) 100%);

  padding:22px 26px 20px;
  display:flex;align-items:center;gap:16px;
  border-bottom:3px solid var(--gold);
  box-shadow:0 1px 0 var(--gold-lt) inset;
}
header::after{
  content:'';position:absolute;left:0;right:0;bottom:-7px;height:1px;background:var(--gold);opacity:.55;
}
.hi{
  font-family:'Fraunces',serif;font-weight:800;font-size:1.35rem;
  width:46px;height:46px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--gold-lt);border-radius:50%;
  color:var(--gold-lt);letter-spacing:-1px;
  background:rgba(255,255,255,.03);
}
header h1{
  font-family:'Fraunces',serif;font-size:1.32rem;font-weight:700;
  letter-spacing:.2px;
}
header p{
  font-family:'JetBrains Mono',monospace;
  font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;
  opacity:.72;margin-top:6px;color:var(--gold-lt);
}

/* ---------- tabs ---------- */
.trow{
  position:sticky;top:0;z-index:50;
  background:var(--navy);
  display:flex;flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 3px 10px rgba(16,29,56,.18);
  overflow-x:auto;
}
.trow::-webkit-scrollbar{height:3px;}
.tb{
  font-family:'Inter',sans-serif;
  padding:11px 14px 9px;background:transparent;border:none;
  color:rgba(244,241,230,.5);font-size:.72rem;font-weight:600;
  letter-spacing:.01em;
  cursor:pointer;white-space:nowrap;
  border-bottom:3px solid transparent;margin-bottom:-1px;
  transition:color .15s,background .15s;
}
.tb:hover{color:#fff;background:rgba(255,255,255,.04);}
.tb.active{color:var(--navy);border-bottom-color:var(--gold);background:var(--paper);border-radius:6px 6px 0 0;font-weight:700;}

/* ---------- panel & chapter head ---------- */
.panel{display:none;padding:22px 16px 60px;max-width:860px;margin:0 auto;}
.panel.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.chd{
  display:flex;align-items:baseline;gap:10px;margin-bottom:18px;padding-bottom:12px;

.chd::after{content:'';position:absolute;left:0;bottom:-3px;width:64px;height:2px;background:var(--gold);}

.cct{

  color:var(--mt);background:var(--paper2);border:1px solid var(--bd);padding:3px 9px;border-radius:3px;

.ch{display:flex;align-items:center;gap:7px;padding:12px 14px 0;}
.qn{

.sb{

.qt{padding:9px 14px 10px;font-weight:600;font-size:.9rem;color:var(--ink);line-height:1.5;}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 14px 14px;}
@media(max-width:500px){.opts{grid-template-columns:1fr;}}
.opt{
  display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  border:1.5px solid var(--bd);border-radius:4px;background:var(--paper2);
  cursor:pointer;font-size:.82rem;text-align:left;color:var(--ink);

.opt:hover:not(:disabled){border-color:var(--navy2);background:#eef2f8;transform:translateY(-1px);}
.opt:disabled{cursor:default;}
.opt.correct{background:var(--gn-bg);border-color:var(--gn);color:var(--gn);font-weight:700;}
.opt.wrong{background:var(--rd-bg);border-color:var(--rd);color:var(--rd);}
.opt.sa{background:var(--gn-bg);border-color:var(--gn);color:var(--gn);font-weight:700;}
.lb{
  display:inline-flex;align-items:center;justify-content:center;
  width:19px;height:19px;border-radius:4px;
  background:#fff;border:1.5px solid var(--bd);color:var(--navy2);
  font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;flex-shrink:0;margin-top:1px;
  transition:background .15s,border-color .15s,color .15s;

.opt:hover:not(:disabled) .lb{border-color:var(--navy2);}
.opt.correct .lb,.opt.sa .lb{background:var(--gn);border-color:var(--gn);color:#fff;}
.opt.wrong .lb{background:var(--rd);border-color:var(--rd);color:#fff;}
.an{
  display:none;margin:0 14px 12px;padding:8px 11px;border-left:3px solid var(--gn);

.sc{
  position:fixed;bottom:16px;right:16px;
  background:var(--navy);color:#f4f1e6;

  transition:background .15s;
}
.rs:hover{background:rgba(255,255,255,.18);}

function build(){
C.forEach(ch=>{
const el=document.getElementById(ch.id);
let h=`<div class="chd"><h2>${ch.title}</h2><span class="cct">${ch.qs.length} questions</span></div>`;
ch.qs.forEach((q,i)=>{
const cid=`${ch.id}_${i}`;
const sb=q.s?`<span class="sb">⭐ Past Paper</span>`:``;
const opts=q.o.map((o,j)=>`<button class="opt" data-i="${j}" onclick="pick(this,'${cid}',${q.a})"><span class="lb">${`abcd`[j]}</span>${o}</button>`).join(``);
h+=`<div class="card${q.s?` star`:``}" id="cd_${cid}">
<div class="ch"><span class="qn">Q${i+1}</span>${sb}</div>
<p class="qt">${q.q}</p>
<div class="opts">${opts}</div>
<div class="an" id="an_${cid}">✓ Correct: ${'abcd'[q.a]}) ${q.o[q.a]}</div>
</div>`;
});
el.innerHTML=h;
});
}

function pick(btn,cid,ans){
const card=document.getElementById(`cd_${cid}`);
if(card.dataset.done)return;
card.dataset.done=`1`;
tt++;
const all=card.querySelectorAll(`.opt`);
all.forEach(b=>b.disabled=true);
const chosen=parseInt(btn.dataset.i);
if(chosen===ans){btn.classList.add(`correct`);cr++;}
else{btn.classList.add(`wrong`);}
all[ans].classList.add(chosen===ans?`correct`:`sa`);
document.getElementById(`an_${cid}`).style.display=`block`;
document.getElementById(`sc`).textContent=`${cr}/${tt}`;
}

document.querySelectorAll(`.tb`).forEach(b=>{
b.addEventListener(`click`,()=>{
document.querySelectorAll(`.tb`).forEach(x=>x.classList.remove(`active`));
document.querySelectorAll(`.panel`).forEach(x=>x.classList.remove(`active`));
b.classList.add(`active`);
document.getElementById(b.dataset.p).classList.add(`active`);
window.scrollTo({top:0,behavior:`smooth`});
});
});

document.getElementById(`rb`).addEventListener(`click`,()=>{
document.querySelectorAll(`.card`).forEach(c=>{
delete c.dataset.done;
c.querySelectorAll(`.opt`).forEach(b=>{b.classList.remove(`correct`,`wrong`,`sa`);b.disabled=false;});
const n=c.querySelector(`.an`);if(n)n.style.display=`none`;
});
cr=0;tt=0;
document.getElementById(`sc`).textContent=`0/0`;
});

build();
</script>
