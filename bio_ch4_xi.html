const questions = [
  {q:"Bioenergetics is best defined as:", o:["The study of ATP synthesis in mitochondria only","The quantitative study of energy relationships and conversion into biological systems","The process of capturing sunlight and converting it to glucose","The study of metabolic pathways in prokaryotes"], c:1, exp:"Bioenergetics encompasses the entire quantitative study of how energy is captured, transformed, and utilized in living systems, obeying the laws of thermodynamics."},
{q:"Photophosphorylation occurs in which specific cellular location?", o:["Stroma of chloroplast","Cristae of mitochondria","Thylakoid membrane of chloroplast","Cytosol of the cell"], c:2, exp:"Photophosphorylation (ATP formation using light energy) occurs specifically in the thylakoid membrane of the chloroplast, not in the stroma or mitochondria."},
{q:"The type of phosphorylation where one substrate directly provides phosphate and energy to another substrate is:", o:["Photophosphorylation","Oxidative phosphorylation","Chemiosmotic phosphorylation","Substrate level phosphorylation"], c:3, exp:"In substrate level phosphorylation, energy and phosphate are transferred directly from one substrate molecule to another without using proton gradients or light, as seen in glycolysis and Krebs cycle."},
{q:"Under cellular conditions, ATP formation from ADP and Pi requires how much energy per mole?", o:["5.3 Kcal/mole","9.3 Kcal/mole","3.7 Kcal/mole","7.3 Kcal/mole"], c:3, exp:"Under cellular conditions, the formation of ATP from ADP and inorganic phosphate (Pi) requires exactly 7.3 Kcal/mole of energy."},
{q:"The empirical formula of chlorophyll-a is:", o:["C₅₅H₇₀O₆N₄Mg","C₅₅H₇₂O₅N₄Mg","C₅₅H₇₂O₆N₄Mg","C₅₅H₇₀O₅N₄Mg"], c:1, exp:"Chlorophyll-a has the empirical formula C₅₅H₇₂O₅N₄Mg, while chlorophyll-b differs with the formula C₅₅H₇₀O₆N₄Mg."},
{q:"The long hydrocarbon tail of the chlorophyll molecule anchoring it in the thylakoid membrane is:", o:["Phytol (C₂₀H₃₉)","Phytol (C₂₀H₃₇)","Pyrrole (C₂₀H₃₉)","Porphyrin (C₂₀H₄₁)"], c:0, exp:"The long hydrocarbon tail called phytol (C₂₀H₃₉) is attached to one of the pyrrole rings and anchors the chlorophyll molecule in the hydrophobic core of the thylakoid membrane."},
{q:"The porphyrin ring of chlorophyll is composed of:", o:["Six smaller pyrrole rings joined by calcium","Two pyrrole rings joined by iron","Four smaller pyrrole rings joined by Magnesium (Mg) with Nitrogen","Four pyrrole rings joined by copper"], c:2, exp:"The head of chlorophyll is a complex porphyrin ring made up of four smaller pyrrole rings, with the pyrrole nitrogens coordinated to a central Magnesium (Mg) atom."},
{q:"Chlorophyll molecules absorb which colors from visible light most efficiently?", o:["Green and yellow","Violet-blue and orange-red","Indigo and green","Yellow and cyan"], c:1, exp:"Chlorophyll molecules primarily absorb violet-blue and orange-red wavelengths; green, yellow, and indigo are the least absorbed, which is why plants appear green."},
{q:"Two absorption peaks of chlorophyll are observed at:", o:["430 nm and 670 nm","400 nm and 700 nm","450 nm and 650 nm","480 nm and 680 nm"], c:0, exp:"The absorption spectrum of chlorophyll shows two distinct peaks — one in the blue region at 430 nm and one in the red region at 670 nm."},
{q:"The relative effectiveness of different wavelengths of light in driving photosynthesis is called:", o:["Absorption spectrum","Emission spectrum","Action spectrum","Reflection spectrum"], c:2, exp:"The action spectrum of photosynthesis shows which wavelengths of light are most effective in driving the photosynthetic process, and it is broader than the absorption spectrum of chlorophyll alone."},
{q:"The correct order of energy transfer from accessory pigments to the reaction center is:", o:["Chlorophyll-a → Chlorophyll-b → Carotenoids","Carotenoids → Chlorophyll-a → Chlorophyll-b","Chlorophyll-b → Carotenoids → Chlorophyll-a","Carotenoids → Chlorophyll-b → Chlorophyll-a"], c:3, exp:"Energy absorbed by carotenoids is first transferred to chlorophyll-b, then to chlorophyll-a, and finally to the reaction center for photosynthetic light reactions."},
{q:"The reaction center of Photosystem II (PS-II) is called P₆₈₀ because:", o:["It was discovered in 1680","It has 680 chlorophyll molecules","It has maximum light absorption at 680 nm","It is 680 nm away from PS-I"], c:2, exp:"The reaction center chlorophyll-a molecule of PS-II is designated P₆₈₀ because it has its maximum absorption at 680 nm wavelength of light."},
{q:"The reaction center of Photosystem I (PS-I) absorbs light maximally at:", o:["650 nm","700 nm","680 nm","720 nm"], c:1, exp:"The reaction center of PS-I is called P₇₀₀ because its chlorophyll-a molecule has maximum absorption at 700 nm, different from PS-II's P₆₈₀."},
{q:"Neil's hypothesis, later confirmed by radio-labelling with O¹⁸, established that the oxygen released during photosynthesis comes from:", o:["Carbon dioxide (CO₂)","Both CO₂ and H₂O equally","Glucose molecules","Water (H₂O)"], c:3, exp:"Neil hypothesized and radio-labelling experiments in 1940 confirmed that water, not carbon dioxide, is the source of oxygen released during photosynthesis."},
{q:"The primary electron acceptor in Photosystem II is:", o:["Plastoquinone","Phaeophytin","Plastocyanin","Ferredoxin"], c:1, exp:"When P₆₈₀ absorbs light energy, the excited electron is rapidly transferred to the primary electron acceptor phaeophytin before passing to plastoquinone."},
{q:"The water-splitting complex (OEC) of PS-II is located on which side of the thylakoid membrane?", o:["Stromal side","Luminal side","Both sides equally","Outer chloroplast envelope"], c:1, exp:"The water-splitting complex is present on the luminal side of the thylakoid membrane and consists of a manganese cluster and Z complex (the immediate electron donor to P₆₈₀)."},
{q:"Splitting of two water molecules by the oxygen-evolving complex produces:", o:["2 electrons and 2 H⁺","4 electrons, 2 H⁺ and ½ O₂","4 electrons, 4 H⁺ and one molecule of O₂","2 electrons, 4 H⁺ and one molecule of O₂"], c:2, exp:"The water-splitting complex releases 4 electrons, 4 H⁺ ions (into the lumen), and one molecule of O₂ from every two water molecules split."},
{q:"Which mobile electron carrier transfers electrons from PS-II to the Cytochrome b/f complex and is considered the rate-limiting step?", o:["Plastocyanin","Ferredoxin","Phaeophytin","Plastoquinone"], c:3, exp:"Plastoquinone (PQ) accepts two electrons and two protons from the stroma and carries them from PS-II to the Cytb/f complex, a step considered rate-limiting in electron transport."},
{q:"Plastocyanin (PC) carries electrons from the Cytb/f complex to which component?", o:["PS-II (P₆₈₀)","NADP reductase","Ferredoxin","PS-I (P₇₀₀)"], c:3, exp:"Plastocyanin (PC) is a copper-containing protein located in the lumen that acts as an electron donor to PS-I (P₇₀₀), bridging the cytochrome complex and PS-I."},
{q:"The enzyme that reduces NADP⁺ to NADPH₂ using electrons from ferredoxin is:", o:["ATPase synthase","Plastocyanin","NADP reductase","RuBisCO"], c:2, exp:"NADP reductase (also called ferredoxin-NADP⁺ reductase, FNR) is the enzyme that transfers electrons from ferredoxin (Fd) to NADP⁺, producing NADPH₂ used in the Calvin cycle."},
{q:"The process by which H⁺ ions flow back through ATPase synthase complex from lumen to stroma to synthesize ATP is called:", o:["Substrate level phosphorylation","Photophosphorylation only","Oxidative phosphorylation","Chemiosmosis (chemiosmotic ATP synthesis)"], c:3, exp:"The movement of H⁺ ions down the electrochemical gradient through the ATPase synthase channel, driving ATP synthesis, is called chemiosmosis or chemiosmotic ATP synthesis."},
{q:"The linear flow of electrons from water to NADP⁺ coupled to ATP synthesis is called:", o:["Cyclic photophosphorylation","Non-cyclic photophosphorylation (Z-scheme)","Oxidative phosphorylation","Substrate level phosphorylation"], c:1, exp:"Non-cyclic photophosphorylation (also called Z-scheme due to the zigzag shape of electron flow) involves the linear, non-cyclic flow of electrons from water to NADP⁺, producing both ATP and NADPH₂."},
{q:"Cyclic photophosphorylation produces:", o:["Only NADPH₂ and no ATP","Both ATP and NADPH₂","Only ATP (no NADPH₂ or O₂)","Only O₂ and ATP"], c:2, exp:"In cyclic photophosphorylation, electrons cycle back from ferredoxin to P₇₀₀ through cytochrome complex, generating only ATP; no NADPH₂ is produced and no water is split (so no O₂ is released)."},
{q:"Cyclic photophosphorylation is stimulated when:", o:["CO₂ concentration is very high in the stroma","Chloroplast has excess NADPH₂ and low ATP demand","Both PS-I and PS-II are equally active","Chloroplast has low ATP and NADPH₂ accumulates"], c:3, exp:"Cyclic flow is triggered when chloroplast ATP is low and demand is high (e.g. for Calvin cycle), or when NADPH₂ accumulates; the rise in NADPH₂ stimulates a shift from non-cyclic to cyclic electron flow."},
{q:"Which of the following events does NOT occur during the light-dependent reaction of photosynthesis?", o:["Photolysis of water","Carbon dioxide fixation with RuBP","Reduction of NADP to NADPH₂","Photophosphorylation"], c:1, exp:"Carbon dioxide fixation with RuBP is a key step of the light-independent reaction (Calvin cycle), not the light-dependent reaction; all other listed events occur in the thylakoid."},
{q:"The Calvin cycle is also called the C₃ cycle because:", o:["It requires 3 photons of light","It occurs in the third layer of thylakoid","The first stable product formed is a three-carbon compound (3-PGA)","It was discovered by 3 scientists"], c:2, exp:"The Calvin cycle is called C₃ cycle because the first stable product formed when CO₂ is fixed onto RuBP is 3-phosphoglycerate (3-PGA), a three-carbon containing acid."},
{q:"The details of the light-independent reaction (dark reaction) of photosynthesis were discovered by:", o:["Dixon and Jolly","Calvin and Benson","Neil and Krebs","Von Neil and Koshland"], c:1, exp:"The details of the Calvin cycle were discovered by Melvin Calvin and his colleague Benson, which is why it is also called the Calvin-Benson cycle."},
{q:"The enzyme catalyzing the first step of carboxylation in the Calvin cycle is:", o:["NADP reductase","ATP synthase","RuBisCO (Ribulose 1,5-biphosphate Carboxylase/Oxygenase)","Phaeophytin"], c:2, exp:"RuBisCO catalyzes the carboxylation reaction where CO₂ is fixed onto ribulose 1,5-biphosphate (RuBP) to form the first stable product, 3-PGA; it is the most abundant enzyme on Earth."},
{q:"Three phases of the Calvin cycle in the correct sequence are:", o:["Reduction → Carboxylation → Regeneration","Regeneration → Carboxylation → Reduction","Carboxylation → Regeneration → Reduction","Carboxylation → Reduction → Regeneration"], c:3, exp:"The Calvin cycle proceeds in three ordered phases: (1) Carboxylation — CO₂ fixation onto RuBP forming 3-PGA, (2) Reduction — 3-PGA reduced to triose phosphate using ATP and NADPH₂, and (3) Regeneration — RuBP is regenerated from triose phosphate."},
{q:"For the net synthesis of one triose molecule, the Calvin cycle consumes:", o:["6 ATP and 3 NADPH₂","9 ATP and 6 NADPH₂","3 ATP and 9 NADPH₂","6 ATP and 6 NADPH₂"], c:1, exp:"For the net synthesis of one triose (G3P) molecule via the Calvin cycle, a total of 9 ATP molecules and 6 NADPH₂ molecules are consumed across the three phases."},
{q:"During the regeneration phase of the Calvin cycle, 5 molecules of triose sugar rearrange to form:", o:["5 molecules of RuBP and 1 glucose","2 molecules of RuBP and 3 trioses","3 molecules of RuBP (5-carbon) plus 1 triose net gain","6 molecules of 3-PGA"], c:2, exp:"During regeneration, 5 molecules of triose (3-PGAl) rearrange in three interlinked C₃ cycles using 3 ATP to reform 3 molecules of 5-carbon RuBP, while one triose molecule is the net gain."},
{q:"Glycolysis — the anaerobic breakdown of glucose into two pyruvate molecules — occurs in which cellular location?", o:["Mitochondrial matrix","Thylakoid","Cytosol","Nucleus"], c:2, exp:"All enzymes of glycolysis, along with the ATP and NAD cofactors required, are present in the cytosol, where the entire process takes place outside any membrane-bound organelle."},
{q:"During the preparatory phase of glycolysis, how many ATP molecules are consumed?", o:["4 ATP","1 ATP","3 ATP","2 ATP"], c:3, exp:"During the preparatory phase, 2 ATP molecules are consumed to phosphorylate glucose and fructose-6-phosphate, ultimately producing phosphorylated triose (dihydroxyacetone phosphate and 3-phosphoglyceraldehyde)."},
{q:"The net gain of ATP molecules from one complete round of glycolysis is:", o:["4 ATP","6 ATP","2 ATP","8 ATP"], c:2, exp:"Glycolysis produces 4 ATP by substrate level phosphorylation but consumes 2 ATP in the preparatory phase, giving a net gain of only 2 ATP per glucose molecule."},
{q:"How many NADH₂ molecules are produced per glucose molecule during glycolysis?", o:["4","1","2","3"], c:2, exp:"During the oxidative phase of glycolysis, 2 NADH₂ molecules are produced when 2 NAD⁺ molecules accept electrons from the oxidation of 2 triose phosphate molecules."},
{q:"In lactic acid fermentation, pyruvate is directly converted to:", o:["Ethyl alcohol and CO₂","Acetyl CoA","Citric acid","Lactate (lactic acid) using NADH₂"], c:3, exp:"In lactic acid fermentation, 2NADH₂ are used to directly reduce pyruvate to lactate (lactic acid) without releasing CO₂, regenerating NAD⁺ for continued glycolysis."},
{q:"Lactic acid fermentation in humans occurs specifically in which cells during intense exercise?", o:["Liver cells","Nerve cells","Muscle cells","Red blood cells"], c:2, exp:"Lactic acid fermentation occurs in muscle cells of humans and other animals during extreme physical activities when oxygen supply is insufficient for aerobic respiration."},
{q:"Which microorganisms are best known for performing alcoholic fermentation?", o:["Bacteria only","Molds and fungi only","Yeasts and some bacteria","Algae"], c:2, exp:"A small but significant minority of organisms, including yeasts and some bacteria, obtain energy by anaerobic respiration through alcoholic fermentation, breaking pyruvate into CO₂ and ethyl alcohol."},
{q:"In alcoholic fermentation, pyruvate first undergoes decarboxylation to form:", o:["Lactate","Acetyl","Acetyl CoA","Oxaloacetate"], c:1, exp:"In alcoholic fermentation, pyruvate loses one carbon as CO₂ (decarboxylation), forming a two-carbon compound called Acetyl, which is then reduced to ethyl alcohol (ethanol) using NADH₂."},
{q:"Pyruvate oxidation (converting pyruvate to Acetyl CoA) occurs in which organelle?", o:["Cytosol","Nucleus","Chloroplast","Mitochondria"], c:3, exp:"During pyruvate oxidation, pyruvate is transported into the mitochondria where it combines with co-enzyme A to form Acetyl CoA (2-carbon), CO₂, and NADH₂."},
{q:"Krebs cycle is also called the Tricarboxylic Acid (TCA) cycle because:", o:["Three ATP molecules are produced per turn","Three turns are needed per glucose","The first compound formed (citric acid) has three carboxylic acid groups","Three types of acids are involved"], c:2, exp:"The cycle is named Tricarboxylic Acid cycle (TCA) because citric acid, the first compound formed during the cycle, has three carboxylic acid (-COOH) groups in its structure."},
{q:"The Krebs cycle starts and ends with which compound?", o:["Citric acid (6C)","Oxaloacetate/oxaloacetic acid (4C)","Succinic acid (4C)","Acetyl CoA (2C)"], c:1, exp:"The Krebs cycle starts when Acetyl CoA condenses with the 4-carbon oxaloacetate to form 6-carbon citric acid, and it ends when oxaloacetate is regenerated, completing the cycle."},
{q:"Per one complete turn of the Krebs cycle, how many NADH₂ molecules are produced?", o:["1","2","4","3"], c:3, exp:"Each turn of the Krebs cycle produces 3 NADH₂, 1 FADH₂, and 1 ATP (via GTP) — the three NADH₂ are produced at steps involving isocitrate, α-ketoglutarate, and malate oxidation."},
{q:"Oxidative decarboxylation of isocitrate in the Krebs cycle produces:", o:["Succinate","Citrate","Fumarate","α-ketoglutarate"], c:3, exp:"Isocitrate undergoes oxidative decarboxylation (losing CO₂) in step 3 of the Krebs cycle to form α-ketoglutarate, simultaneously reducing NAD⁺ to NADH₂."},
{q:"How many turns of the Krebs cycle are required for complete oxidation of one glucose molecule?", o:["1 turn","3 turns","4 turns","2 turns"], c:3, exp:"One glucose molecule produces 2 pyruvate molecules via glycolysis, each forming one Acetyl CoA, so 2 turns of the Krebs cycle are required to completely oxidize one glucose molecule."},
{q:"Complete aerobic oxidation of one glucose molecule results in a net gain of:", o:["28 ATP","38 ATP","36 ATP","32 ATP"], c:2, exp:"The complete aerobic oxidation of one glucose molecule through glycolysis, pyruvate oxidation, Krebs cycle, and electron transport chain yields a net gain of 36 ATP molecules."},

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
   Randomises option order; tracks which option
   is now correct after the shuffle.
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));

  /* Fisher-Yates shuffle */
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }

  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">📖 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.2 Enzymes &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
// ── STICKY TIMER ──
let timeLeft = 65 * 60;
const timerDisplay = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');

const timerInterval = setInterval(() => {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerDisplay.textContent =
    String(mins).padStart(2,'0') + ':' +
    String(secs).padStart(2,'0');
  if(timeLeft <= 300){
    timerBox.classList.add('danger');
  }
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    timerDisplay.textContent = '⏰ TIME UP';
    showResult();
  }
  timeLeft--;
}, 1000);
</script>
