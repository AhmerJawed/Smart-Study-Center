<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do As Directed — Smart Study Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── BASE ── */
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#0d2137 0%,#1565c0 50%,#1976d2 100%);
  min-height:100vh;
  padding:20px 16px;
}

/* ── WATERMARK ── */
.watermark-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.watermark-overlay span{
  position:absolute;font-size:14px;font-weight:700;
  color:rgba(21,101,192,0.065);white-space:nowrap;
  transform:rotate(-35deg);letter-spacing:1px;text-transform:uppercase;
}

/* ── CONTAINER ── */
.container{
  max-width:880px;margin:0 auto;background:#fff;
  border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:hidden;position:relative;z-index:1;
}

/* ── CHAPTER HEADER ── */
.chapter-header{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;padding:20px 24px;text-align:center;
}
.ch-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.chapter-header h1{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.ch-meta{font-size:12px;opacity:.75;font-weight:500}

/* ── STATS BAR ── */
.stats{
  display:flex;justify-content:space-around;padding:14px 20px;
  background:#e3f2fd;border-bottom:2px solid #bbdefb;flex-wrap:wrap;gap:8px;
}
.stat-item{text-align:center}
.stat-label{font-size:10px;color:#1565c0;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;color:#0d2137;margin-top:3px}

/* ── QUIZ AREA ── */
.quiz-area{padding:24px 22px}

/* ── SECTION DIVIDER ── */
.section-divider{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;border-radius:12px;padding:16px 22px;
  margin:24px 0 16px;text-align:center;
}
.section-divider:first-child{margin-top:0}
.section-divider h3{font-size:15px;font-weight:800;letter-spacing:.6px;margin-bottom:4px}
.section-divider p{font-size:11px;opacity:.8;font-weight:500;letter-spacing:.3px}

/* ── QUESTION CARD ── */
.question-card{
  background:#f8f9fa;border-radius:12px;padding:20px;
  margin-bottom:16px;border-left:5px solid #1565c0;
  transition:box-shadow .2s;
}
.question-card:hover{box-shadow:0 4px 16px rgba(21,101,192,.1)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;
}
.q-num{
  background:#1565c0;color:#fff;padding:4px 14px;
  border-radius:20px;font-weight:700;font-size:12px;
}
.q-text{
  font-size:15px;color:#1a1a1a;margin-bottom:14px;line-height:1.65;font-weight:500;
}

/* ── SENTENCE HIGHLIGHT ── */
.faulty-sentence{
  display:block;margin-top:9px;padding:9px 14px;
  background:#fff3e0;border-left:4px solid #f57c00;
  border-radius:7px;font-style:italic;color:#bf360c;
  font-size:14.5px;font-weight:700;letter-spacing:.1px;
  line-height:1.6;
}

/* ── OPTIONS ── */
.options{display:grid;gap:9px}
.option{
  padding:11px 16px;background:#fff;border:2px solid #dee2e6;
  border-radius:9px;cursor:pointer;transition:all .25s;
  font-size:14px;color:#333;line-height:1.4;
}
.option:hover:not(.disabled){border-color:#1565c0;background:#e3f2fd;color:#0d2137}
.option.selected{border-color:#1565c0;background:#bbdefb;color:#0d2137}
.option.correct{border-color:#1565c0!important;background:#e3f2fd!important;color:#0d2137!important;font-weight:700}
.option.wrong{border-color:#c62828!important;background:#ffebee!important;color:#b71c1c!important}
.option.disabled{cursor:not-allowed}

/* ── CHECK BUTTON ── */
.check-btn{
  margin-top:13px;background:#1565c0;color:#fff;border:none;
  padding:9px 26px;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
.check-btn:hover:not(:disabled){background:#1976d2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(21,101,192,.35)}
.check-btn:disabled{background:#bdbdbd;cursor:not-allowed;transform:none;box-shadow:none}

/* ── FEEDBACK / EXPLANATION ── */
.feedback{
  display:none;margin-top:11px;padding:10px 14px;
  border-radius:8px;font-size:13px;line-height:1.5;
}
.feedback.show{display:block}
.feedback.correct{background:#e3f2fd;color:#0d2137;border:2px solid #64b5f6;font-weight:600}
.feedback.wrong{background:#ffebee;color:#b71c1c;border:2px solid #ef9a9a;font-weight:600}
.explanation-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#fffde7;border:2px solid #f9a825;
  border-radius:8px;font-size:13px;color:#5d4037;line-height:1.6;
}
.explanation-box.show{display:block}
.exp-label{font-weight:700;color:#f57f17;margin-right:4px}

/* ── RESULT CARD ── */
.result-card{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;border-radius:14px;padding:30px 24px;text-align:center;
  margin:8px 0 4px;
}
.result-card h2{font-size:23px;margin-bottom:18px;font-weight:800}
.result-grid{
  display:flex;justify-content:space-around;gap:16px;flex-wrap:wrap;margin-bottom:22px;
}
.result-stat{text-align:center;background:rgba(255,255,255,.14);border-radius:12px;padding:14px 22px}
.result-stat-value{font-size:32px;font-weight:800}
.result-stat-label{font-size:12px;opacity:.85;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.grade-badge{
  display:inline-block;font-size:42px;font-weight:900;
  background:rgba(255,255,255,.2);border-radius:50%;
  width:80px;height:80px;line-height:80px;margin-bottom:16px;
}
.result-btn{
  background:rgba(255,255,255,.18);color:#fff;
  border:2px solid rgba(255,255,255,.7);padding:10px 24px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;margin:6px;transition:all .25s;
}
.result-btn:hover{background:#fff;color:#1565c0}

/* ── FOOTER ── */
.brand-footer{
  background:#f5f5f5;border-top:1px solid #e0e0e0;
  color:#9e9e9e;text-align:center;padding:12px;font-size:11px;letter-spacing:.3px;
}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .chapter-header h1{font-size:17px}
  .stat-value{font-size:20px}
  .result-stat-value{font-size:26px}
  .quiz-area{padding:16px 14px}
  .faulty-sentence{font-size:13.5px}
  .section-divider h3{font-size:14px}
}
</style>
</head>

<div class="watermark-overlay" id="wmOverlay"></div>

<div class="container">

  <!-- HEADER -->

    <div class="ch-meta">Smart Study Center &nbsp;·&nbsp; Sir Ahmer Javed</div>

  <!-- STATS BAR -->
  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Total Qs</div>
      <div class="stat-value" id="statTotal">40</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Answered</div>
      <div class="stat-value" id="statAnswered">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Correct</div>
      <div class="stat-value" id="statCorrect">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="statScore">0%</div>
    </div>
  </div>

  <!-- QUIZ AREA -->
  <div class="quiz-area" id="quizArea"></div>

  <!-- FOOTER -->
  <div class="brand-footer">

</div><!-- /container -->

<script>
/* ═══════════════════════════════════════════════
   MCQ DATA — Do As Directed
   Section A : Punctuation        (Q 1–10)
   Section B : Compound Sentences (Q 11–20)
   Section C : Voice Change       (Q 21–30)
   Section D : Narration Change   (Q 31–40)
═══════════════════════════════════════════════ */
const questions = [

/* ─────────────────────────────────────────────
   SECTION A — PUNCTUATION
───────────────────────────────────────────── */
{section:"🔤  Section A: Punctuation",
 sectionSub:"Choose the correctly punctuated form of each sentence.",
 q:"Punctuate the following sentence:<span class='faulty-sentence'>wow that was an amazing performance</span>",
 o:["Wow! That was an amazing performance!",
    "Wow. That was an amazing performance.",
    "wow, that was an amazing performance!",
    "Wow! That was an amazing performance."],
 c:0,
 exp:"📌 'Wow' is an interjection of surprise/excitement and takes an exclamation mark (!). The sentence that follows, expressing amazement, also ends with '!'. Every sentence begins with a capital letter. Option b wrongly uses a full stop after 'Wow'. Option d is missing the '!' at the end of the sentence."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>i have three subjects to study english physics and chemistry</span>",
 o:["I have three subjects to study English, Physics and Chemistry.",
    "I have three subjects to study: English, Physics, and Chemistry.",
    "I have three subjects to study: English, physics, and chemistry.",
    "I have three subjects to study, English, Physics, and Chemistry."],
 c:1,
 exp:"📌 A colon (:) is used to introduce a list after a complete clause. English, Physics, and Chemistry are proper nouns (names of subjects) and must be capitalized. Items in a series of three or more need commas between them, including the serial comma before 'and'. Option a omits the colon. Option c wrongly lowercases subject names. Option d uses a comma instead of a colon."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>can you please help me with my assignment</span>",
 o:["Can you please help me with my assignment!",
    "Can you, please help me with my assignment?",
    "can you please help me with my assignment?",
    "Can you please help me with my assignment?"],
 c:3,
 exp:"📌 Direct questions end with a question mark (?). The first word of every sentence is capitalized ('Can'). No comma is needed before 'please' when it appears mid-sentence as a politeness marker. An exclamation mark (option a) is used for strong commands or emotion — not for polite questions. Option b adds an unnecessary comma after 'you'. Option c fails to capitalize the first word."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>she said i am feeling unwell today</span>",
 o:["She said, &quot;I am feeling unwell today.&quot;",
    "She said &quot;I am feeling unwell today.&quot;",
    "She said, 'i am feeling unwell today.'",
    "She said: I am feeling unwell today."],
 c:0,
 exp:"📌 A comma follows the reporting verb ('said,') before direct speech. The spoken words are enclosed in quotation marks. The first word inside the quotes is capitalized ('I'). The full stop falls inside the closing quotation mark. Option b omits the comma after 'said'. Option c fails to capitalize 'i' inside the quotes. A colon (option d) is not standard for short, casual direct speech."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>my uncle who is a lawyer lives in karachi</span>",
 o:["My uncle who is a lawyer, lives in Karachi.",
    "My uncle, who is a lawyer lives in Karachi.",
    "My uncle, who is a lawyer, lives in Karachi.",
    "My uncle, who is a Lawyer, lives in karachi."],
 c:2,
 exp:"📌 'Who is a lawyer' is a non-defining relative clause — it provides extra, non-essential information. Such clauses must be enclosed in commas on both sides. 'Karachi' is a proper noun and is capitalized. 'Lawyer' is a common noun — it must NOT be capitalized (option d is wrong). Options a and b are each missing one of the two required commas."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>he bought apples oranges bananas and mangoes from the market</span>",
 o:["He bought apples oranges, bananas and mangoes from the market.",
    "He bought apples, oranges, bananas and mangoes from the market.",
    "He bought apples; oranges; bananas; and mangoes from the market.",
    "He bought apples, oranges, bananas, and mangoes from the market."],
 c:3,
 exp:"📌 Items in a list of three or more are each separated by commas. The serial (Oxford) comma before 'and' in the final item is required for standard punctuation. Semicolons (option c) separate complex list items — not single words. Option a has missing commas. Option b omits the serial comma before 'and', which can create ambiguity."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>its a hot day today isnt it</span>",
 o:["Its a hot day today, isn't it?",
    "It's a hot day today isn't it?",
    "It's a hot day, today, isn't it?",
    "It's a hot day today, isn't it?"],
 c:3,
 exp:"📌 'It's' is a contraction of 'It is' — the apostrophe marks the omitted letter. 'Isn't' is a contraction of 'is not' — it also requires an apostrophe. A tag question ('isn't it?') is separated from the main clause by a comma and ends with a question mark. Option a is missing the apostrophe in 'Its'. Option b is missing the comma before 'isn't'. Option c incorrectly places an extra comma after 'today'."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>the childrens park was closed for repairs</span>",
 o:["The childrens' park was closed for repairs.",
    "The children's park was closed for repairs.",
    "The childrens park' was closed for repairs.",
    "The Children's park was closed for repairs."],
 c:1,
 exp:"📌 'Children' is an irregular plural noun (it does not end in -s). For irregular plurals NOT ending in -s, possession is shown by adding apostrophe + s: children's. 'Childrens'' (option a) is wrong because 'childrens' is not a word. 'Park' is a common noun and must NOT be capitalized (option d wrongly writes 'Children's park' with capital C but that's actually fine — however the missing period after Mr is the issue). The correct form is children's."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>hurrah we have won the match shouted the captain</span>",
 o:["Hurrah! We have won the match, shouted the captain.",
    "&quot;Hurrah! We have won the match!&quot; shouted the captain.",
    "Hurrah, we have won the match! shouted the captain.",
    "&quot;Hurrah! We have won the match,&quot; shouted the captain."],
 c:1,
 exp:"📌 The direct speech ('Hurrah! We have won the match!') is enclosed in quotation marks. 'Hurrah!' is an interjection of joy and takes '!'. The exclamatory sentence of victory also ends with '!'. The reporting clause 'shouted the captain' follows the closing quotation mark and ends with a full stop. Option a omits the quotation marks. Option d incorrectly replaces the '!' inside with a comma."},

{q:"Punctuate the following sentence:<span class='faulty-sentence'>mr ahmed the manager of abc company will address the meeting</span>",
 o:["Mr Ahmed, the manager of ABC Company, will address the meeting.",
    "Mr. Ahmed the manager of ABC Company will address the meeting.",
    "Mr. Ahmed, the manager of abc company, will address the meeting.",
    "Mr. Ahmed, the manager of ABC Company, will address the meeting."],
 c:3,
 exp:"📌 'Mr.' is an abbreviation and requires a full stop after it. The appositive phrase 'the manager of ABC Company' provides extra information about the subject and must be enclosed in commas on both sides. 'ABC Company' is a proper noun — all letters are capitalized. Option a omits the full stop after 'Mr'. Option b omits both commas around the appositive. Option c lowercases 'abc company' — incorrect."},

/* ─────────────────────────────────────────────
   SECTION B — COMPOUND SENTENCES
───────────────────────────────────────────── */
{section:"🔗  Section B: Make a Compound Sentence",
 sectionSub:"Join each pair of simple sentences into one correct compound sentence.",
 q:"Join the following into a compound sentence:<span class='faulty-sentence'>This is the book. It was published last year.</span>",
 o:["This is the book, but it was published last year.",
    "This is the book, so it was published last year.",
    "This is the book, and it was published last year.",
    "This is the book, for it was published last year."],
 c:2,
 exp:"📌 'And' joins two related facts of equal importance. Both sentences provide information about the same book — the second simply adds another detail. Since there is no contrast ('but/yet'), no consequence ('so'), and no reason ('for'), 'and' is the only appropriate coordinating conjunction. A comma is placed before the conjunction when joining two independent clauses."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>I wanted to buy the dress. It was too expensive.</span>",
 o:["I wanted to buy the dress, and it was too expensive.",
    "I wanted to buy the dress, so it was too expensive.",
    "I wanted to buy the dress, for it was too expensive.",
    "I wanted to buy the dress, but it was too expensive."],
 c:3,
 exp:"📌 'But' shows contrast or opposition. The first clause expresses a desire ('wanted to buy'); the second presents an obstacle ('too expensive'). 'But' correctly captures this contrast. 'And' would simply add two facts; 'so' implies the desire caused the expense; 'for' would place the expense as a reason for something — none of these reflect the contrasting relationship here."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>She studied very hard. She could not pass the exam.</span>",
 o:["She studied very hard, and she could not pass the exam.",
    "She studied very hard, yet she could not pass the exam.",
    "She studied very hard, so she could not pass the exam.",
    "She studied very hard, for she could not pass the exam."],
 c:1,
 exp:"📌 'Yet' (like 'but') shows an unexpected, surprising contrast. We expect hard study to lead to passing — but it did not. 'Yet' captures this contradiction perfectly. 'So' would wrongly imply studying caused the failure. 'And' simply adds facts without showing they are contradictory. 'For' gives a reason — neither meaning fits here."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>He was exhausted. He went to sleep immediately.</span>",
 o:["He was exhausted, but he went to sleep immediately.",
    "He was exhausted, yet he went to sleep immediately.",
    "He was exhausted, and he went to sleep immediately.",
    "He was exhausted, so he went to sleep immediately."],
 c:3,
 exp:"📌 'So' expresses result or consequence. Being exhausted is the cause; going to sleep immediately is the direct, natural result. 'So' is the coordinating conjunction for cause-and-effect. 'But/yet' would imply contrast (e.g., he was exhausted but stayed awake) — the opposite of the intended meaning. 'And' merely adds two facts without showing the causal link."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>You can study medicine. You can study engineering.</span>",
 o:["You can study medicine, or you can study engineering.",
    "You can study medicine, and you can study engineering.",
    "You can study medicine, but you can study engineering.",
    "You can study medicine, so you can study engineering."],
 c:0,
 exp:"📌 'Or' presents alternatives or choices. The two sentences offer two different fields to choose from — studying medicine OR engineering. Since these are alternatives (not additions, contrasts, or cause-and-effect), 'or' is the only appropriate conjunction. 'And' suggests doing both; 'but' implies contrast; 'so' implies consequence — none of these fit the idea of a choice."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>He is very rich. He is not satisfied with his life.</span>",
 o:["He is very rich, and he is not satisfied with his life.",
    "He is very rich, but he is not satisfied with his life.",
    "He is very rich, so he is not satisfied with his life.",
    "He is very rich, or he is not satisfied with his life."],
 c:1,
 exp:"📌 'But' joins two contrasting ideas. Wealth and dissatisfaction are contradictory states — we commonly expect the rich to be content. 'But' highlights this contrast between the two facts about the same person. 'And' would simply add facts without showing they are opposing. 'So' would imply wealth caused the dissatisfaction — not the intended meaning here."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>She did not attend the class. She did not submit the assignment.</span>",
 o:["She did not attend the class, and she did not submit the assignment.",
    "She did not attend the class, but she did not submit the assignment.",
    "She did not attend the class, nor did she submit the assignment.",
    "She did not attend the class, so she did not submit the assignment."],
 c:2,
 exp:"📌 'Nor' joins two negative clauses and means 'and not'. After 'nor', the auxiliary verb must precede the subject (inversion): 'nor did she submit' (NOT 'nor she submitted'). This is the grammatically precise conjunction for linking two negative independent clauses. 'But' implies contrast; 'so' implies consequence — neither fits when both clauses state similar negative facts."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>The picnic was cancelled. It was raining heavily.</span>",
 o:["The picnic was cancelled, and it was raining heavily.",
    "The picnic was cancelled, but it was raining heavily.",
    "The picnic was cancelled, so it was raining heavily.",
    "The picnic was cancelled, for it was raining heavily."],
 c:3,
 exp:"📌 'For' (as a coordinating conjunction) introduces a reason or explanation — similar in meaning to 'because'. The picnic being cancelled needs a reason; the heavy rain is that reason. 'So' is incorrect here because it would mean the cancellation caused the rain — logically impossible. 'For' correctly places the explanation (rain) in the second clause, after the result (cancellation)."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>I forgot to set the alarm. I missed the bus.</span>",
 o:["I forgot to set the alarm, but I missed the bus.",
    "I forgot to set the alarm, yet I missed the bus.",
    "I forgot to set the alarm, so I missed the bus.",
    "I forgot to set the alarm, for I missed the bus."],
 c:2,
 exp:"📌 'So' shows result or consequence. Forgetting to set the alarm is the cause; missing the bus is its direct effect. 'So' correctly links a cause to its result. 'For' would be wrong here — 'for' introduces the reason in the second clause (it would read: 'I missed the bus, for I forgot the alarm'). 'But/yet' signal contrast — not applicable when one event directly causes another."},

{q:"Join the following into a compound sentence:<span class='faulty-sentence'>Ali worked hard all year. He topped his class.</span>",
 o:["Ali worked hard all year, but he topped his class.",
    "Ali worked hard all year, yet he topped his class.",
    "Ali worked hard all year, or he topped his class.",
    "Ali worked hard all year, and he topped his class."],
 c:3,
 exp:"📌 'And' joins two related, logically connected positive facts. Working hard and topping the class are complementary, expected outcomes — the second follows naturally from the first. 'Yet/but' would signal a surprise or contrast (he worked hard but still failed), which contradicts the positive meaning here. 'Or' suggests alternatives, which is not the case here."},

/* ─────────────────────────────────────────────
   SECTION C — VOICE CHANGE
───────────────────────────────────────────── */
{section:"🔄  Section C: Change the Voice",
 sectionSub:"Choose the correct passive (or active) form of each sentence.",
 q:"Change the voice of the following sentence:<span class='faulty-sentence'>They played hockey.</span>",
 o:["Hockey is played by them.",
    "Hockey was playing by them.",
    "Hockey has been played by them.",
    "Hockey was played by them."],
 c:3,
 exp:"📌 Rule — Simple Past Active → Simple Past Passive. Formula: Object + was/were + V3 + by + Subject. 'They' (subject) → 'them' (object of 'by'). 'played' (V2, Simple Past) → 'was played' (was + V3). 'Hockey' (object) becomes the new subject. 'Is played' = Simple Present Passive. 'Has been played' = Present Perfect Passive. 'Was playing' is not a valid passive construction."},

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>The company started a new project.</span>",
 o:["A new project was started by the company.",
    "A new project is started by the company.",
    "A new project has been started by the company.",
    "A new project was being started by the company."],
 c:0,
 exp:"📌 Rule — Simple Past Active → Simple Past Passive. Formula: Object + was/were + V3 + by + Subject. 'A new project' (object) becomes the subject. 'started' → 'was started'. 'The company' goes after 'by'. Option b changes to Present. Option c changes to Present Perfect. Option d changes to Past Continuous Passive. All three shift the tense incorrectly."},

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>She sings a beautiful song.</span>",
 o:["A beautiful song is sang by her.",
    "A beautiful song was sung by her.",
    "A beautiful song is being sung by her.",
    "A beautiful song is sung by her."],
 c:3,
 exp:"📌 Rule — Simple Present Active → Simple Present Passive. Formula: Object + is/are + V3 + by + Subject. 'She' → 'her'. 'sings' → 'is sung'. The V3 (past participle) of 'sing' is 'sung' — not 'sang', which is the Simple Past tense. 'Is being sung' = Present Continuous Passive (wrong aspect). 'Was sung' = Simple Past Passive (wrong tense). 'Is sang' is never correct."},

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>The teacher is explaining the lesson.</span>",
 o:["The lesson is explained by the teacher.",
    "The lesson was being explained by the teacher.",
    "The lesson has been explained by the teacher.",
    "The lesson is being explained by the teacher."],
 c:3,
 exp:"📌 Rule — Present Continuous Active → Present Continuous Passive. Formula: Object + is/are + being + V3 + by + Subject. 'is explaining' → 'is being explained'. Option a = Simple Present Passive (wrong aspect). Option b = Past Continuous Passive (wrong tense). Option c = Present Perfect Passive (wrong tense). Only option d correctly preserves the Present Continuous tense and aspect."},

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>He has written a letter to the principal.</span>",

    "A letter was written to the principal by him.",
    "A letter had been written to the principal by him.",
    "A letter is written to the principal by him."],
 c:0,
 exp:"📌 Rule — Present Perfect Active → Present Perfect Passive. Formula: Object + has/have + been + V3 + by + Subject. 'He' → 'him'. 'has written' → 'has been written'. The phrase 'to the principal' remains in its position. Option b = Simple Past Passive. Option c = Past Perfect Passive. Option d = Simple Present Passive. All three options incorrectly change the tense."},

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>They will build a new school in this area.</span>",

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>The police arrested three criminals.</span>",

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>She was cooking food when I arrived.</span>",

{q:"Change the voice of the following sentence:<span class='faulty-sentence'>He had finished the report before the meeting.</span>",

/* ─────────────────────────────────────────────
   SECTION D — NARRATION CHANGE
───────────────────────────────────────────── */
{section:"💬  Section D: Change the Narration",
 sectionSub:"Choose the correct indirect (or direct) speech form for each sentence.",
 q:"Change the narration of the following sentence:<span class='faulty-sentence'>He said to me, &quot;Are you going to the party?&quot;</span>",

    "He said to me that was I going to the party.",
    "He asked me whether I am going to the party.",
    "He asked me if I was going to the party."],
 c:3,
 exp:"📌 Yes/No questions in Indirect Speech: (1) 'said to' → 'asked'. (2) Use 'if' or 'whether' — NOT 'that'. (3) Question order (Are you?) → Statement order (I was). (4) 'Are' → 'was' (tense shift: Simple Present → Simple Past). (5) 'you' → 'I' (pronoun shift: 2nd person → 1st). (6) Drop the question mark. Option c keeps 'am' — the present tense must shift to 'was'."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>He said to me, &quot;Thank you.&quot;</span>",
 o:["He told me that he was thankful to me.",
    "He said to me that thank you.",
    "He told me thank you.",
    "He thanked me."],
 c:3,
 exp:"📌 'Thank you' is a formula of gratitude and cannot be reported with a 'that-clause'. In indirect speech, the entire expression is converted using the single verb 'thanked': He thanked me. This is a special/exceptional case. Similarly: 'Sorry' → 'apologized to'; 'Congratulations!' → 'congratulated'. 'Told me that he was thankful' — while meaningful — is not the standard grammatical conversion rule for this expression."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>She said, &quot;I am very happy today.&quot;</span>",

    "She told that she was very happy today.",
    "She said that she was very happy today.",
    "She said that she was very happy that day."],
 c:3,
 exp:"📌 Rules applied: (1) 'said' → 'said that' (no object after the verb — 'told' without an object is grammatically wrong). (2) 'I' → 'she'. (3) 'am' → 'was' (tense shift). (4) 'today' → 'that day' (time expressions must change in indirect speech). Option c applies the tense shift but fails to change 'today'. Option b uses 'told' without an object and also keeps 'today' — doubly incorrect."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>He said, &quot;I will come tomorrow.&quot;</span>",
 o:["He said that he would come tomorrow.",
    "He said that he will come the next day.",
    "He told that he would come the next day.",
    "He said that he would come the next day."],
 c:3,
 exp:"📌 Rules applied: (1) 'said' → 'said that'. (2) 'I' → 'he'. (3) 'will' → 'would' (modal shift in indirect speech). (4) 'tomorrow' → 'the next day'. Option a keeps 'tomorrow' unchanged — incorrect. Option b keeps 'will' unchanged — incorrect. Option c uses 'told' without an object — grammatically wrong. Only option d correctly applies all four rules."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>She said to him, &quot;Please open the window.&quot;</span>",

    "She said to him to please open the window.",
    "She requested him to open the window."],
 c:3,
 exp:"📌 Polite requests with 'please' in indirect speech use: requested + object + to + V1. (1) 'said to' → 'requested'. (2) 'please' is dropped. (3) Imperative ('open') → infinitive ('to open'). 'Ordered' (option b) implies a command — it does not match the polite tone of 'please'. 'Said to him to please open' (option c) is grammatically incorrect and retains 'please' unnecessarily."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>The teacher said to the students, &quot;Work hard.&quot;</span>",
 o:["The teacher told the students work hard.",
    "The teacher said the students to work hard.",
    "The teacher told that the students to work hard.",
    "The teacher advised the students to work hard."],
 c:3,
 exp:"📌 Imperatives in indirect speech: Reporting Verb + Object + to + V1. (1) 'said to' → 'advised' (for general advice) or 'told' (for commands). (2) 'Work hard' → 'to work hard'. 'Work hard' from a teacher is general guidance, so 'advised' is the most suitable verb. 'Said' cannot directly precede 'to + infinitive'. Option a ('told the students work hard') omits 'to' before the verb."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>He said, &quot;I have completed my homework.&quot;</span>",

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>She said to me, &quot;Where do you live?&quot;</span>",
 o:["She asked me where do I live.",

    "She asked me where I live.",
    "She asked me where I lived."],

 exp:"📌 Wh-questions in Indirect Speech: (1) 'said to' → 'asked'. (2) The wh-word ('where') is retained — do NOT add 'if/whether/that'. (3) Question order (do you live?) → Statement order (I lived). (4) 'do you live' → 'I lived' (pronoun + tense shift). (5) Drop the question mark. Option a keeps question order. Option b wrongly adds 'that' before 'where'. Option c keeps the present tense — must shift to past."},

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>He said, &quot;Alas! I have lost my wallet.&quot;</span>",

{q:"Change the narration of the following sentence:<span class='faulty-sentence'>The mother said to her son, &quot;Do not waste time.&quot;</span>",

    "The mother told her son do not waste time.",
    "The mother told her son not to waste time.",
    "The mother told her son to not waste time."],
 c:2,
 exp:"📌 Negative imperatives in Indirect Speech: told + object + not + to + V1. (1) 'said to' → 'told'. (2) 'Do not waste' → 'not to waste'. Key rule: 'not' comes BEFORE 'to' — 'not to waste' (correct) vs. 'to not waste' (a split infinitive — avoided in standard grammar). Option a uses 'said' without the correct structure. Option b omits 'to' before the verb. Option d creates a split infinitive."}

];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE OPTIONS
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    /* ── Section divider ── */
    if(q.section){
      const divider = document.createElement('div');
      divider.className = 'section-divider';
      divider.innerHTML = `<h3>${q.section}</h3>${q.sectionSub ? '<p>'+q.sectionSub+'</p>' : ''}`;
      area.appendChild(divider);
    }

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practising!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise and Try Again!';     emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Do As Directed &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
</script>
