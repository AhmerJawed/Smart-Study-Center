<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerunds + Prepositions — Smart Study Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── BASE ── */
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#0d2137 0%,#1565c0 50%,#1976d2 100%);
  min-height:100vh;
  padding:20px 16px;
}

/* ── WATERMARK ── */
.watermark-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.watermark-overlay span{
  position:absolute;font-size:14px;font-weight:700;
  color:rgba(21,101,192,0.065);white-space:nowrap;
  transform:rotate(-35deg);letter-spacing:1px;text-transform:uppercase;
}

/* ── CONTAINER ── */
.container{
  max-width:880px;margin:0 auto;background:#fff;
  border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:visible;position:relative;z-index:1;
}

/* ── CHAPTER HEADER ── */
.chapter-header{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;padding:20px 24px;text-align:center;
}
.ch-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.chapter-header h1{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.ch-meta{font-size:12px;opacity:.75;font-weight:500}

/* ── STATS BAR ── */
.stats{
  display:flex;justify-content:space-around;padding:14px 20px;
  background:#e3f2fd;border-bottom:2px solid #bbdefb;flex-wrap:wrap;gap:8px;
}
.stat-item{text-align:center}
.stat-label{font-size:10px;color:#1565c0;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;color:#0d2137;margin-top:3px}

/* ── QUIZ AREA ── */
.quiz-area{padding:24px 22px}

/* ── QUESTION CARD ── */
.question-card{
  background:#f8f9fa;border-radius:12px;padding:20px;
  margin-bottom:16px;border-left:5px solid #1565c0;
  transition:box-shadow .2s;
}
.question-card:hover{box-shadow:0 4px 16px rgba(21,101,192,.1)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;
}
.q-num{
  background:#1565c0;color:#fff;padding:4px 14px;
  border-radius:20px;font-weight:700;font-size:12px;
}
.q-text{
  font-size:15px;color:#1a1a1a;margin-bottom:14px;line-height:1.65;font-weight:500;
}

/* ── OPTIONS ── */
.options{display:grid;gap:9px}
.option{
  padding:11px 16px;background:#fff;border:2px solid #dee2e6;
  border-radius:9px;cursor:pointer;transition:all .25s;
  font-size:14px;color:#333;line-height:1.4;
}
.option:hover:not(.disabled){border-color:#1565c0;background:#e3f2fd;color:#0d2137}
.option.selected{border-color:#1565c0;background:#bbdefb;color:#0d2137}
.option.correct{border-color:#1565c0!important;background:#e3f2fd!important;color:#0d2137!important;font-weight:700}
.option.wrong{border-color:#c62828!important;background:#ffebee!important;color:#b71c1c!important}
.option.disabled{cursor:not-allowed}

/* ── CHECK BUTTON ── */
.check-btn{
  margin-top:13px;background:#1565c0;color:#fff;border:none;
  padding:9px 26px;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
.check-btn:hover:not(:disabled){background:#1976d2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(21,101,192,.35)}
.check-btn:disabled{background:#bdbdbd;cursor:not-allowed;transform:none;box-shadow:none}

/* ── FEEDBACK / EXPLANATION ── */
.feedback{
  display:none;margin-top:11px;padding:10px 14px;
  border-radius:8px;font-size:13px;line-height:1.5;
}
.feedback.show{display:block}
.feedback.correct{background:#e3f2fd;color:#0d2137;border:2px solid #64b5f6;font-weight:600}
.feedback.wrong{background:#ffebee;color:#b71c1c;border:2px solid #ef9a9a;font-weight:600}
.explanation-box{
  display:none;margin-top:8px;padding:10px 14px;
  background:#fffde7;border:2px solid #f9a825;
  border-radius:8px;font-size:13px;color:#5d4037;line-height:1.5;
}
.explanation-box.show{display:block}
.exp-label{font-weight:700;color:#f57f17;margin-right:4px}

/* ── RESULT CARD ── */
.result-card{
  background:linear-gradient(135deg,#0d2137,#1565c0);
  color:#fff;border-radius:14px;padding:30px 24px;text-align:center;
  margin:8px 0 4px;
}
.result-card h2{font-size:23px;margin-bottom:18px;font-weight:800}
.result-grid{
  display:flex;justify-content:space-around;gap:16px;flex-wrap:wrap;margin-bottom:22px;
}
.result-stat{text-align:center;background:rgba(255,255,255,.14);border-radius:12px;padding:14px 22px}
.result-stat-value{font-size:32px;font-weight:800}
.result-stat-label{font-size:12px;opacity:.85;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.grade-badge{
  display:inline-block;font-size:42px;font-weight:900;
  background:rgba(255,255,255,.2);border-radius:50%;
  width:80px;height:80px;line-height:80px;margin-bottom:16px;
}
.result-btn{
  background:rgba(255,255,255,.18);color:#fff;
  border:2px solid rgba(255,255,255,.7);padding:10px 24px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:700;margin:6px;transition:all .25s;
}
.result-btn:hover{background:#fff;color:#1565c0}

/* ── FOOTER ── */
.brand-footer{
  background:#f5f5f5;border-top:1px solid #e0e0e0;
  color:#9e9e9e;text-align:center;padding:12px;font-size:11px;letter-spacing:.3px;
}

/* ── TIMER ── */
.timer-box{
  position:sticky;top:0;z-index:999;
  width:100%;padding:10px 20px;
  background:#fff3e0;border-bottom:2px solid #ff9800;
  color:#e65100;
  display:flex;align-items:center;justify-content:center;
  gap:10px;font-size:15px;font-weight:700;letter-spacing:.5px;
  transition:background .4s,border-color .4s,color .4s;
}
.timer-box.danger{
  background:#ffebee;border-bottom-color:#c62828;color:#c62828;
}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .chapter-header h1{font-size:17px}
  .stat-value{font-size:20px}
  .result-stat-value{font-size:26px}
  .quiz-area{padding:16px 14px}
}
</style>

<script>
/* ═══════════════════════════════════════════════
   MCQ DATA — GERUNDS + PREPOSTIONS
═══════════════════════════════════════════════ */
const questions = [
  {q:"She is looking forward ___ joining the new hospital as a senior consultant.", o:["for","to","at","about"], c:1, exp:"\"Look forward to\" is a fixed phrasal verb where \"to\" is a preposition, not an infinitive marker. This means it must always be followed by a noun or gerund (joining), never a base verb. This is one of the most tested gerund traps in MDCAT — students wrongly write \"look forward to join.\""},
{q:"He succeeded ___ completing the entire syllabus two weeks before the examination.", o:["at","in","for","with"], c:1, exp:"\"Succeed in\" + gerund is the fixed verb-preposition collocation. \"In\" is always the preposition after \"succeed\" when followed by an action. Never use \"succeed to\" + gerund — \"succeed to\" means to inherit a position (he succeeded to the throne), which is a completely different meaning."},
{q:"The patient insisted ___ leaving the hospital before the doctor had officially discharged him.", o:["on","for","about","in"], c:0, exp:"\"Insist on\" + gerund is a fixed verb-preposition collocation. \"On\" is always the required preposition — it cannot be replaced by \"for,\" \"about,\" or \"in.\" The pattern is: insist + on + gerund. Never say \"insisted to leave\" — \"insist\" does not take an infinitive directly."},
{q:"She is very fond ___ reading medical journals during her free time at the hospital.", o:["for","about","of","at"], c:2, exp:"\"Fond of\" + gerund is a fixed adjective-preposition collocation. \"Of\" is always the required preposition after \"fond\" — no other preposition is acceptable. This pattern (adjective + of + gerund) is one of the most productive structures in English: tired of, capable of, guilty of, fond of."},
{q:"He was accused ___ stealing research data from his senior colleague's computer.", o:["for","about","with","of"], c:3, exp:"\"Accused of\" + gerund is a fixed legal and general-use verb-preposition collocation. \"Of\" is always the required preposition. The full pattern is: be accused + of + gerund. \"Accused for\" is a very common MDCAT error — \"for\" never follows \"accused.\""},
{q:"The doctor warned the patient ___ eating processed food after the surgery.", o:["from","of","against","about"], c:2, exp:"\"Warn against\" + gerund means to advise someone not to do something because it is dangerous or harmful. \"Warn about\" is used when simply informing someone of a danger (a noun), not an action. \"Warn against + gerund\" is the correct structure when the warning concerns an action to be avoided."},
{q:"She was prevented ___ attending the conference due to her sudden illness.", o:["to","for","from","about"], c:2, exp:"\"Prevent from\" + gerund is the fixed verb-preposition collocation. \"From\" is always the required preposition — it cannot be replaced. The full pattern is: prevent + object + from + gerund. \"Prevented to attend\" is completely wrong — \"prevent\" never takes an infinitive directly."},
{q:"He is not accustomed ___ working under such extreme pressure for long hours.", o:["for","with","about","to"], c:3, exp:"\"Accustomed to\" + gerund is a fixed adjective-preposition collocation. \"To\" here is a preposition, not an infinitive marker, so it must be followed by a gerund (working), not a base verb. \"Accustomed to work\" is wrong. Compare: \"used to working\" (habit now) vs \"used to work\" (habit in the past) — very different structures."},
{q:"The students were excited ___ visiting the new research laboratory for the first time.", o:["at","about","for","with"], c:1, exp:"\"Excited about\" + gerund is the fixed adjective-preposition collocation for expressing enthusiasm toward an upcoming action. \"Excited at\" is used for a sudden, immediate reaction to an event (excited at the news). When followed by a gerund expressing a future activity, \"about\" is the correct preposition."},
{q:"She apologised ___ arriving late to the ward round without informing anyone.", o:["about","for","of","to"], c:1, exp:"\"Apologise for\" + gerund is the fixed verb-preposition collocation. \"For\" introduces the reason or action being apologised for. \"Apologise to\" someone is used when the preposition introduces the person being apologised to, not the action. These two patterns must not be confused."},
{q:"He gave up ___ trying to convince the committee and submitted a written complaint instead.", o:["at","on","—","for"], c:2, exp:"\"Give up\" + gerund is a two-word phrasal verb that takes a gerund directly, with no preposition between them. \"Give up trying\" — no preposition is inserted. Students often wrongly insert \"on\" or \"at.\" The structure is: give up + gerund (no preposition)."},
{q:"The team was capable ___ solving the problem but lacked the necessary resources.", o:["for","at","of","in"], c:2, exp:"\"Capable of\" + gerund is a fixed adjective-preposition collocation. \"Of\" is always the required preposition — \"capable at\" and \"capable for\" are both wrong. The same preposition applies to the antonym: \"incapable of\" + gerund. This is one of the highest-frequency collocation patterns in MDCAT."},
{q:"She is used ___ dealing with difficult patients after fifteen years of clinical practice.", o:["for","with","in","to"], c:3, exp:"\"Used to\" + gerund describes a current habit or something that no longer feels strange — the person has adapted. \"To\" is a preposition here, not part of an infinitive, so it must be followed by a gerund. Compare: \"used to work\" (past habit, no longer true) vs \"used to working\" (adapted, still true now)."},
{q:"He was found guilty ___ negligence and was suspended ___ practising medicine for a year.", o:["of, from","for, of","about, for","with, from"], c:0, exp:"\"Guilty of\" + gerund/noun is the fixed adjective-preposition collocation. \"Suspended from\" + gerund means temporarily banned from an activity — \"from\" is the fixed preposition. Both collocations are fixed and commonly appear together in legal contexts tested in MDCAT."},
{q:"She is thinking ___ switching her specialisation from surgery to psychiatry.", o:["about","of","on","both A and B"], c:3, exp:"\"Think about\" + gerund and \"think of\" + gerund are both grammatically correct and mean the same thing — to consider doing something. Both \"of\" and \"about\" are accepted after \"think\" when followed by a gerund. MDCAT sometimes tests this with a \"both A and B\" option to check depth of knowledge."},
{q:"The laboratory technician was tired ___ repeating the same tests without getting clear results.", o:["from","with","of","about"], c:2, exp:"\"Tired of\" + gerund is a fixed adjective-preposition collocation meaning fed up with or no longer willing to tolerate something. \"Of\" is always the required preposition — \"tired from\" exists but means physically exhausted from an activity, not fed up. These two meanings and prepositions must be distinguished."},
{q:"He is committed ___ improving patient care standards throughout the hospital.", o:["for","about","with","to"], c:3, exp:"\"Committed to\" + gerund is a fixed adjective-preposition collocation meaning dedicated to doing something. \"To\" is a preposition here, so it must be followed by a gerund. \"Committed to improving\" — never \"committed to improve.\" This is the same structure as \"dedicated to,\" \"devoted to,\" and \"opposed to.\""},
{q:"She objected ___ being assigned the night shift without being consulted first.", o:["at","for","to","about"], c:2, exp:"\"Object to\" + gerund is a fixed verb-preposition collocation meaning to express strong disagreement with something. \"To\" is a preposition here, not an infinitive marker, so it must be followed by a gerund. \"Objected to being assigned\" — never \"objected to be assigned.\" Compare with \"opposed to\" — same structure."},
{q:"The senior consultant talked the junior doctor ___ resigning after the incident.", o:["from","about","out of","against"], c:2, exp:"\"Talk someone out of\" + gerund is a fixed three-word phrasal verb meaning to persuade someone not to do something. \"Out of\" is a two-word preposition here and cannot be split or replaced. Compare: \"talk someone into\" + gerund = to persuade someone to do something. These are opposite in meaning."},
{q:"He is interested ___ pursuing a fellowship in cardiology after completing his residency.", o:["about","for","at","in"], c:3, exp:"\"Interested in\" + gerund is a fixed adjective-preposition collocation. \"In\" is always the required preposition — \"interested about\" is a very common MDCAT error and is always wrong. The full pattern is: interested + in + gerund (pursuing)."},
{q:"The medical board disapproved ___ the doctor prescribing experimental drugs without consent.", o:["of","about","for","at"], c:0, exp:"\"Disapprove of\" + gerund is a fixed verb-preposition collocation meaning to have a negative opinion of an action or behaviour. \"Of\" is always the required preposition — \"disapprove about\" is wrong. The pattern is consistent with its antonym: \"approve of\" + gerund also uses \"of.\""},
{q:"She was on the verge ___ giving up when she finally received her acceptance letter.", o:["of","at","for","to"], c:0, exp:"\"On the verge of\" + gerund is a fixed prepositional phrase meaning very close to doing something or about to experience something. \"Of\" is the required preposition completing \"verge.\" The full pattern: on the verge + of + gerund. \"On the verge to give up\" is completely wrong."},
{q:"He refrained ___ commenting on the case until the investigation was complete.", o:["from","against","about","of"], c:0, exp:"\"Refrain from\" + gerund is a fixed verb-preposition collocation meaning to stop yourself from doing something, usually as a conscious decision. \"From\" is always the required preposition — this is a very formal verb used in professional and legal contexts. \"Refrain from commenting\" — never \"refrain to comment.\""},
{q:"The professor congratulated the students ___ completing the research project ahead of schedule.", o:["for","on","about","at"], c:1, exp:"\"Congratulate on\" + gerund is the fixed verb-preposition collocation. \"On\" introduces the achievement or action being celebrated. Never say \"congratulate for\" — \"for\" after \"congratulate\" is a very common error. The full pattern: congratulate + object + on + gerund."},
{q:"She was nervous ___ presenting her thesis in front of the entire faculty panel.", o:["of","at","about","for"], c:2, exp:"\"Nervous about\" + gerund is the fixed adjective-preposition collocation when the cause of nervousness is an upcoming action. \"Nervous of\" is used when afraid of a thing or person (nervous of dogs, nervous of heights). When followed by a gerund representing a future event, \"about\" is correct."},
{q:"He had no intention ___ apologising for the mistake he had clearly made.", o:["to","for","of","about"], c:2, exp:"\"Have no intention of\" + gerund is a fixed noun-preposition collocation. \"Of\" is always the required preposition — \"intention to\" is also possible but only before an infinitive, not a gerund. \"No intention of apologising\" (gerund) vs \"no intention to apologise\" (infinitive) — both are grammatically possible but \"of + gerund\" is more fixed and formal."},
{q:"The new policy resulted ___ reducing the number of working hours for junior doctors.", o:["at","to","about","in"], c:3, exp:"\"Result in\" + gerund is the fixed verb-preposition collocation meaning to cause a particular outcome. \"In\" is always the required preposition — \"result to\" and \"result at\" are both wrong. Compare: \"result from\" + gerund/noun means to be caused by something — the direction is reversed."},
{q:"She is responsible ___ training all new staff members who join the department.", o:["for","of","about","at"], c:0, exp:"\"Responsible for\" + gerund is a fixed adjective-preposition collocation meaning accountable for or in charge of an action. \"For\" is always the required preposition. This is one of the highest-frequency collocations in formal English and appears regularly in MDCAT."},
{q:"He was not satisfied ___ performing at an average level and always pushed himself further.", o:["at","about","with","of"], c:2, exp:"\"Satisfied with\" + gerund/noun is the fixed adjective-preposition collocation. \"With\" is always the required preposition — \"satisfied about\" and \"satisfied at\" are both wrong. Compare: \"dissatisfied with\" follows the exact same pattern. This is a fixed collocation with no variation."},
{q:"The committee decided ___ postponing the conference until further notice.", o:["about","on","for","to"], c:1, exp:"\"Decide on\" + gerund means to make a final choice about a course of action. \"Decide to\" + infinitive is also possible, but \"decide on\" must be followed by a gerund or noun. These are two different structures: \"decided on postponing\" (gerund after preposition) vs \"decided to postpone\" (infinitive after verb)."},
{q:"She was praised ___ handling the emergency situation with exceptional calmness.", o:["about","at","for","of"], c:2, exp:"\"Praised for\" + gerund is a fixed verb-preposition collocation. \"For\" introduces the reason or action that earned the praise. This is the same preposition pattern as: rewarded for, punished for, blamed for, criticised for, recognised for — all take \"for\" + gerund."},
{q:"He kept ___ making the same error despite being corrected multiple times.", o:["at","with","on","—"], c:2, exp:"\"Keep on\" + gerund means to continue doing something repeatedly, often with a sense of persistence or annoyance. \"Keep on making\" — \"on\" is the required particle. \"Keep\" alone + gerund (keep making) also exists but means simply to continue. \"Keep on\" adds emphasis on the repeated, ongoing nature of the action."},
{q:"The patient was afraid ___ undergoing the operation despite the doctor's reassurances.", o:["of","about","for","at"], c:0, exp:"\"Afraid of\" + gerund is the fixed adjective-preposition collocation when expressing fear of an action or thing. \"Afraid of\" is used for a specific fear. \"Afraid about\" is used for general worry about a situation. When the following word is a gerund representing a feared activity, \"of\" is always correct."},
{q:"She dedicated her entire career ___ improving the quality of healthcare in rural areas.", o:["for","about","at","to"], c:3, exp:"\"Dedicated to\" + gerund is a fixed adjective-preposition collocation. \"To\" is a preposition here, not an infinitive marker, so it must be followed by a gerund. This structure is identical to \"committed to,\" \"devoted to,\" and \"opposed to\" — all take \"to\" + gerund, not \"to\" + base verb."},
{q:"He was on the point ___ fainting when the nurse brought him a glass of water.", o:["of","at","to","for"], c:0, exp:"\"On the point of\" + gerund is a fixed prepositional phrase meaning about to do something or at the moment just before something happens. \"Of\" is the required preposition completing the phrase. This is identical in structure to \"on the verge of\" + gerund and \"on the brink of\" + gerund."},
{q:"The students were prohibited ___ using their mobile phones during the examination.", o:["about","for","from","against"], c:2, exp:"\"Prohibited from\" + gerund is the fixed verb-preposition collocation used in formal and legal language meaning officially forbidden from doing something. \"From\" is always the required preposition — \"prohibited against\" is wrong. This follows the same pattern as \"banned from,\" \"barred from,\" and \"excluded from\" + gerund."},
{q:"She took great pleasure ___ teaching her students and watching them grow professionally.", o:["at","in","from","about"], c:1, exp:"\"Take pleasure in\" + gerund is a fixed verb-preposition collocation meaning to enjoy or get satisfaction from an activity. \"In\" is always the required preposition — \"take pleasure at\" and \"take pleasure from\" are both wrong. This is identical in structure to \"take pride in\" + gerund and \"find pleasure in\" + gerund."},
{q:"He was not used ___ being treated as a subordinate after years in a leadership role.", o:["with","for","about","to"], c:3, exp:"\"Used to\" + gerund describes an adapted state — something that no longer feels strange or uncomfortable. \"To\" is a preposition here, followed by a gerund. This is distinct from the structure \"used to + base verb\" (past habit). \"Not used to being treated\" — the gerund following \"to\" is in the passive form here."},
{q:"The administration blamed the junior staff ___ mishandling the confidential patient records.", o:["about","at","of","for"], c:3, exp:"\"Blame someone for\" + gerund is the fixed verb-preposition collocation. \"For\" introduces the action being blamed. Common MDCAT trap: \"blame\" can also appear as \"blame something on someone\" — a different structure. \"Blame for\" + gerund and \"blame on\" + noun are both fixed but structurally different."},
{q:"Despite her busy schedule, she never missed ___ attending the weekly department meeting.", o:["on","out on","—","from"], c:2, exp:"\"Miss\" + gerund takes no preposition directly. \"Miss attending\" — no preposition is inserted between \"miss\" and the gerund. \"Miss out on\" is a different phrasal verb meaning to lose an opportunity. When \"miss\" means to fail to do something or to be absent from something, it takes a gerund directly."},
{q:"He was enthusiastic ___ learning new surgical techniques from the visiting specialist.", o:["for","about","at","of"], c:1, exp:"\"Enthusiastic about\" + gerund is the fixed adjective-preposition collocation. \"About\" is always the required preposition — \"enthusiastic for\" is a very common error. The pattern: enthusiastic + about + gerund. Synonymous adjectives follow the same pattern: passionate about, excited about, serious about + gerund."},
{q:"She had difficulty ___ explaining the diagnosis to the patient's elderly parents.", o:["at","with","in","for"], c:2, exp:"\"Have difficulty in\" + gerund is the fixed noun-preposition collocation. \"In\" is the required preposition, though in informal usage it is sometimes omitted (have difficulty explaining). In formal written English and MDCAT, \"in\" must be included. Same pattern: \"have trouble in,\" \"have problems in,\" \"have no hesitation in\" + gerund."},
{q:"The senior doctor was renowned ___ diagnosing rare tropical diseases with remarkable accuracy.", o:["at","for","about","of"], c:1, exp:"\"Renowned for\" + gerund is the fixed adjective-preposition collocation. \"For\" is always the required preposition — this follows the same pattern as \"famous for,\" \"known for,\" \"celebrated for,\" \"respected for,\" and \"criticised for\" + gerund. All achievement-related adjectives take \"for.\""},
{q:"He admitted ___ making several errors in the patient's treatment plan during the review.", o:["on","about","to","of"], c:2, exp:"\"Admit to\" + gerund is the fixed verb-preposition collocation in formal usage meaning to acknowledge doing something wrong. \"Admit to making errors\" — \"to\" is a preposition here, followed by a gerund. In informal speech, \"admit\" + gerund (no preposition) is also used, but \"admit to\" + gerund is the formal, standard form."},
{q:"She was in favour ___ extending the working hours to reduce the patient waiting time.", o:["about","of","for","with"], c:1, exp:"\"In favour of\" + gerund is a fixed prepositional phrase meaning supporting or agreeing with an action. \"Of\" is always the required preposition completing \"in favour.\" The full pattern: in favour + of + gerund. This is identical in structure to \"in the habit of,\" \"in the process of,\" \"in danger of\" + gerund."},
{q:"He persisted ___ requesting a second opinion despite the initial diagnosis being confirmed.", o:["at","about","in","on"], c:2, exp:"\"Persist in\" + gerund is a fixed verb-preposition collocation meaning to continue doing something with determination even when others disagree. \"In\" is always the required preposition — \"persist on\" is a common error. Compare: \"insist on\" + gerund (different verb, different preposition, same gerund requirement)."},
{q:"The hospital is in the process ___ updating all its patient record systems to digital format.", o:["for","at","of","to"], c:2, exp:"\"In the process of\" + gerund is a fixed prepositional phrase meaning currently in the middle of doing something. \"Of\" is always the required preposition completing the phrase. The full pattern: in the process + of + gerund. This phrase emphasises that an activity is ongoing and not yet complete."},
{q:"She was deeply opposed ___ introducing experimental treatments without proper clinical trials.", o:["about","against","for","to"], c:3, exp:"\"Opposed to\" + gerund is a fixed adjective-preposition collocation meaning strongly against an action or policy. \"To\" is a preposition here, not an infinitive marker, so it must be followed by a gerund. This is the same structure as \"committed to,\" \"dedicated to,\" \"accustomed to,\" and \"used to\" + gerund."},
{q:"After years of practice, he was on the brink ___ achieving a major breakthrough in his research.", o:["for","at","to","of"], c:3, exp:"\"On the brink of\" + gerund is a fixed prepositional phrase meaning very close to a significant moment or event, usually dramatic. \"Of\" is always the required preposition. This is structurally identical to \"on the verge of\" and \"on the point of\" + gerund — all three mean the same thing and all three use \"of.\""},
{q:"She is very particular ___ following proper sterilisation procedures in the operating theatre.", o:["in","with","about","for"], c:2, exp:"\"Particular about\" + gerund is a fixed adjective-preposition collocation meaning very careful and precise about a specific thing. \"About\" is always the required preposition — \"particular in\" and \"particular with\" are both wrong. This tests knowledge of the adjective-preposition-gerund three-part structure."},
{q:"He regretted ___ not informing his supervisor before making such a significant clinical decision.", o:["about","on","for","—"], c:3, exp:"\"Regret\" + gerund takes no preposition. \"Regret not informing\" — no preposition is inserted between \"regret\" and the gerund. This is a direct verb + gerund structure. Students often wrongly insert \"about\" or \"for.\" Compare: \"regret to inform\" (infinitive, formal polite usage) vs \"regret informing/not informing\" (gerund, refers to past action)."},
{q:"The new intern was not capable ___ performing the procedure without supervision at this stage.", o:["at","for","of","in"], c:2, exp:"\"Capable of\" + gerund is a fixed adjective-preposition collocation. \"Of\" is always the required preposition. This is one of the most tested collocations in MDCAT. The full pattern: capable + of + gerund. The negative form \"incapable of\" follows exactly the same structure — both always use \"of.\""},
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise and Try Again!';     emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Gerunds + Prepositions &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();

/* ═══════════════════════════════════════════════
   COUNTDOWN TIMER — 50 minutes
═══════════════════════════════════════════════ */
(function startTimer(){
  const DURATION = 50 * 60;
  const WARN_AT  = 5  * 60;
  let remaining  = DURATION;

  const box     = document.getElementById('timerBox');
  const display = document.getElementById('timerDisplay');

  function tick(){
    if(remaining <= 0){
      display.textContent = '⏰ TIME UP';
      box.classList.add('danger');
      clearInterval(timerInterval);
      showResult();
      return;
    }

    const mm = String(Math.floor(remaining / 60)).padStart(2,'0');
    const ss = String(remaining % 60).padStart(2,'0');
    display.textContent = mm + ':' + ss;

    if(remaining <= WARN_AT){
      box.classList.add('danger');
    }

    remaining--;
  }

  tick();
  const timerInterval = setInterval(tick, 1000);
})();
</script>
