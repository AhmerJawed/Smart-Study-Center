/* ═══════════════════════════════════════════════
   MCQ DATA — Chapter 1: Biological Molecules

const questions = [
  {q:"The branch of biology that explains the biochemical basis of life is called:", o:["Biochemistry","Microbiology","Molecular biology","Cell biology"], c:0, exp:"Biochemistry specifically studies all processes carried out in living organisms, from body structure construction to information flow via DNA."},
  {q:"The living matter of a cell called protoplasm contains what percentage of water?", o:["50% to 70%","60% to 80%","70% to 90%","80% to 95%"], c:2, exp:"When this water is evaporated, the remaining mass is called the Dry Weight of the cell, which consists of carbon-containing long-chain biomolecules."},
  {q:"The elements primarily involved in the synthesis of biomolecules are:", o:["Carbon, hydrogen, oxygen, nitrogen, and phosphorus only","Carbon, hydrogen, oxygen, nitrogen, phosphorus, and sulfur","Carbon, hydrogen, oxygen, and nitrogen only","Carbon, hydrogen, oxygen, sulfur, and calcium"], c:1, exp:"These six elements — C, H, O, N, P, S — are the foundation of all biomolecule synthesis and together form approximately 98% of biomolecules."},
  {q:"The process of joining two monomers by removing a water molecule is called:", o:["Hydrolysis","Oxidation","Polymerization","Condensation or dehydration synthesis"], c:3, exp:"In condensation, -OH from one monomer and +H from another are removed to form a new covalent bond; this always requires proper enzymes and energy."},
  {q:"The process where a macromolecule is broken down into its subunits by addition of a water molecule is called:", o:["Hydrolysis","Condensation","Dehydration synthesis","Oxidation"], c:0, exp:"During hydrolysis, water breaks into H⁺ and OH⁻ ions with enzymatic help, and the released energy becomes available for other metabolic processes."},
  {q:"According to IUPAC, carbohydrates are defined as:", o:["Monohydroxy carbonyl compounds","Dihydroxy carbonyl compounds","Polyhydroxy carbonyl compounds","Trihydroxy carbonyl compounds"], c:2, exp:"Carbohydrates contain C, H, and O where H and O are in the ratio 2:1 as in water, with carbonyl groups that are either aldehydes or ketones."},
  {q:"The general formula of carbohydrate molecules is:", o:["CnH2nOn-1","CnH2nOn","CnHnOn","CnH2n+1On"], c:1, exp:"The literal meaning of carbohydrate is 'hydrated carbon,' and this formula reflects the 2:1 ratio of hydrogen to oxygen present in all carbohydrates."},
  {q:"The group of carbohydrate molecules that cannot be hydrolyzed further is called:", o:["Polysaccharides","Oligosaccharides","Disaccharides","Monosaccharides"], c:3, exp:"Monosaccharides are the simplest carbohydrates, found as white crystalline solids with sweet taste, classified further by the number of carbon atoms."},
  {q:"Pentose sugars form the basic skeleton of:", o:["Cell walls in plants","Storage polysaccharides","Nucleic acids","Structural proteins"], c:2, exp:"Ribose (in RNA) and deoxyribose (in DNA) are both pentose sugars that form the sugar-phosphate backbone of nucleic acid polymers."},
  {q:"Glucose found in ripe fruit, sweet corn, and honey is an example of which type of monosaccharide?", o:["Hexose","Pentose","Tetrose","Triose"], c:0, exp:"Hexoses have the formula C₆H₁₂O₆ and are the most important sugars from a biological point of view; glucose is also found in all known polysaccharides in combined state."},
  {q:"The covalent bond formed between two monosaccharides in oligosaccharides is called:", o:["Peptide bond","Ester bond","Phosphodiester bond","Glycosidic bond"], c:3, exp:"A glycoside is a ring-shaped sugar molecule attached to another molecule; the ring may be either 5-membered or 6-membered."},
  {q:"Which of the following is an example of a reducing sugar?", o:["Sucrose","Maltose","Raffinose","Trehalose"], c:1, exp:"Reducing sugars like maltose and lactose possess free aldehyde or ketone groups that allow oxidation and reduction of other substances without hydrolysis."},
  {q:"Sucrose is a non-reducing sugar because it:", o:["Has no free aldehyde or ketone groups","Cannot dissolve in water","Contains only glucose units","Undergoes rapid hydrolysis"], c:0, exp:"In sucrose, glycosidic bonds are formed between the carbonyl groups of both glucose and fructose, leaving no free reducing group for oxidation."},
  {q:"Which component of starch is soluble in hot and cold water?", o:["Amylopectin","Glycogen","Amylose","Cellulose"], c:2, exp:"Amylose consists of glucose molecules joined in a straight chain (α1-4 glycosidic linkage), while amylopectin is a branched, insoluble component of starch."},
  {q:"Glycogen is commonly called animal starch because it gives what color reaction with iodine?", o:["Blue color","Purple color","Yellow color","Red color"], c:3, exp:"Unlike starch (which turns blue with iodine), glycogen gives a red color reaction, and it is abundantly found in liver and muscles."},
  {q:"Cellulose, the most abundant carbohydrate in nature, gives what color reaction with iodine?", o:["Blue color","No color","Red color","Purple color"], c:1, exp:"Cellulose is highly insoluble in water and is not digested in the human body; its glucose units are joined in straight chains that form spirally coiled tubes."},
  {q:"Chitin is a modified polysaccharide that contains nitrogen and is functionally comparable to:", o:["Collagen protein","Actin protein","Keratin protein","Myosin protein"], c:2, exp:"Chitin forms crystalline nanofibrils and, like keratin, provides structural strength — it forms the exoskeleton of insects and the cell walls of fungi."},
  {q:"The word 'Protein' is derived from the Greek word 'Proteios' meaning:", o:["First rank","Building block","Nitrogen-containing","Complex molecule"], c:0, exp:"Proteins are the most important organic compounds of the cell, constituting the major part of dry weight and carrying out virtually all cellular activities."},
  {q:"Amino acids contain at least one amino group (–NH₂) and one carboxylic acid group, both bonded to which carbon?", o:["Beta carbon","Alpha (asymmetric) carbon","Gamma carbon","Delta carbon"], c:1, exp:"This asymmetric alpha carbon gives amino acids their chiral nature; all 20 amino acids share the same basic formula differing only in their R (radical) group."},
  {q:"The covalent bond formed between the amino group of one amino acid and the carboxylic acid of another, releasing one water molecule, is called:", o:["Glycosidic bond","Ester bond","Hydrogen bond","Peptide bond"], c:3, exp:"This peptide linkage allows formation of di-, tri-, tetra-, and polypeptide chains, and can be broken by hydrolysis using hydrolytic enzymes."},
  {q:"How many basic amino acids constitute each type of protein found from viruses to human beings?", o:["20","22","18","25"], c:0, exp:"The human body has more than 10,000 proteins, all composed of unique and specific arrangements of these same 20 amino acids, determined by gene sequence."},
  {q:"In sickle cell anemia, which amino acid replaces glutamic acid at the 6th position in hemoglobin?", o:["Alanine","Glycine","Leucine","Valine"], c:3, exp:"This single substitution out of 574 amino acids causes hemoglobin to fail to carry sufficient O₂, demonstrating the critical importance of amino acid sequence."},
  {q:"Which type of proteins are insoluble in water, non-crystalline, elastic, and perform structural roles in cells?", o:["Globular proteins","Fibrous proteins","Conjugated proteins","Transport proteins"], c:1, exp:"Fibrous proteins like silk, spider web, myosin, and keratin consist of secondary protein spiral chains intertwined to form polypeptide chains in the form of fibrils."},
  {q:"Globular proteins that function as enzymes, antibodies, hormones, and hemoglobin are:", o:["Fibrous in shape","Insoluble in all solvents","Spherical or ellipsoidal in shape","Primarily structural proteins"], c:2, exp:"Globular proteins result from three-dimensional folding of secondary protein structure and are soluble in salt, acid, or base containing aqueous medium."},
  {q:"The term 'lipid' was proposed by Bloor in 1943 for biomolecules that are insoluble in water and soluble in:", o:["Organic solvents like ether and alcohol","Dilute inorganic acids","Distilled water only","Alkaline solutions"], c:0, exp:"Lipids contain much lesser oxygen ratio than carbohydrates, making stearin (a fat) with formula C₅₇H₁₁₀O₆ contain almost double the energy of carbohydrates."},
  {q:"Acylglycerols (fats and oils) can be defined as esters of glycerol and:", o:["Phosphate groups","Fatty acids","Amino acids","Monosaccharides"], c:1, exp:"When three fatty acids combine with glycerol at one -OH each, they form triglycerol (triglyceride) which is neutral since all three OH groups are bonded."},
  {q:"Saturated acylglycerols (fats) contain fatty acids that:", o:["Have one double bond between carbon atoms","Have two or more double bonds between carbon atoms","Are found in liquid state at room temperature","Do not contain any double bond between carbon atoms of the hydrocarbon chain"], c:3, exp:"The absence of double bonds makes saturated fats stable and solid at room temperature; stearin is a classic example of a saturated fatty acid."},
  {q:"A phospholipid differs from acylglycerol in that one fatty acid is replaced by a phosphate group attached to a nitrogenous compound called:", o:["Glycerol","Sterol","Choline","Isoprenoid"], c:2, exp:"Phospholipids have a hydrophobic tail (fatty acid end) and a hydrophilic head (phosphate-choline end), making them essential for cell membrane structure."},
  {q:"Waxes are esters of long-chain mono-alcohol and long-chain fatty acids. They are non-reactive due to their:", o:["Hydrophilic nature","Non-polar (hydrophobic) nature","Polar nature","Ionic nature"], c:1, exp:"Waxes are chemically inert, resistant to atmospheric oxidation, and act as superior machine lubricants; sperm whales were once their principle source."},
  {q:"Cholesterol is the precursor for the synthesis of which of the following steroid hormones?", o:["Testosterone, progesterone, and estrogens","Insulin and glucagon","Thyroxine and adrenaline","Growth hormone and prolactin"], c:0, exp:"Steroids contain 17 carbon atoms arranged in four attached rings (three hexagonal and one pentagonal), with different side chains distinguishing each type."},
  {q:"Nucleic acids are polymers of five-carbon sugar-based compounds called:", o:["Amino acids","Monosaccharides","Fatty acids","Nucleotides"], c:3, exp:"Nucleotides are the monomers of nucleic acids; a nucleotide without its phosphate group is called a nucleoside."},
  {q:"A phosphate group is attached at which carbon of the pentose sugar in a nucleotide?", o:["1st carbon","3rd carbon","5th carbon","2nd carbon"], c:2, exp:"The 3'-carbon of one pentose sugar is linked with the 5'-carbon of the next via a phosphodiester bond, forming the backbone of DNA and RNA strands."},
  {q:"Which of the following correctly identifies both purine bases found in nucleic acids?", o:["Adenine and Guanine","Cytosine and Thymine","Adenine and Cytosine","Guanine and Uracil"], c:0, exp:"Pyrimidines include three bases — Cytosine (C), Thymine (T), and Uracil (U) — while purines Adenine (A) and Guanine (G) have a double-ring structure."},
  {q:"The double helical structure of DNA was proposed by James Watson and Francis Crick in:", o:["1943","1953","1963","1948"], c:1, exp:"Watson and Crick built a model showing DNA as a double helix where each helix is made of 4 types of nucleotides and both helices are complementary."},
  {q:"In the double helix of DNA, Adenine pairs with Thymine while Cytosine is complementary to:", o:["Adenine","Thymine","Guanine","Uracil"], c:2, exp:"This complementary base pairing via hydrogen bonds (A-T have 2 bonds; G-C have 3 bonds) is the basis for DNA replication and transcription."},
  {q:"In the double helix of DNA, the distance between the two helices remains constant at:", o:["10 Å","30 Å","5 Å","20 Å"], c:3, exp:"Each turn of the duplex consists of 10 base pairs, and the two helices run antiparallel — one from 5' to 3' and the other from 3' to 5'."},
  {q:"During conversion of ATP into ADP, how much energy is released per mole?", o:["7.3 Kcal/mole","5.3 Kcal/mole","10.3 Kcal/mole","3.7 Kcal/mole"], c:0, exp:"ATP works as an energy storing, carrying, and providing molecule; this energy drives synthesis of proteins, lipids, carbohydrates, and active transport."},
  {q:"Which type of RNA is the smallest in size, consisting of only 70 to 90 nucleotides?", o:["mRNA","tRNA","rRNA","hnRNA"], c:1, exp:"tRNA is single-stranded but shows duplex regions at some areas; it has anticodons and transfers specific amino acids from cytosol to the ribosome."},
  {q:"Ribosomal RNA (rRNA) constitutes what percentage of total RNA in a cell?", o:["3–4%","10–20%","30–40%","80%"], c:3, exp:"rRNA has the largest size among all three RNA types and is involved in peptide linkages during protein synthesis at the ribosome."},
  {q:"Conjugated molecules are formed when biomolecules of two different groups:", o:["Undergo hydrolysis into subunits","Form hydrogen bonds with water","Combine chemically with each other acting as one unit","Are linked by phosphodiester bonds"], c:2, exp:"Examples include glycolipids, glycoproteins, lipoproteins, and nucleoproteins — each formed by chemical combination of two different biomolecule classes."},
  {q:"Glycolipids (cerebrosides) are found in the white matter of the brain and myelin sheath. They are conjugates of:", o:["Lipids and carbohydrates","Lipids and proteins","Proteins and nucleic acids","Carbohydrates and nucleic acids"], c:0, exp:"Glycolipids are also found in the inner membrane of chloroplasts and are important for neural insulation and signal transmission."},
  {q:"The intermolecular force of attraction between two water molecules due to partially charged H⁺ and O⁻ is called:", o:["Covalent bond","Ionic bond","Hydrogen bond","Van der Waals force"], c:2, exp:"This hydrogen bonding gives water its unique properties including high polarity, high specific heat, high heat of vaporization, cohesion, and adhesion."},
  {q:"The attractive force between similar molecules that allows water to flow as protoplasm in cells and as blood in blood vessels is called:", o:["Adhesion","Hydrophobic exclusion","Ionization","Cohesion"], c:3, exp:"Cohesion and adhesion together create tension within xylem that helps move water upward against gravity in plant conducting tissues."},
  {q:"The high specific heat of water, which protects protoplasm against sudden thermal changes, is due to its:", o:["Low molecular weight and density","Polar nature and hydrogen bonding between molecules","Amphoteric ionization property","Anomalous expansion below 4°C"], c:1, exp:"High specific heat means water requires a large amount of heat to change temperature, making it an effective temperature stabilizer for organisms."},
  {q:"Water's high heat of vaporization of 574 kcal/kg plays an important role in:", o:["Thermoregulation and providing cooling effect during transpiration and perspiration","Maintaining pH for enzymatic activities in cells","Transporting nutrients through xylem vessels","Forming hydrogen bonds between biomolecules"], c:0, exp:"Greater heat of vaporization means higher stability in state; this property gives water stability as a liquid and aids in organismal temperature regulation."},
  {q:"Due to its ionization property, water can ionize into H⁺ and OH⁻ and behave as both acid and base — this property is described as:", o:["Hydrophobic","Amphoteric","Cohesive","Adhesive"], c:1, exp:"Water also behaves as a buffer due to this amphoteric nature, maintaining pH for enzymatic activities in cells and organs."},
  {q:"Water expands and its density decreases below 4°C, making life possible under frozen water, due to:", o:["High specific heat capacity","High heat of vaporization","Stable hydrogen bond formation in ice condition","Hydrophobic exclusion of nonpolar molecules"], c:2, exp:"Below 4°C, hydrogen bonds in water become stable (unlike liquid water where they break and reform), causing maximum expansion at 0°C in ice."},
  {q:"NAD (Nicotinamide Adenosine Dinucleotide), which works as a coenzyme for redox reactions, is classified as a:", o:["Mononucleotide","Polynucleotide","Trinucleotide","Dinucleotide"], c:3, exp:"NAD carries 2 electrons (e⁻), 2 H⁺ (protons), and energy; examples include NADH₂ and FADH₂ used in cellular respiration."},
  {q:"Which of the following correctly distinguishes the primary functions of DNA and RNA?", o:["DNA is hereditary material while RNA helps in protein synthesis","RNA is hereditary material while DNA helps in protein synthesis","Both DNA and RNA store hereditary information equally","DNA is involved in translation while RNA is involved in transcription"], c:0, exp:"Genetic information flows from DNA → mRNA → protein (via transcription and translation), with DNA serving as the permanent storage molecule."},
  {q:"Large, highly organized molecules made up of large numbers of low molecular weight small molecules (monomers) are called:", o:["Monomers","Biomolecules","Macromolecules (polymers)","Oligomers"], c:2, exp:"The word 'polymer' means poly = many, mers = parts; all major biomolecules including carbohydrates, proteins, lipids, and nucleic acids are macromolecules."},
  {q:"Terpenoids are a large class of lipids made up of isoprenoid units with the formula:", o:["C₄H₈","C₅H₈","C₆H₁₀","C₃H₆"], c:1, exp:"Terpenes, steroids, carotenoids, and prostaglandins are all types of terpenoids; terpenes are volatile and produce special fragrances used in perfumes."},
  {q:"Lipoproteins help in the transportation of lipids in blood plasma and also occur as components of membranes of:", o:["Cell wall and cytoplasm","Ribosome and lysosome only","Vacuole and peroxisome","Mitochondria, endoplasmic reticulum, nucleus, egg yolk, and chloroplast membrane"], c:3, exp:"Lipoproteins are conjugates of lipids and proteins that play structural roles in membrane systems throughout the cell, not just in blood transport."},
  {q:"Prostaglandins are lipids made by mammalian tissues at sites of damage or infection. They are involved in controlling:", o:["Inflammation, blood flow, intensity of pain, and induction of labour","Blood glucose levels and insulin secretion","Protein synthesis and gene expression","Cell division and DNA replication"], c:0, exp:"Aspirin reduces fever and pain by inhibiting prostaglandin synthesis, confirming their direct role in pain and inflammatory responses."},
  {q:"F. Sanger was the first scientist to determine the sequence of amino acids in a protein. He found that insulin is composed of how many total amino acids in two chains?", o:["40 amino acids","45 amino acids","51 amino acids","60 amino acids"], c:2, exp:"Insulin has one chain of 21 amino acids and another of 30 amino acids, held together by disulfide bonds — the first protein to have its sequence determined."},

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = { total: questions.length, answered: 0, correct: 0 };

/* ═══════════════════════════════════════════════
   SHUFFLE OPTIONS
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o: opts.map(x => x.text),
    c: opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">🧬 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q  = renderedQuestions[qi];
  const ok = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.1 Biological Molecules &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
// ── STICKY TIMER ──
let timeLeft = 65 * 60;
const timerDisplay = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');

const timerInterval = setInterval(() => {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerDisplay.textContent =
    String(mins).padStart(2,'0') + ':' +
    String(secs).padStart(2,'0');
  if(timeLeft <= 300){
    timerBox.classList.add('danger');
  }
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    timerDisplay.textContent = '⏰ TIME UP';
    showResult();
  }
  timeLeft--;
}, 1000);
</script>
