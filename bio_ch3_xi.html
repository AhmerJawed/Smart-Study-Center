const questions = [
  {q:"Cell fractionation is a combination of which two main steps?", o:["Filtration and staining","Homogenization and sedimentation","Chromatography and electrophoresis","Microscopy and micrometry"], c:1, exp:"Cell fractionation isolates cellular components by first homogenizing cells and then separating organelles via sedimentation (centrifugation based on size and density)."},
{q:"Which enzyme is specifically used during homogenization of plant cells to separate them by digesting the middle lamella?", o:["Lipase","Amylase","Pectinase","Protease"], c:2, exp:"Pectinase digests the middle lamella (composed of calcium and magnesium pectates), separating plant cells during homogenization."},
{q:"During differential centrifugation, the correct order of organelle sedimentation with increasing centrifugal force is:", o:["Ribosomes → Mitochondria → Nuclei → Microsomes","Mitochondria → Nuclei → Microsomes → Ribosomes","Nuclei → Mitochondria → Microsomes → Ribosomes","Microsomes → Nuclei → Ribosomes → Mitochondria"], c:2, exp:"Nuclei settle at 800g (10 min), mitochondria at 20,000g (15 min), microsomes at 100,000g (60 min), and ribosomes at 150,000g (3 hours)."},
{q:"The process of settling down cell organelles on the basis of density and mass using centrifugation is called:", o:["Homogenization","Chromatography","Electrophoresis","Sedimentation"], c:3, exp:"Sedimentation is the stepwise separation of organelles at progressively higher centrifuge speeds, with heavier/larger organelles separating first."},
{q:"Microdissection is a biological technique primarily used to:", o:["Separate charged molecules based on size","Measure dimensions of cells under microscope","Isolate specific cells with the help of a microscope","Separate different components of a mixture"], c:2, exp:"Microdissection isolates specific cells using a microscope and is used in research to study embryonic cell roles and effects of chemicals on cell development."},
{q:"Tissue culture was first started from plant cells because they are:", o:["Haploid and easily culturable","Diploid and multicellular","Totipotent — each cell can grow into a complete plant","Pluripotent — like stem cells"], c:2, exp:"Plant cells are totipotent, meaning each cell contains the complete genetic potential to develop into an entire organism."},
{q:"F.C. Steward grew a complete carrot plant from a tiny piece of phloem. Which substance in his medium contained plant hormones essential for cell division?", o:["Mineral salts","Coconut milk","Sugar solution","Vitamins"], c:1, exp:"In 1958, Steward grew carrot plants on a medium containing sugar, minerals, vitamins, and coconut milk — the coconut milk contained plant hormones that triggered cell division."},
{q:"In paper chromatography, the filter paper (cellulose sheet) serves as the:", o:["Mobile phase","Stationary phase","Ionic phase","Aqueous phase"], c:1, exp:"In paper chromatography, the cellulose sheet (filter paper) is the stationary phase while the solvent acts as the mobile phase, separating components by their rate of movement."},
{q:"Electrophoresis separates molecules primarily based on:", o:["Molecular weight and solubility","Size and electrical charge","Temperature and pH","Color and density"], c:1, exp:"Electrophoresis separates charged molecules (DNA, RNA, proteins) based on their size and electrical charge in an electrolytic cell under an electric current."},
{q:"In gel electrophoresis, negatively charged molecules migrate toward:", o:["The negative electrode (cathode)","The neutral zone of the gel","The positive electrode (anode)","They remain stationary"], c:2, exp:"Molecules with negative charge migrate toward the positive electrode (anode); smaller molecules move faster through gel pores, resulting in size-based separation."},
{q:"Spectrophotometry is used to determine all of the following EXCEPT:", o:["Growth rate of bacteria","Rate of photosynthesis","Minute quantity of DNA","Isolation of cell organelles"], c:3, exp:"Isolation of cell organelles is performed by differential centrifugation (cell fractionation), not spectrophotometry, which measures light absorption to identify and quantify substances."},
{q:"Resolution in microscopy is defined as:", o:["The degree to which an image is magnified","The darkness of the background relative to the specimen","The minimum distance at which two adjacent points can still be distinguished","The total magnification achieved by the eyepiece"], c:2, exp:"Resolution is the capacity to separate two adjacent points — the minimum distance at which two distinct points of a specimen can still be seen by the observer."},
{q:"The electron microscope achieves better resolution than the light microscope because:", o:["It uses visible light of a shorter wavelength","It uses electron beams which have a shorter wavelength than visible light","It uses higher magnification lenses","It uses UV radiation instead of light"], c:1, exp:"Electron beams have shorter wavelengths than visible light, enabling electron microscopes to resolve objects about 10,000 times better than the human eye."},
{q:"The ocular micrometer placed in the eyepiece of a microscope has:", o:["50 equal divisions with calibrated absolute values","200 equal divisions, each equal to 1 μm","100 equal divisions with no absolute value","Variable divisions depending on objective used"], c:2, exp:"The ocular micrometer is a glass disc with 100 equal divisions but no absolute value; it must be calibrated against a stage micrometer to measure actual specimen dimensions."},
{q:"One micrometer (micron) is equal to:", o:["0.01 mm","0.001 mm","0.0001 mm","0.00001 mm"], c:1, exp:"A micrometer (symbolized μm) equals 0.001 mm or approximately 0.000039 inches; it is the standard unit for measuring cell and organelle dimensions."},
{q:"The cell wall of fungi is composed of:", o:["Cellulose","Peptidoglycan","Chitin","Pectin"], c:2, exp:"Fungal cell walls are made of the modified polysaccharide chitin; bacterial walls are made of peptidoglycan, while plant and algal walls are made of cellulose."},
{q:"The middle lamella of the plant cell wall acts as a cementing layer and is primarily composed of:", o:["Cellulose and hemicellulose","Lignin and suberin","Chitin and pectin","Calcium and magnesium pectates"], c:3, exp:"The middle lamella is formed during cytokinesis and is mainly composed of calcium and magnesium pectates; it separates when the middle lamella dissolves during fruit ripening."},
{q:"Plasmodesmata in the primary cell wall allow:", o:["Selective ion transport via protein channels","Communication between neighboring cells","Deposition of secondary wall materials","Active transport of glucose"], c:1, exp:"Plasmodesmata are gaps in the primary cell wall where wall material is not deposited, allowing cellular content of neighboring cells to remain in communication."},
{q:"The secondary cell wall is deposited:", o:["Outside the middle lamella","Between the plasma membrane and primary cell wall","Outside the primary cell wall","Within the plasma membrane"], c:1, exp:"The secondary cell wall develops between the plasma membrane and primary cell wall; it is very thick and rigid due to deposition of lignin, inorganic salts, and waxes."},
{q:"The fluid mosaic model of the plasma membrane was proposed by:", o:["Watson and Crick in 1953","Davson and Danielli in 1935","Robert Brown in 1831","Singer and Nicolson in 1972"], c:3, exp:"In 1972, Singer and Nicolson proposed the fluid mosaic model, describing the plasma membrane as a fluid phospholipid bilayer with proteins arranged in a mosaic pattern."},
{q:"Approximately what percentage of plasma membrane is composed of lipids and proteins respectively?", o:["30% lipids : 70% proteins","50% lipids : 50% proteins","70% lipids : 30% proteins","80% lipids : 20% proteins"], c:1, exp:"Most plasma membranes consist of approximately 50% lipids and 50% protein by weight, with carbohydrates (as glycolipids and glycoproteins) constituting 5–10% of membrane mass."},
{q:"Integral (intrinsic) proteins of the plasma membrane function primarily as:", o:["Structural anchors for the cytoskeleton","Receptors for steroid hormones","Channels for water-soluble substances to pass between compartments","Enzymes for lipid synthesis"], c:2, exp:"Integral proteins are directly incorporated within the lipid bilayer and provide channels through which water-soluble substances like ions can pass between extracellular and intracellular compartments."},
{q:"In which animal cells is cholesterol virtually absent from the plasma membrane?", o:["Nerve cells","Muscle cells","Most plant cells","Red blood cells"], c:2, exp:"Cholesterol is found in animal cell plasma membranes (up to 50% of lipid molecules) but is absent in the cell membrane of most plant cells."},
{q:"Glycolipids on the outer surface of RBC plasma membrane are important because they:", o:["Regulate membrane permeability to water","Transport oxygen across the membrane","Facilitate phagocytosis of RBCs","Form AB antigens determining blood group type"], c:3, exp:"Specific glycolipids on the RBC plasma membrane determine blood group type A, B, AB, and O (absence of AB antigen), playing a crucial role in blood transfusion compatibility."},
{q:"Passive transport differs from active transport in that passive transport:", o:["Requires carrier proteins and ATP","Only moves water molecules","Moves molecules against the concentration gradient","Moves molecules along the concentration gradient without ATP"], c:3, exp:"Passive transport (diffusion and osmosis) moves molecules along their concentration gradient without energy expenditure (ATP); active transport moves molecules against the gradient using ATP."},
{q:"Phagocytosis is the intake of ____ material, while pinocytosis is the intake of ____:", o:["Fluid; solid material","Solid material; fluid or liquid","Gas; liquid","Protein; carbohydrate"], c:1, exp:"Both are forms of endocytosis (infolding of cell membrane); phagocytosis takes in solid material (e.g., bacteria), while pinocytosis takes in fluid or liquid."},
{q:"The active streaming movement of cytoplasm around the inner surface of a cell is called:", o:["Endocytosis","Exocytosis","Cyclosis","Phagocytosis"], c:2, exp:"Cyclosis is the active streaming of cytoplasm responsible for even distribution of cell contents, and it is considered the seat of all metabolic activities from gene expression to energy production."},
{q:"The term 'cytoplasm' was introduced by:", o:["Robert Brown","Camilo Golgi","Robert Hooke","Rudolf Von Kolliker"], c:3, exp:"Rudolf Von Kolliker introduced the term cytoplasm in 1863 to describe the material between the cell membrane and nuclear membrane of eukaryotic cells."},
{q:"Rough Endoplasmic Reticulum (RER) differs from Smooth ER (SER) in that RER:", o:["Synthesizes lipids and steroids","Is found in steroid-producing cells","Has ribosomes on its outer surface and synthesizes proteins","Lacks any membrane-bound structure"], c:2, exp:"RER is heavily coated with ribosomes on its cytoplasmic face, making it the primary site of protein synthesis; after synthesis, proteins are stored or exported through RER channels."},
{q:"The Smooth Endoplasmic Reticulum (SER) in fibrous skeletal muscle cells is specifically named:", o:["Golgi apparatus","Sarcoplasmic reticulum","Endosome","Cisternae"], c:1, exp:"Fibrous cells of skeletal muscles contain only smooth-type endoplasmic reticulum with the specialized name sarcoplasmic reticulum, primarily involved in calcium ion storage and release."},
{q:"The size of eukaryotic ribosomes is 80S, composed of:", o:["60S + 20S subunits","50S + 30S subunits","60S + 40S subunits","70S + 10S subunits"], c:2, exp:"Eukaryotic ribosomes are 80S, comprising a larger 60S subunit (dome-shaped) and a smaller 40S subunit (cap-shaped); both units are held together by magnesium ions."},
{q:"Ribosomes within the matrix of mitochondria and stroma of chloroplasts are:", o:["80S — same as cytoplasmic ribosomes","60S — same as the large subunit of eukaryotic ribosomes","70S — prokaryotic type","40S — same as the small subunit of eukaryotic ribosomes"], c:2, exp:"Mitochondrial and chloroplast ribosomes are 70S (prokaryotic type), which is considered strong evidence that eukaryotic cells evolved from prokaryotic ancestors."},
{q:"A group of ribosomes attached to a single mRNA molecule to synthesize identical protein molecules is called:", o:["Nucleosome","Spliceosome","Ribosomal complex","Polysome (polyribosome)"], c:3, exp:"During protein synthesis, several ribosomes attach to a single mRNA molecule forming a polysome, enabling simultaneous synthesis of multiple identical protein molecules."},
{q:"The Golgi complex was named after Italian physician Camilo Golgi who discovered it in:", o:["1858","1878","1898","1918"], c:2, exp:"Camilo Golgi discovered the Golgi complex in 1898; it is also known as Golgi apparatus, Golgi bodies, or Golgisome."},
{q:"The cis face of the Golgi apparatus is:", o:["Concave and faces toward the plasma membrane","Convex and faces toward the nucleus","Convex and faces toward the plasma membrane","Concave and faces away from ER"], c:1, exp:"The cis face (forming face) is convex and faces toward the nucleus; the trans face (maturing face) is concave and is the side where secretory vesicles bud off."},
{q:"Which organelles originate directly from the Golgi complex?", o:["Mitochondria and chloroplasts","Ribosomes and RER","Lysosomes, peroxisomes, and glyoxysomes","Vacuoles and nucleus"], c:2, exp:"Lysosomes, peroxisomes, and glyoxysomes all originate from the Golgi complex; this is a key MDCAT-level fact about Golgi function."},
{q:"The process called autolysis, in which a cell destroys itself by digesting its own macromolecules, is carried out by:", o:["Peroxisomes releasing H₂O₂","Mitochondria releasing cytochrome c","Lysosomes — which are called 'suicidal sacs'","Ribosomes releasing proteases"], c:2, exp:"During apoptosis, lysosome membranes rupture at a specific time, releasing hydrolytic enzymes that cause chemical breakdown (lysis) of the cell's own macromolecules — this is called autolysis."},
{q:"Tay-Sachs disease (mental retardation, blindness, death by age 3) is caused by:", o:["Mitochondrial DNA mutation","Deficiency of a lysosomal enzyme causing substrate accumulation","Excess peroxisomal activity","Defective ribosomal protein synthesis"], c:1, exp:"Tay-Sachs is a lysosomal storage disease caused by deficiency of a lysosomal enzyme; the substrate accumulates in cells and organs, leading to fatal metabolic imbalance in early childhood."},
{q:"Peroxisomes detoxify alcohol by first oxidizing it to form the toxic compound:", o:["Lactic acid","Pyruvate","H₂O₂ (hydrogen peroxide)","CO₂"], c:2, exp:"Peroxisomes oxidize alcohol, forming toxic H₂O₂ (hydrogen peroxide), which is immediately broken down into H₂O (water) by the enzyme catalase, completing detoxification."},
{q:"Within liver and kidney cells, peroxisomes detoxify approximately what fraction of alcohol a person drinks?", o:["One-quarter","One-third","Half","Two-thirds"], c:2, exp:"Liver and kidney peroxisomes fully detoxify about half of the alcohol a person drinks via peroxidase and catalase enzyme activity."},
{q:"Glyoxysomes contain enzymes that initiate conversion of fatty acids into sugars via a cyclic process called:", o:["Krebs cycle","Glyoxylate cycle","Calvin cycle","Glycolytic cycle"], c:1, exp:"Glyoxysomes in fat-storing plant tissues (seeds/endosperm) carry out the glyoxylate cycle, converting stored fatty acids into carbohydrates for use by germinating seedlings."},
{q:"The folds of the inner mitochondrial membrane that increase surface area for ATP synthesis are called:", o:["Grana","Thylakoids","Cisternae","Cristae"], c:3, exp:"The inner mitochondrial membrane forms irregular inward folds called cristae, which increase surface area for attachment of ATPase complexes, cytochrome, NAD, FAD, and other electron carriers."},
{q:"Mitochondria are passed from parent to offspring exclusively through the mother because:", o:["Mitochondria are only found in female cells","Father's DNA does not enter the egg","Mitochondria are present in the egg but not in the sperm part that enters the egg","Mother's mitochondria are genetically superior"], c:2, exp:"Mitochondria are present in eggs but not in the sperm portion that enters the egg; thus people can trace their mitochondria back to their mother, grandmother, and great-grandmother."},
{q:"Which of the following correctly describes mitochondria's semi-autonomous nature?", o:["They can divide independently of the cell and have their own 70S ribosomes and DNA","They produce their own lipids from the surrounding cytoplasm","They are surrounded by a single membrane","They depend entirely on nuclear DNA for protein synthesis"], c:0, exp:"Mitochondria have their own DNA, all kinds of RNA, and 70S ribosomes, enabling them to synthesize their own enzymes and divide independently of the cell's normal division."},
{q:"The outer membrane of mitochondria is smooth and permeable due to proteins called:", o:["Nucleoporins","Cristae","Porins","Tubulin"], c:2, exp:"The outer mitochondrial membrane is smooth and has pores made of proteins called porins, which are responsible for the transport of molecules across the outer membrane."},
{q:"Chromoplasts contain pigments such as xanthophyll and carotene, and are responsible for:", o:["Storing starch in underground organs","Carrying out photosynthesis","Color in flowers, fruits, and other colored parts (except green)","Converting light energy to chemical energy"], c:2, exp:"Chromoplasts contain pigments other than chlorophyll (e.g., xanthophyll, carotene) and are responsible for various color combinations in flowers and fruits; they also aid in pollination and seed dispersal."},
{q:"The colorless plastids that develop in the absence of light and are found in underground storage organs are called:", o:["Chloroplasts","Chromoplasts","Etioplasts","Leucoplasts"], c:3, exp:"Leucoplasts are colorless plastids storing food as carbohydrates (amyloplast), lipids (elaioplast), or proteins (proteioplast); they are found in underground parts and storage organs."},
{q:"The semi-fluid material enclosed by the inner membrane of the chloroplast, containing DNA, RNA, ribosomes, and enzymes for carbon fixation, is called:", o:["Cytosol","Matrix","Stroma","Grana"], c:2, exp:"Stroma is the semi-fluid material inside chloroplasts containing DNA, RNA, 70S ribosomes, ATP, NADP, and enzymes for the synthesis of sugars from CO₂ (Calvin cycle)."},
{q:"The individual hollow membranous sac within chloroplast grana is called a:", o:["Granum","Intergrana","Thylakoid","Cisternae"], c:2, exp:"Individual sacs are called thylakoids; stacks of thylakoids form grana; thylakoid membranes contain chlorophyll, xanthophylls, and carotene for capturing light energy during photosynthesis."},
{q:"Microfilaments are approximately 7nm in diameter and are primarily composed of:", o:["Tubulin protein","Vimentin protein","Actin protein (two intertwined chains)","Myosin protein only"], c:2, exp:"Microfilaments consist of two actin chains intertwined in a helical fashion; some also contain myosin, tropomyosin, and troponin, forming myofibrils in muscle cells for contraction."},
{q:"Microtubules are hollow tubes of approximately 25nm outer diameter, composed of protein subunits arranged in 13 columns. Each column is called a:", o:["Doublet","Vimentin fiber","Cristae unit","Proto-filament"], c:3, exp:"Microtubules are composed of thousands of tubulin sub-units usually arranged in 13 columns; each column is called a proto-filament."},

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  answered : 0,
  correct  : 0,
  total    : questions.length,
};

/* ═══════════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════════ */
function shuffleOptions(q) {
  const opts = q.o.map((text, i) => ({ text, isCorrect: i === q.c }));
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    o : opts.map(x => x.text),
    c : opts.findIndex(x => x.isCorrect),
  };
}

let renderedQuestions = [];

/* ═══════════════════════════════════════════════
   WATERMARK
═══════════════════════════════════════════════ */
(function buildWatermarks(){
  const overlay = document.getElementById('wmOverlay');
  const text = 'Sir Ahmer Javed  |  Smart Study Center  |  0345-3090057';
  for(let r = 0; r < 7; r++){
    for(let c = 0; c < 3; c++){
      const span = document.createElement('span');
      span.textContent = text;
      span.style.left  = (c * 40 - 5) + '%';
      span.style.top   = (r * 16 - 4) + '%';
      overlay.appendChild(span);
    }
  }
})();

/* ═══════════════════════════════════════════════
   BUILD QUIZ
═══════════════════════════════════════════════ */
function buildQuiz(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  renderedQuestions = [];

  questions.forEach((q, i) => {
    const labels = ['a','b','c','d'];

    const shuffled  = shuffleOptions(q);
    const displayQ  = { ...q, o: shuffled.o, c: shuffled.c };
    renderedQuestions[i] = displayQ;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = displayQ.o.map((opt, j) =>
      `<div class="option" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <strong>${labels[j]})</strong> ${opt}
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-top">
        <span class="q-num">Q ${i + 1}</span>
        <span class="q-tag">📖 MCQ</span>
      </div>
      <div class="q-text">${displayQ.q}</div>
      <div class="options" id="opts-${i}">${optionsHTML}</div>
      <button class="check-btn" id="check-${i}" onclick="checkAnswer(${i})">
        ✔ Check Answer
      </button>
      <div class="feedback" id="fb-${i}"></div>
      <div class="explanation-box" id="exp-${i}">
        <span class="exp-label">💡 Explanation:</span>${displayQ.exp}
      </div>`;

    area.appendChild(card);
  });

  const res = document.createElement('div');
  res.id = 'resultCard';
  area.appendChild(res);

  updateStats();
}

/* ═══════════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════════ */
const userAnswers = {};

function selectOpt(qi, oi){
  if(userAnswers[qi]?.checked) return;
  document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = { selected: oi, checked: false };
}

function checkAnswer(qi){
  const entry = userAnswers[qi];
  if(!entry || entry.checked) return;

  entry.checked = true;
  const q   = renderedQuestions[qi];
  const ok  = entry.selected === q.c;

  if(ok) state.correct++;
  state.answered++;

  document.querySelectorAll(`#opts-${qi} .option`).forEach((el, i) => {
    el.classList.add('disabled');
    if(i === q.c)                       el.classList.add('correct');
    else if(i === entry.selected && !ok) el.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if(ok){
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct! Well done!';
  } else {
    fb.className = 'feedback show wrong';
    fb.textContent = `✗ Incorrect! The correct answer is: ${String.fromCharCode(97 + q.c)}) ${q.o[q.c]}`;
  }

  if(q.exp){
    document.getElementById(`exp-${qi}`).classList.add('show');
  }

  document.getElementById(`check-${qi}`).disabled = true;

  updateStats();

  if(state.answered === state.total) showResult();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function updateStats(){
  document.getElementById('statTotal').textContent    = state.total;
  document.getElementById('statAnswered').textContent = state.answered;
  document.getElementById('statCorrect').textContent  = state.correct;
  const pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('statScore').textContent    = pct + '%';
}

/* ═══════════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════════ */
function showResult(){
  const pct = Math.round(state.correct / state.total * 100);
  let grade, msg, emoji;

  if(pct >= 90){ grade='A+'; msg='Outstanding Performance!';  emoji='🌟'; }
  else if(pct >= 80){ grade='A';  msg='Excellent Work!';           emoji='🎉'; }
  else if(pct >= 70){ grade='B';  msg='Good Job!';                 emoji='👍'; }
  else if(pct >= 60){ grade='C';  msg='Keep Practicing!';          emoji='📚'; }
  else if(pct >= 50){ grade='D';  msg='More Effort Needed!';       emoji='💪'; }
  else              { grade='F';  msg='Revise the Chapter Again!'; emoji='📖'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="grade-badge">${emoji}</div>
      <h2>${msg}</h2>
      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-value">${state.correct} / ${state.total}</div>
          <div class="result-stat-label">Correct Answers</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${pct}%</div>
          <div class="result-stat-label">Score</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${grade}</div>
          <div class="result-stat-label">Grade</div>
        </div>
      </div>
      <p style="opacity:.85;font-size:13px;margin-bottom:16px">
        Ch.03 Cell Structure & Function &nbsp;|&nbsp; Smart Study Center &nbsp;|&nbsp; Sir Ahmer Javed
      </p>
      <button class="result-btn" onclick="resetQuiz()">🔄 Try Again</button>
    </div>`;

  document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
function resetQuiz(){
  state.answered = 0;
  state.correct  = 0;
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  buildQuiz();
  window.scrollTo({ top: 0, behavior:'smooth' });
}

/* ── INIT ── */
buildQuiz();
// ── STICKY TIMER ──
let timeLeft = 65 * 60;
const timerDisplay = document.getElementById('timerDisplay');
const timerBox = document.getElementById('timerBox');

const timerInterval = setInterval(() => {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerDisplay.textContent =
    String(mins).padStart(2,'0') + ':' +
    String(secs).padStart(2,'0');
  if(timeLeft <= 300){
    timerBox.classList.add('danger');
  }
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    timerDisplay.textContent = '⏰ TIME UP';
    showResult();
  }
  timeLeft--;
}, 1000);
</script>
